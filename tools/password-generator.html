<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>强密码生成器 - {{siteName}}</title>
    <meta name="description" content="快速生成高强度安全密码，支持自定义长度、字符组合及实时强度检测，保护您的账户安全。">
    <meta name="tool-icon" content="ri-shield-keyhole-line">
    <meta name="tool-tags" content="密码, 安全, 生成器, 开发者工具, 隐私">
    <link rel="stylesheet" href="/src/style.css">
    
    
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-shield-keyhole-line text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">强密码生成器</span>
            </h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
            <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
        </button>
    </header>

    <main class="max-w-3xl mx-auto px-4 py-8 lg:py-16 space-y-8">
        <!-- Password Display -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[3rem] p-8 lg:p-12 shadow-sm space-y-8 relative overflow-hidden group">
            <div class="absolute top-0 left-0 w-full h-1" id="strengthBarContainer" style="background: rgba(0,0,0,0.05);">
                <div id="strengthFill" class="h-full w-0 transition-all duration-500"></div>
            </div>
            
            <div id="pwdDisplay" onclick="copyPwd()" class="bg-slate-50 dark:bg-slate-950 border-2 border-dashed border-slate-100 dark:border-slate-800/50 rounded-[2.5rem] p-10 flex items-center justify-center cursor-pointer hover:border-slate-900 dark:hover:border-white transition-all active:scale-[0.99] group">
                <div class="absolute top-4 left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-400 uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">点击复制</div>
                <div id="pwdText" class="text-2xl sm:text-4xl font-bold font-mono tracking-[0.1em] text-slate-900 dark:text-white break-all text-center">Generating...</div>
            </div>

            <div class="flex flex-col items-center space-y-4">
                <button onclick="generatePassword()" class="px-12 py-5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-[1.5rem] shadow-xl active:scale-95 transition-all flex items-center gap-2">
                    <i class="ri-refresh-line"></i> 重新生成
                </button>
                <div id="strengthLabel" class="text-[10px] font-bold uppercase tracking-[0.3em] text-slate-400 italic">检测中...</div>
            </div>
        </div>

        <!-- Settings Panel -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[3rem] p-10 shadow-sm space-y-10">
            <div class="space-y-6">
                <div class="flex items-center justify-between px-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="ri-ruler-2-line"></i> 密码长度
                    </label>
                    <span id="lengthValue" class="text-xl font-bold font-mono text-slate-900 dark:text-white">16</span>
                </div>
                <input type="range" id="lengthSlider" min="6" max="64" value="16" oninput="updateLength()" class="w-full">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-12 gap-y-6 pt-4">
                <div class="flex items-center justify-between py-2 border-b border-slate-50 dark:border-slate-800/50">
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">大写字母 (A-Z)</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="chkUpper" checked onchange="generatePassword()" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-slate-900 dark:peer-checked:bg-white"></div>
                    </label>
                </div>
                <div class="flex items-center justify-between py-2 border-b border-slate-50 dark:border-slate-800/50">
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">小写字母 (a-z)</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="chkLower" checked onchange="generatePassword()" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-slate-900 dark:peer-checked:bg-white"></div>
                    </label>
                </div>
                <div class="flex items-center justify-between py-2 border-b border-slate-50 dark:border-slate-800/50">
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">数字 (0-9)</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="chkNum" checked onchange="generatePassword()" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-slate-900 dark:peer-checked:bg-white"></div>
                    </label>
                </div>
                <div class="flex items-center justify-between py-2 border-b border-slate-50 dark:border-slate-800/50">
                    <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">符号 (!@#$...)</span>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="chkSym" checked onchange="generatePassword()" class="sr-only peer">
                        <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-slate-900 dark:peer-checked:bg-white"></div>
                    </label>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <!-- INJECT_FOOTER -->

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script type="module">
        import { initTheme, toggleTheme, showToast } from '/src/common.js';
        window.toggleTheme = toggleTheme;
        window.showToast = showToast;
        const DOM = {
            text: document.getElementById('pwdText'),
            slider: document.getElementById('lengthSlider'),
            val: document.getElementById('lengthValue'),
            up: document.getElementById('chkUpper'),
            low: document.getElementById('chkLower'),
            num: document.getElementById('chkNum'),
            sym: document.getElementById('chkSym'),
            fill: document.getElementById('strengthFill'),
            label: document.getElementById('strengthLabel')
        };

        const CHARS = {
            up: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
            low: 'abcdefghijklmnopqrstuvwxyz',
            num: '0123456789',
            sym: '!@#$%^&*()_+~`|}{[]:;?><,./-='
        };

        function updateLength() {
            DOM.val.textContent = DOM.slider.value;
            generatePassword();
        }

        function calculateStrength(pwd) {
            let score = 0;
            if (pwd.length > 8) score += 1;
            if (pwd.length > 12) score += 1;
            if (pwd.length >= 16) score += 1;
            if (/[A-Z]/.test(pwd)) score += 1;
            if (/[0-9]/.test(pwd)) score += 1;
            if (/[^A-Za-z0-9]/.test(pwd)) score += 1;

            if (score <= 2) { 
                DOM.fill.style.width = '33%'; 
                DOM.fill.style.background = '#ef4444';
                DOM.label.innerText = '强度: 弱 (Weak)';
                DOM.label.className = 'text-[10px] font-bold uppercase tracking-[0.3em] text-rose-500';
            } else if (score <= 4) { 
                DOM.fill.style.width = '66%'; 
                DOM.fill.style.background = '#f59e0b';
                DOM.label.innerText = '强度: 中等 (Medium)';
                DOM.label.className = 'text-[10px] font-bold uppercase tracking-[0.3em] text-amber-500';
            } else { 
                DOM.fill.style.width = '100%'; 
                DOM.fill.style.background = '#10b981';
                DOM.label.innerText = '强度: 极强 (Strong)';
                DOM.label.className = 'text-[10px] font-bold uppercase tracking-[0.3em] text-emerald-500';
            }
        }

        function generatePassword() {
            let charset = '';
            if (DOM.up.checked) charset += CHARS.up;
            if (DOM.low.checked) charset += CHARS.low;
            if (DOM.num.checked) charset += CHARS.num;
            if (DOM.sym.checked) charset += CHARS.sym;

            if (!charset) {
                DOM.low.checked = true;
                charset += CHARS.low;
            }

            let pwd = '';
            const length = DOM.slider.value;
            const values = new Uint32Array(length);
            window.crypto.getRandomValues(values);

            for (let i = 0; i < length; i++) {
                pwd += charset[values[i] % charset.length];
            }

            DOM.text.textContent = pwd;
            calculateStrength(pwd);
        }

        async function copyPwd() {
            const val = DOM.text.textContent;
            try {
                await navigator.clipboard.writeText(val);
                showToast("密码已复制");
            } catch (e) { }
        }

                generatePassword();
    </script>
</body>
</html>
