<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXIF 编辑器 - {{siteName}}</title>
    <meta name="description" content="在线查看与编辑图片的 EXIF 元数据，支持读取设备信息、地理位置及一键清除敏感隐私。">
    <meta name="tool-icon" content="ri-camera-lens-line">
    <meta name="tool-tags" content="EXIF, 图片元数据, 隐私保护, 照片编辑">
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="bg-slate-50  text-slate-900  min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80  backdrop-blur-md border-b border-slate-200  flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100  rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-camera-lens-line text-slate-900 "></i>
                <span class="tracking-tight">EXIF 编辑器</span>
            </h1>
        </div>
        
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 lg:py-12">
        <div class="grid lg:grid-cols-[450px_1fr] gap-8">
            <!-- Left: Unified Media Core -->
            <div class="space-y-6">
                <!-- Combined Preview & Upload Area -->
                <div id="drop-zone" class="bg-white  border border-slate-200  rounded-[2.5rem] p-4 shadow-sm relative overflow-hidden group cursor-pointer aspect-square flex flex-col items-center justify-center transition-all hover:border-slate-900 ">
                    <div id="preview-container" class="preview-checkerboard w-full h-full rounded-3xl flex items-center justify-center overflow-hidden relative">
                        <!-- Empty State -->
                        <div id="no-image" class="flex flex-col items-center gap-4 text-center p-8 transition-opacity duration-300">
                            <div class="w-20 h-20 bg-slate-50  rounded-3xl flex items-center justify-center text-slate-400 group-hover:bg-slate-900  group-hover:text-white  transition-all">
                                <i class="ri-image-add-line text-4xl"></i>
                            </div>
                            <div>
                                <p class="text-sm font-bold uppercase tracking-widest text-slate-900 ">上传照片</p>
                                <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest">点击或拖拽 (JPG/JPEG)</p>
                            </div>
                        </div>
                        
                        <!-- Image State -->
                        <img id="image-preview" class="hidden w-full h-full object-contain shadow-2xl transition-transform duration-500 group-hover:scale-105">
                        
                        <!-- Hover Overlay -->
                        <div id="change-overlay" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity hidden">
                            <div class="flex flex-col items-center gap-2 text-white">
                                <i class="ri-refresh-line text-3xl"></i>
                                <span class="text-[10px] font-bold uppercase tracking-widest">更换图片</span>
                            </div>
                        </div>
                    </div>
                </div>
                <input type="file" id="file-input" class="hidden" accept="image/jpeg,image/jpg,image/tiff">

                <!-- Global Actions -->
                <div class="grid gap-4">
                    <button onclick="saveImage()" id="save-btn" disabled class="w-full py-5 bg-slate-900  text-white  font-bold rounded-2xl shadow-xl shadow-slate-900/10 active:scale-[0.98] transition-all flex items-center justify-center gap-3 disabled:opacity-20 disabled:grayscale transition-all overflow-hidden group">
                        <i class="ri-download-cloud-2-line text-xl"></i>
                        <span class="tracking-widest uppercase text-xs">生成并下载修改后的照片</span>
                    </button>
                    <button onclick="stripExif()" id="strip-btn" disabled class="w-full py-4 bg-white  border border-slate-200  text-rose-500 font-bold rounded-2xl hover:bg-rose-50  active:scale-[0.98] transition-all flex items-center justify-center gap-2 disabled:opacity-20 disabled:grayscale">
                        <i class="ri-shield-flash-line text-lg"></i>
                        <span class="tracking-widest uppercase text-[10px]">一键擦除所有隐私元数据</span>
                    </button>
                </div>
                
                <div class="p-6 bg-amber-50  rounded-3xl border border-amber-100 ">
                    <div class="flex gap-3">
                        <i class="ri-lightbulb-line text-amber-500 text-xl"></i>
                        <div class="space-y-1">
                            <h4 class="text-xs font-bold text-amber-700  uppercase tracking-wider">安全提示</h4>
                            <p class="text-[11px] text-amber-900/60  leading-relaxed font-medium">照片通常包含位置、日期及拍摄设备信息。在分享及社交媒体上传前，建议清除或修改敏感数据以保护您的隐私。</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: EXIF Editor -->
            <div class="space-y-6">
                <div id="exif-form" class="bg-white  border border-slate-200  rounded-[2.5rem] shadow-sm overflow-hidden opacity-30 pointer-events-none transition-all duration-500 scale-[0.98] origin-top">
                    <!-- Form Header -->
                    <div class="px-8 py-6 border-b border-slate-100  flex items-center justify-between bg-slate-50/50  sticky top-0 z-10 backdrop-blur-md">
                        <h2 class="text-xs font-bold uppercase tracking-widest flex items-center gap-2">
                            <i class="ri-file-info-line text-slate-400"></i> 元数据属性配置
                        </h2>
                        <span id="exif-count" class="text-[10px] font-bold bg-slate-200  text-slate-500  px-4 py-1.5 rounded-full uppercase tracking-tighter shadow-sm">0 字段被识别</span>
                    </div>

                    <!-- Editor Sections -->
                    <div class="p-8 space-y-12 custom-scroll max-h-[75vh] overflow-y-auto pb-16">
                        <!-- Device Info -->
                        <section class="space-y-8">
                            <div class="flex items-center gap-3">
                                <span class="w-8 h-8 rounded-xl bg-slate-100  flex items-center justify-center text-slate-400">
                                    <i class="ri-smartphone-line"></i>
                                </span>
                                <h3 class="text-xs font-bold text-slate-900  uppercase tracking-widest">拍摄设备信息</h3>
                            </div>
                            
                            <div class="grid sm:grid-cols-2 gap-8 pl-1">
                                <!-- Manufacturer with Select -->
                                <div class="space-y-3">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">制造商 (Make)</label>
                                    <div class="relative group">
                                        <select id="make-select" data-exif="0th.271" class="w-full appearance-none bg-slate-50  border border-transparent rounded-2xl px-5 py-4 font-bold text-sm focus:ring-2 focus:ring-slate-900  outline-none transition-all cursor-pointer">
                                            <option value="">(空)</option>
                                            <option value="Apple">Apple</option>
                                            <option value="Samsung">Samsung</option>
                                            <option value="Canon">Canon</option>
                                            <option value="Nikon">Nikon</option>
                                            <option value="Sony">Sony</option>
                                            <option value="DJI">DJI</option>
                                            <option value="Fujifilm">Fujifilm</option>
                                            <option value="CUSTOM">自定义输入...</option>
                                        </select>
                                        <i class="ri-arrow-down-s-line absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"></i>
                                        <input type="text" id="make-custom" class="hidden absolute inset-0 w-full bg-slate-50  border-none rounded-2xl px-5 py-4 font-bold text-sm focus:ring-2 focus:ring-slate-900  outline-none">
                                    </div>
                                </div>

                                <!-- Model with Select -->
                                <div class="space-y-3">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">型号 (Model)</label>
                                    <div class="relative group">
                                        <select id="model-select" data-exif="0th.272" class="w-full appearance-none bg-slate-50  border border-transparent rounded-2xl px-5 py-4 font-bold text-sm focus:ring-2 focus:ring-slate-900  outline-none transition-all cursor-pointer disabled:opacity-50">
                                            <option value="">(空)</option>
                                            <option value="CUSTOM">自定义输入...</option>
                                        </select>
                                        <i class="ri-arrow-down-s-line absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"></i>
                                        <input type="text" id="model-custom" class="hidden absolute inset-0 w-full bg-slate-50  border-none rounded-2xl px-5 py-4 font-bold text-sm focus:ring-2 focus:ring-slate-900  outline-none">
                                    </div>
                                </div>

                                <div class="space-y-3">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">后期/机内软件 (Software)</label>
                                    <div class="relative group">
                                        <select id="software-select" data-exif="0th.305" class="w-full appearance-none bg-slate-50  border border-transparent rounded-2xl px-5 py-4 font-bold text-sm focus:ring-2 focus:ring-slate-900  outline-none transition-all cursor-pointer">
                                            <option value="">(空)</option>
                                            <option value="iOS">iOS</option>
                                            <option value="Android">Android</option>
                                            <option value="Adobe Photoshop">Adobe Photoshop</option>
                                            <option value="Adobe Lightroom">Adobe Lightroom</option>
                                            <option value="Capture One">Capture One</option>
                                            <option value="Snapseed">Snapseed</option>
                                            <option value="CUSTOM">自定义输入...</option>
                                        </select>
                                        <i class="ri-arrow-down-s-line absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"></i>
                                        <input type="text" id="software-custom" class="hidden absolute inset-0 w-full bg-slate-50  border-none rounded-2xl px-5 py-4 font-bold text-sm focus:ring-2 focus:ring-slate-900  outline-none">
                                    </div>
                                </div>
                                
                                <div class="space-y-3">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">拍摄/修改时间 (DateTime)</label>
                                    <input type="text" data-exif="0th.306" class="w-full bg-slate-50  border-none rounded-2xl px-5 py-4 font-bold text-sm focus:ring-2 focus:ring-slate-900  outline-none" placeholder="YYYY:MM:DD HH:MM:SS">
                                </div>
                            </div>
                        </section>

                        <!-- Camera Specs -->
                        <section class="space-y-8">
                            <div class="flex items-center gap-3">
                                <span class="w-8 h-8 rounded-xl bg-slate-100  flex items-center justify-center text-slate-400">
                                    <i class="ri-camera-lens-line"></i>
                                </span>
                                <h3 class="text-xs font-bold text-slate-900  uppercase tracking-widest">专业拍摄动态参数</h3>
                            </div>
                            
                            <div class="grid sm:grid-cols-3 gap-6 pl-1">
                                <div class="space-y-3">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">光圈 (F-Stop)</label>
                                    <input type="text" data-exif="Exif.33437" class="w-full bg-slate-50  border-none rounded-2xl px-5 py-4 font-mono font-bold text-sm focus:ring-2 focus:ring-slate-900  outline-none" placeholder="e.g. 1.8">
                                </div>
                                <div class="space-y-3">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">快门 (Exposure Time)</label>
                                    <input type="text" data-exif="Exif.33434" class="w-full bg-slate-50  border-none rounded-2xl px-5 py-4 font-mono font-bold text-sm focus:ring-2 focus:ring-slate-900  outline-none" placeholder="e.g. 1/125">
                                </div>
                                <div class="space-y-3">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-wider block">ISO 感光度</label>
                                    <div class="relative group">
                                        <select id="iso-select" data-exif="Exif.34855" class="w-full appearance-none bg-slate-50  border border-transparent rounded-2xl px-5 py-4 font-mono font-bold text-sm focus:ring-2 focus:ring-slate-900  outline-none transition-all cursor-pointer">
                                            <option value="">(空)</option>
                                            <option value="50">50</option>
                                            <option value="100">100</option>
                                            <option value="200">200</option>
                                            <option value="400">400</option>
                                            <option value="800">800</option>
                                            <option value="1600">1600</option>
                                            <option value="3200">3200</option>
                                            <option value="6400">6400</option>
                                            <option value="CUSTOM">自定义...</option>
                                        </select>
                                        <i class="ri-arrow-down-s-line absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400"></i>
                                        <input type="text" id="iso-custom" class="hidden absolute inset-0 w-full bg-slate-50  border-none rounded-2xl px-5 py-4 font-mono font-bold text-sm focus:ring-2 focus:ring-slate-900  outline-none">
                                    </div>
                                </div>
                            </div>
                        </section>

                        <!-- Location -->
                        <section class="space-y-8">
                            <div class="flex items-center gap-3">
                                <span class="w-8 h-8 rounded-xl bg-emerald-50  flex items-center justify-center text-emerald-500">
                                    <i class="ri-map-pin-2-line"></i>
                                </span>
                                <h3 class="text-xs font-bold text-slate-900  uppercase tracking-widest leading-none">GPS 地理定位元数据</h3>
                            </div>
                            
                            <div class="grid lg:grid-cols-2 gap-8 pl-1">
                                <div class="space-y-3">
                                    <label class="text-[10px] font-bold text-emerald-500 uppercase tracking-wider ml-1">纬度 (Latitude)</label>
                                    <div class="flex gap-2">
                                        <select data-exif="GPS.1" class="bg-slate-100  border-none rounded-2xl text-[10px] font-black px-4 py-4 outline-none focus:ring-2 focus:ring-slate-900  transition-all shadow-sm">
                                            <option value="N">N</option><option value="S">S</option>
                                        </select>
                                        <input type="text" data-exif="GPS.2" class="flex-1 bg-slate-50  border-none rounded-2xl px-5 py-4 font-mono font-bold text-sm focus:ring-2 focus:ring-slate-900  outline-none" placeholder="e.g. 39.9042">
                                    </div>
                                </div>
                                <div class="space-y-3">
                                    <label class="text-[10px] font-bold text-emerald-500 uppercase tracking-wider ml-1">经度 (Longitude)</label>
                                    <div class="flex gap-2">
                                        <select data-exif="GPS.3" class="bg-slate-100  border-none rounded-2xl text-[10px] font-black px-4 py-4 outline-none focus:ring-2 focus:ring-slate-900  transition-all shadow-sm">
                                            <option value="E">E</option><option value="W">W</option>
                                        </select>
                                        <input type="text" data-exif="GPS.4" class="flex-1 bg-slate-50  border-none rounded-2xl px-5 py-4 font-mono font-bold text-sm focus:ring-2 focus:ring-slate-900  outline-none" placeholder="e.g. 116.4074">
                                    </div>
                                </div>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- INJECT_FOOTER -->

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script type="module">
        import { showToast  } from '/src/common.js';
        import * as piexif from 'piexifjs';
        
        window.showToast = showToast;
        const DEVICE_DATA = {
            'Apple': ['iPhone 15 Pro', 'iPhone 15', 'iPhone 14 Pro', 'iPhone 14', 'iPhone 13', 'iPad Pro', 'iPad Air'],
            'Samsung': ['Galaxy S24 Ultra', 'Galaxy S23', 'Galaxy Z Fold 5', 'Galaxy A54', 'Galaxy S22 Ultra'],
            'Sony': ['Alpha 7R V', 'Alpha 7 IV', 'Alpha 1', 'RX100 VII', 'ZV-E10', 'Xperia 1 V'],
            'Canon': ['EOS R5', 'EOS R6 Mark II', 'EOS 5D Mark IV', 'EOS 90D', 'PowerShot G7 X III'],
            'Nikon': ['Z9', 'Z8', 'Z7 II', 'D850', 'D780', 'Coolpix P1000'],
            'DJI': ['Mavic 3 Pro', 'Air 3', 'Mini 4 Pro', 'Osmo Action 4', 'Pocket 3'],
            'Fujifilm': ['X-T5', 'X-H2S', 'X100V', 'GFX 100 II', 'X-S20']
        };

        let currentExif = null;
        let originalBase64 = null;

        const els = {
            dropZone: document.getElementById('drop-zone'),
            fileInput: document.getElementById('file-input'),
            imgPre: document.getElementById('image-preview'),
            noImg: document.getElementById('no-image'),
            overlay: document.getElementById('change-overlay'),
            exifForm: document.getElementById('exif-form'),
            saveBtn: document.getElementById('save-btn'),
            stripBtn: document.getElementById('strip-btn'),
            countBadge: document.getElementById('exif-count'),
            
            makeSel: document.getElementById('make-select'),
            makeCust: document.getElementById('make-custom'),
            modelSel: document.getElementById('model-select'),
            modelCust: document.getElementById('model-custom'),
            softSel: document.getElementById('software-select'),
            softCust: document.getElementById('software-custom'),
            isoSel: document.getElementById('iso-select'),
            isoCust: document.getElementById('iso-custom')
        };

        // Events
        window.saveImage = saveImage;
        window.stripExif = stripExif;
        window.handleFiles = handleFiles;

        els.dropZone.addEventListener('click', () => els.fileInput.click());
        els.fileInput.addEventListener('change', (e) => handleFiles(e.target.files));
        
        els.dropZone.addEventListener('dragover', (e) => { 
            e.preventDefault(); 
            els.dropZone.classList.add('border-slate-900', 'scale-[1.01]'); 
        });
        els.dropZone.addEventListener('dragleave', () => {
            els.dropZone.classList.remove('border-slate-900', 'scale-[1.01]');
        });
        els.dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            els.dropZone.classList.remove('border-slate-900', 'scale-[1.01]');
            handleFiles(e.dataTransfer.files);
        });

        // Select Helpers
        function setupCustomSelect(selectEl, customEl) {
            selectEl.addEventListener('change', () => {
                if (selectEl.value === 'CUSTOM') {
                    customEl.classList.remove('hidden');
                    customEl.focus();
                } else {
                    customEl.classList.add('hidden');
                    if (selectEl.id === 'make-select') updateModelOptions(selectEl.value);
                }
            });
            customEl.addEventListener('blur', () => {
                if (!customEl.value) {
                    customEl.classList.add('hidden');
                    selectEl.value = '';
                }
            });
        }

        setupCustomSelect(els.makeSel, els.makeCust);
        setupCustomSelect(els.modelSel, els.modelCust);
        setupCustomSelect(els.softSel, els.softCust);
        setupCustomSelect(els.isoSel, els.isoCust);

        function updateModelOptions(make) {
            const models = DEVICE_DATA[make] || [];
            els.modelSel.innerHTML = '<option value="">(空)</option>' + 
                models.map(m => `<option value="${m}">${m}</option>`).join('') +
                '<option value="CUSTOM">自定义输入...</option>';
            els.modelSel.disabled = !make && make !== 'CUSTOM';
        }

        function handleFiles(files) {
            const file = files[0];
            if (!file || (file.type !== 'image/jpeg' && file.type !== 'image/jpg')) {
                showToast("目前仅支持 JPG/JPEG 图片", "error");
                return;
            }

            const reader = new FileReader();
            reader.onload = (e) => {
                originalBase64 = e.target.result;
                els.imgPre.src = originalBase64;
                els.imgPre.classList.remove('hidden');
                els.noImg.classList.add('hidden');
                els.overlay.classList.remove('hidden');
                
                els.exifForm.classList.remove('opacity-30', 'pointer-events-none', 'scale-[0.98]');
                els.saveBtn.disabled = false;
                els.stripBtn.disabled = false;
                
                loadExif(originalBase64);
                showToast("照片载入成功");
            };
            reader.readAsDataURL(file);
        }

        function loadExif(base64) {
            try {
                currentExif = piexif.load(base64);
                let count = 0;
                
                document.querySelectorAll('[data-exif]').forEach(input => {
                    const [cat, tag] = input.getAttribute('data-exif').split('.');
                    if (currentExif[cat] && currentExif[cat][tag] !== undefined) {
                        const val = currentExif[cat][tag];
                        
                        if (input.tagName === 'SELECT') {
                            // Try to match select option
                            const options = Array.from(input.options).map(o => o.value);
                            if (options.includes(val)) {
                                input.value = val;
                                if (input.id === 'make-select') updateModelOptions(val);
                            } else {
                                input.value = 'CUSTOM';
                                const customInput = document.getElementById(input.id.replace('select', 'custom'));
                                if (customInput) {
                                    customInput.value = val;
                                    customInput.classList.remove('hidden');
                                }
                                if (input.id === 'make-select') updateModelOptions('');
                            }
                        } else {
                            input.value = val;
                        }
                        count++;
                    } else {
                        input.value = '';
                        if (input.tagName === 'SELECT') {
                             const customInput = document.getElementById(input.id.replace('select', 'custom'));
                             if (customInput) {
                                 customInput.value = '';
                                 customInput.classList.add('hidden');
                             }
                        }
                    }
                });
                els.countBadge.textContent = `${count} 个主字段被提取`;
            } catch (err) {
                console.error("EXIF Load Error:", err);
                showToast("部分字段读取受限", "error");
            }
        }

        function saveImage() {
            if (!originalBase64) return;
            try {
                document.querySelectorAll('[data-exif]').forEach(input => {
                    const [cat, tag] = input.getAttribute('data-exif').split('.');
                    if (!currentExif[cat]) currentExif[cat] = {};
                    
                    let val = input.value;
                    if (val === 'CUSTOM') {
                        const customInput = document.getElementById(input.id.replace('select', 'custom'));
                        val = customInput ? customInput.value : '';
                    }

                    if (val) currentExif[cat][tag] = val;
                });

                const exifBytes = piexif.dump(currentExif);
                const newBase64 = piexif.insert(exifBytes, originalBase64);
                
                const link = document.createElement('a');
                link.href = newBase64;
                link.download = `exif-fixed-${Date.now()}.jpg`;
                link.click();
                showToast("重构成像下载成功");
            } catch (err) {
                console.error("Save Error:", err);
                showToast("保存失败", "error");
            }
        }

        function stripExif() {
            if (!originalBase64) return;
            if (!confirm('确定要永久擦除所有的隐私元数据吗？此操作无法撤销。')) return;
            try {
                const newBase64 = piexif.remove(originalBase64);
                originalBase64 = newBase64;
                els.imgPre.src = newBase64;
                loadExif(newBase64);
                showToast("所有数据已安全擦除", "success");
            } catch (err) {
                showToast("清理失败", "error");
            }
        }
    </script>
</body>
</html>
