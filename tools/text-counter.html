<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字数统计工具 - Web Tools</title>
    <meta name="description" content="全能在线文本统计工具，实时计算字数、字符数、句子、段落及预计阅读时间，支持中英文混排，极简高效。">
    <meta name="tool-icon" content="ri-text-spacing">
    <meta name="tool-tags" content="字数统计, 文本分析, 写作辅助, SEO, 开发者工具">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-text-spacing text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">字数统计工具</span>
            </h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
            <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
        </button>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 lg:py-12">
        <div class="grid lg:grid-cols-[1fr,350px] gap-8 items-start">
            <!-- Left: Editor Area -->
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[3rem] overflow-hidden shadow-sm flex flex-col min-h-[600px] lg:min-h-[700px]">
                <div class="h-14 bg-slate-50 dark:bg-slate-800/50 px-8 flex items-center justify-between border-b border-slate-100 dark:border-slate-800 shrink-0">
                    <div class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        <i class="ri-edit-line"></i> 编辑区域
                    </div>
                    <div class="flex items-center gap-4">
                        <button onclick="clearText()" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white transition-all uppercase flex items-center gap-1 group">
                            <i class="ri-delete-bin-line"></i> 清空
                        </button>
                        <button onclick="copyText()" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white transition-all uppercase flex items-center gap-1 group">
                            <i class="ri-file-copy-line"></i> 复制
                        </button>
                    </div>
                </div>
                <textarea id="textInput" class="flex-1 w-full p-10 lg:p-12 font-serif text-xl leading-[1.8] bg-transparent border-none outline-none resize-none focus:ring-0 text-slate-600 dark:text-slate-400 placeholder:text-slate-200 dark:placeholder:text-slate-800" placeholder="请在此输入或粘贴您的文本..." oninput="updateStats()"></textarea>
            </div>

            <!-- Right: Stats Sidebar -->
            <aside class="space-y-6 lg:sticky lg:top-24">
                <!-- Top Primary Stats -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-900 dark:bg-white p-6 rounded-[2rem] text-center space-y-1 shadow-xl">
                        <p class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Words</p>
                        <p id="valWords" class="text-3xl font-bold font-mono text-white dark:text-slate-900">0</p>
                    </div>
                    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-[2rem] text-center space-y-1 shadow-sm">
                        <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Chars</p>
                        <p id="valChars" class="text-3xl font-bold font-mono text-slate-900 dark:text-white">0</p>
                    </div>
                </div>

                <!-- Detailed Metrics -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2.5rem] p-8 shadow-sm space-y-8">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest border-b border-slate-50 dark:border-slate-800 pb-4">详细指标</h2>
                    
                    <div class="space-y-6">
                        <div class="flex items-center justify-between group">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-xl bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-slate-400"><i class="ri-text"></i></div>
                                <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">不计空格</span>
                            </div>
                            <span id="valCharsNoSpace" class="font-mono font-bold text-slate-900 dark:text-white">0</span>
                        </div>

                        <div class="flex items-center justify-between group">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-xl bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-slate-400"><i class="ri-paragraph"></i></div>
                                <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">句子 / 段落</span>
                            </div>
                            <span class="font-mono font-bold text-slate-900 dark:text-white"><span id="valSentences">0</span> / <span id="valParagraphs">0</span></span>
                        </div>

                        <div class="flex items-center justify-between group">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-xl bg-slate-50 dark:bg-slate-800 flex items-center justify-center text-slate-400"><i class="ri-timer-line"></i></div>
                                <span class="text-[11px] font-bold text-slate-500 uppercase tracking-wider">预计阅读</span>
                            </div>
                            <span id="valReadTime" class="font-mono font-bold text-slate-900 dark:text-white">0 min</span>
                        </div>
                    </div>

                    <div class="pt-4 border-t border-slate-50 dark:border-slate-800">
                        <p class="text-[9px] text-slate-300 dark:text-slate-600 leading-relaxed font-medium">提示：字数统计支持中英文混排。阅读时间基于平均每分钟 200 字估算。</p>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-12 border-t border-slate-200 dark:border-slate-800 text-center text-slate-400 dark:text-slate-600 text-[10px] font-bold uppercase tracking-widest">
        <p>&copy; 2025 Web Tools Collection • Made with ❤️ • <a href="https://ceda.is/" class="hover:text-slate-900 dark:hover:text-white transition-colors">Cedar</a></p>
    </footer>

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script>
        const input = document.getElementById('textInput');

        function updateStats() {
            const text = input.value;

            // Chars
            document.getElementById('valChars').textContent = text.length;

            // Chars no space
            document.getElementById('valCharsNoSpace').textContent = text.replace(/\s/g, '').length;

            // Words (Improved for CJK + Latin)
            const cjkWords = text.match(/[\u4e00-\u9fa5\u3040-\u309f\u30a0-\u30ff\uac00-\ud7af]|\b[a-zA-Z0-9-']+\b/g);
            const words = cjkWords ? cjkWords.length : 0;
            document.getElementById('valWords').textContent = words;

            // Sentences
            const sentences = text.split(/[.!?。！？]+/).filter(s => s.trim().length > 0).length;
            document.getElementById('valSentences').textContent = sentences;

            // Paragraphs
            const paragraphs = text.split(/\n+/).filter(p => p.trim().length > 0).length;
            document.getElementById('valParagraphs').textContent = paragraphs;

            // Read time (approx 200 words per minute for mixed)
            const minutes = Math.ceil(words / 200);
            document.getElementById('valReadTime').textContent = minutes > 0 ? `< ${minutes} min` : '0 min';
        }

        function clearText() {
            input.value = '';
            updateStats();
            input.focus();
        }

        async function copyText() {
            if (!input.value) return;
            try {
                await navigator.clipboard.writeText(input.value);
                showToast("文本已复制到剪贴板");
            } catch (e) { }
        }

        function showToast(title, type = 'success') {
            const container = document.getElementById('toastContainer');
            if (container.children.length > 2) container.children[0].remove();
            const toast = document.createElement('div');
            const bgClass = type === 'success' ? 'bg-slate-900 border border-slate-800' : 'bg-rose-600';
            const icon = type === 'success' ? 'ri-checkbox-circle-fill' : 'ri-error-warning-fill';
            
            toast.className = `flex items-center gap-3 px-5 py-3 rounded-2xl shadow-2xl backdrop-blur-xl text-white transform transition-all duration-300 translate-y-10 opacity-0 ${bgClass}`;
            toast.innerHTML = `
                <i class="${icon} text-lg opacity-80"></i>
                <span class="font-bold text-[12px] truncate tracking-tight uppercase">${title}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.className = document.documentElement.classList.contains('dark') ? 'ri-sun-line text-xl opacity-70' : 'ri-moon-line text-xl opacity-70';
            }
        }

        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcon();
        updateStats();
    </script>
</body>
</html>
