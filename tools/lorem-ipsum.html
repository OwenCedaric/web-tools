<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>占位文本生成器 - Web Tools</title>
    <meta name="description" content="快速生成标准的 Lorem Ipsum 占位文本，支持段落、句子、单词计数及多种格式配置，设计师必备。">
    <meta name="tool-icon" content="ri-text-line">
    <meta name="tool-tags" content="Lorem Ipsum, 占位符, 设计, 文本生成, 开发者工具">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-text-line text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">占位文本生成器</span>
            </h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
            <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
        </button>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 lg:py-12 space-y-8">
        <!-- Controls Section -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[3rem] p-8 lg:p-10 shadow-sm">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8 items-end">
                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">生成数量</label>
                    <div class="relative group">
                        <input type="number" id="genCount" value="5" min="1" max="100" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-6 py-4 font-mono text-xl focus:ring-2 focus:ring-slate-900 dark:focus:ring-white outline-none transition-all">
                        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 uppercase">Qty</span>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">生成类型</label>
                    <select id="genType" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-6 py-[1.15rem] font-bold text-slate-600 dark:text-slate-300 focus:ring-2 focus:ring-slate-900 dark:focus:ring-white outline-none appearance-none cursor-pointer">
                        <option value="paragraphs">段落 (Paragraphs)</option>
                        <option value="sentences">句子 (Sentences)</option>
                        <option value="words">单词 (Words)</option>
                    </select>
                </div>

                <div class="flex items-center h-[60px] px-6">
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" id="startWith" checked class="w-5 h-5 rounded-lg border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-white focus:ring-slate-900 dark:focus:ring-white">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest group-hover:text-slate-900 dark:group-hover:text-white transition-colors">以 Lorem Ipsum 开头</span>
                    </label>
                </div>

                <button onclick="generate()" class="h-[60px] bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-[1.5rem] shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                    <i class="ri-refresh-line"></i> 立即生成
                </button>
            </div>
        </div>

        <!-- Result Area -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[3rem] overflow-hidden shadow-sm flex flex-col min-h-[500px]">
            <div class="h-14 bg-slate-50 dark:bg-slate-800/50 px-8 flex items-center justify-between border-b border-slate-100 dark:border-slate-800">
                <div class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <i class="ri-text-wrap"></i> 生成结果
                </div>
                <button onclick="copyResult()" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white transition-all uppercase flex items-center gap-1 group">
                    <i class="ri-file-copy-line transition-transform group-hover:scale-110"></i> 复制所有文本
                </button>
            </div>
            
            <div id="resultBox" class="flex-1 p-10 lg:p-12 font-serif text-lg leading-[2] text-slate-600 dark:text-slate-400 overflow-y-auto selection:bg-slate-900 selection:text-white dark:selection:bg-white dark:selection:text-slate-900">
                <!-- Content here -->
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-12 border-t border-slate-200 dark:border-slate-800 text-center text-slate-400 dark:text-slate-600 text-[10px] font-bold uppercase tracking-widest">
        <p>&copy; 2025 Web Tools Collection • Made with ❤️ • <a href="https://ceda.is/" class="hover:text-slate-900 dark:hover:text-white transition-colors">Cedar</a></p>
    </footer>

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script>
        const words = ['lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit', 'curabitur', 'vel', 'hendrerit', 'libero', 'eleifend', 'blandit', 'nunc', 'ornare', 'odio', 'ut', 'orci', 'gravida', 'imperdiet', 'nullam', 'purus', 'lacinia', 'a', 'pretium', 'quis', 'congue', 'praesent', 'sagittis', 'laoreet', 'auctor', 'mauris', 'non', 'velit', 'eros', 'dictum', 'proin', 'accumsan', 'sapien', 'nec', 'massa', 'volutpat', 'venenatis', 'sed', 'eu', 'molestie', 'lacus', 'quisque', 'porttitor', 'ligula', 'dui', 'mollis', 'tempus', 'at', 'magna', 'vestibulum', 'turpis', 'ac', 'diam', 'tincidunt', 'id', 'condimentum', 'enim', 'sodales', 'in', 'hac', 'habitasse', 'platea', 'dictumst', 'aenean', 'neque', 'fusce', 'augue', 'leo', 'eget', 'semper', 'mattis', 'tortor', 'scelerisque', 'nulla', 'interdum', 'tellus', 'malesuada', 'rhoncus', 'porta', 'sem', 'aliquet', 'et', 'nam', 'suspendisse', 'potenti', 'vivamus', 'luctus', 'fringilla', 'erat', 'donec', 'justo', 'vehicula', 'ultricies', 'varius', 'ante', 'primis', 'faucibus', 'ultrices', 'posuere', 'cubilia', 'curae', 'etiam', 'cursus', 'aliquam', 'quam', 'dapibus', 'nisl', 'feugiat', 'egestas', 'class', 'aptent', 'taciti', 'sociosqu', 'ad', 'litora', 'torquent', 'per', 'conubia', 'nostra', 'inceptos', 'himenaeos', 'phasellus', 'nibh', 'pulvinar', 'vitae', 'urna', 'iaculis', 'lobortis', 'nisi', 'viverra', 'arcu', 'morbi', 'pellentesque', 'metus', 'commodo', 'ut', 'facilisis', 'felis', 'tristique', 'ullamcorper', 'placerat', 'aenean', 'convallis', 'sollicitudin', 'integer', 'rutrum', 'duis', 'est', 'etiam', 'bibendum', 'donec', 'pharetra', 'vulputate', 'maecenas', 'mi', 'fermentum', 'consequat', 'suscipit', 'aliquam', 'habitant', 'senectus', 'netus', 'fames', 'quisque', 'euismod', 'curabitur', 'lectus', 'elementum', 'tempor', 'risus', 'cras'];

        function randomWord() { return words[Math.floor(Math.random() * words.length)]; }

        function generateSentence(isFirst = false) {
            const length = Math.floor(Math.random() * 8) + 6; 
            let sentence = [];
            for (let i = 0; i < length; i++) {
                if (isFirst && i < 5) sentence.push(['Lorem', 'ipsum', 'dolor', 'sit', 'amet'][i]);
                else sentence.push(randomWord());
            }
            sentence[0] = sentence[0].charAt(0).toUpperCase() + sentence[0].slice(1);
            return sentence.join(' ') + '.';
        }

        function generateParagraph(isFirst = false) {
            const numSentences = Math.floor(Math.random() * 4) + 4;
            let para = [];
            for (let i = 0; i < numSentences; i++) {
                para.push(generateSentence(isFirst && i === 0));
            }
            return para.join(' ');
        }

        function generate() {
            const count = parseInt(document.getElementById('genCount').value) || 5;
            const type = document.getElementById('genType').value;
            const startWith = document.getElementById('startWith').checked;
            const resultBox = document.getElementById('resultBox');
            let res = [];

            if (type === 'paragraphs') {
                for (let i = 0; i < count; i++) { res.push(`<p class="mb-8 last:mb-0">${generateParagraph(i === 0 && startWith)}</p>`); }
                resultBox.innerHTML = res.join('');
            } else if (type === 'sentences') {
                let text = [];
                for (let i = 0; i < count; i++) { text.push(generateSentence(i === 0 && startWith)); }
                resultBox.innerHTML = text.join(' ');
            } else if (type === 'words') {
                let text = [];
                for (let i = 0; i < count; i++) {
                    if (startWith && i < 5) text.push(['Lorem', 'ipsum', 'dolor', 'sit', 'amet'][i]);
                    else text.push(randomWord());
                }
                text[0] = text[0].charAt(0).toUpperCase() + text[0].slice(1);
                resultBox.innerHTML = text.join(' ');
            }
        }

        async function copyResult() {
            const text = document.getElementById('resultBox').innerText;
            if (!text) return;
            try {
                await navigator.clipboard.writeText(text);
                showToast("文本已复制到剪贴板");
            } catch (e) { }
        }

        function showToast(title, type = 'success') {
            const container = document.getElementById('toastContainer');
            if (container.children.length > 2) container.children[0].remove();
            const toast = document.createElement('div');
            const bgClass = type === 'success' ? 'bg-slate-900 border border-slate-800' : 'bg-rose-600';
            const icon = type === 'success' ? 'ri-checkbox-circle-fill' : 'ri-error-warning-fill';
            
            toast.className = `flex items-center gap-3 px-5 py-3 rounded-2xl shadow-2xl backdrop-blur-xl text-white transform transition-all duration-300 translate-y-10 opacity-0 ${bgClass}`;
            toast.innerHTML = `
                <i class="${icon} text-lg opacity-80"></i>
                <span class="font-bold text-[12px] truncate tracking-tight uppercase">${title}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.className = document.documentElement.classList.contains('dark') ? 'ri-sun-line text-xl opacity-70' : 'ri-moon-line text-xl opacity-70';
            }
        }

        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcon();
        generate();
    </script>
</body>
</html>
