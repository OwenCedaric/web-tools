<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正则测试器 - Web Tools</title>
    <meta name="description" content="实时测试和验证正则表达式，支持多种 Flag 配置、语法高亮及详细的匹配信息展示，开发者得力助手。">
    <meta name="tool-icon" content="ri-code-block-line">
    <meta name="tool-tags" content="Regex, 正则表达式, 匹配, 开发者工具, 调试">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }

        .highlights mark {
            background-color: rgba(14, 165, 233, 0.2);
            border-bottom: 2px solid rgba(14, 165, 233, 0.5);
            color: transparent;
            border-radius: 2px;
        }
        .dark .highlights mark {
            background-color: rgba(56, 189, 248, 0.2);
            border-bottom: 2px solid rgba(56, 189, 248, 0.4);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-code-block-line text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">正则测试器</span>
            </h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
            <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
        </button>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 lg:py-12 space-y-8">
        <!-- Regex Input -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2.5rem] p-8 lg:p-10 shadow-sm space-y-6">
            <div class="flex items-center justify-between px-2">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <i class="ri-terminal-line"></i> 正则表达式 (Regular Expression)
                </h2>
                <div id="matchInfo" class="text-[10px] font-bold text-emerald-500 uppercase tracking-widest bg-emerald-50 content-[''] dark:bg-emerald-500/10 px-3 py-1 rounded-full">0 Matches</div>
            </div>

            <div class="space-y-4">
                <div class="flex items-center bg-slate-50 dark:bg-slate-950 border-2 border-slate-100 dark:border-slate-800 rounded-2xl px-6 py-4 focus-within:border-slate-900 dark:focus-within:border-white transition-all group overflow-hidden">
                    <span class="text-2xl font-mono text-slate-300 dark:text-slate-700 select-none">/</span>
                    <input type="text" id="regexInput" class="flex-1 bg-transparent border-none outline-none px-3 font-mono text-xl text-slate-900 dark:text-white placeholder:text-slate-300 dark:placeholder:text-slate-700" value="([a-zA-Z0-9.-]+@[a-zA-Z0-9.-]+\.[a-zA-Z0-9_-]+)" placeholder="在此输入正则表达式" oninput="update()">
                    <span class="text-2xl font-mono text-slate-300 dark:text-slate-700 select-none">/</span>
                    <input type="text" id="flagsInput" class="w-16 bg-transparent border-none outline-none font-mono text-xl text-slate-400 text-center tracking-tighter" value="gm" placeholder="Flags" oninput="update()">
                </div>
                <div id="regexError" class="text-[10px] font-bold text-rose-500 uppercase tracking-widest ml-2 hidden">Invalid Regular Expression</div>
            </div>
        </div>

        <!-- Editor Area -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[3rem] overflow-hidden shadow-sm flex flex-col min-h-[500px]">
             <div class="h-14 bg-slate-50 dark:bg-slate-800/50 px-8 flex items-center justify-between border-b border-slate-100 dark:border-slate-800 shrink-0">
                <div class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                    <i class="ri-text-snippet"></i> 测试文本 (Test String)
                </div>
                <div class="flex items-center gap-4">
                     <button onclick="clearText()" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white transition-all uppercase flex items-center gap-1 group">
                        <i class="ri-delete-bin-line"></i> 清空
                    </button>
                </div>
            </div>
            
            <div class="flex-1 relative overflow-hidden bg-white dark:bg-slate-950">
                <!-- Highlight Layer -->
                <div id="highlights" class="absolute inset-0 w-full h-full p-10 font-mono text-lg leading-relaxed whitespace-pre-wrap break-all pointer-events-none text-transparent overflow-y-auto highlights"></div>
                <!-- Interactive Layer -->
                <textarea id="testString" class="absolute inset-0 w-full h-full p-10 font-mono text-lg leading-relaxed bg-transparent border-none outline-none resize-none focus:ring-0 text-slate-900 dark:text-slate-300 scrollbar-gutter-stable" spellcheck="false" placeholder="在此粘贴测试文本进行对比..." oninput="update()" onscroll="handleScroll()">Contact us at hello@example.com or support@ceda.is for more info! 
Also try invalid@email without domain.</textarea>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-12 border-t border-slate-200 dark:border-slate-800 text-center text-slate-400 dark:text-slate-600 text-[10px] font-bold uppercase tracking-widest">
        <p>&copy; 2025 Web Tools Collection • Made with ❤️ • <a href="https://ceda.is/" class="hover:text-slate-900 dark:hover:text-white transition-colors">Cedar</a></p>
    </footer>

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script>
        const regexInput = document.getElementById('regexInput');
        const flagsInput = document.getElementById('flagsInput');
        const testString = document.getElementById('testString');
        const highlights = document.getElementById('highlights');
        const matchInfo = document.getElementById('matchInfo');
        const regexError = document.getElementById('regexError');

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        function handleScroll() {
            highlights.scrollTop = testString.scrollTop;
            highlights.scrollLeft = testString.scrollLeft;
        }

        function update() {
            const exp = regexInput.value;
            const flags = flagsInput.value;
            const text = testString.value;

            if (!exp) {
                highlights.innerHTML = escapeHtml(text);
                matchInfo.textContent = "0 Matches";
                regexError.classList.add('hidden');
                return;
            }

            try {
                const validFlags = flags.replace(/[^gimsuy]/g, '');
                if (validFlags !== flags) {
                    flagsInput.value = validFlags;
                }

                const regex = new RegExp(exp, validFlags.includes('g') ? validFlags : validFlags + 'g');
                regexError.classList.add('hidden');

                let matchCount = 0;
                const highlighted = escapeHtml(text).replace(regex, (match) => {
                    matchCount++;
                    return `<mark>${match}</mark>`;
                });

                if (!validFlags.includes('g') && matchCount > 1) {
                    matchCount = 1;
                }

                highlights.innerHTML = highlighted;
                matchInfo.textContent = `${matchCount} Match${matchCount === 1 ? '' : 'es'}`;

            } catch (err) {
                regexError.textContent = err.message;
                regexError.classList.remove('hidden');
                highlights.innerHTML = escapeHtml(text);
                matchInfo.textContent = "Error";
            }
        }

        function clearText() {
            testString.value = '';
            update();
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.className = document.documentElement.classList.contains('dark') ? 'ri-sun-line text-xl opacity-70' : 'ri-moon-line text-xl opacity-70';
            }
        }

        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcon();
        
        // Initial
        update();
        
        // Resize observer
        new ResizeObserver(() => handleScroll()).observe(testString);
    </script>
</body>
</html>
