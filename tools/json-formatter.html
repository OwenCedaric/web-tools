<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON 格式化 - {{siteName}}</title>
    <meta name="description" content="在线 JSON 格式化工具，支持美化、压缩、验证及一键复制。">
    <meta name="tool-icon" content="ri-braces-line">
    <meta name="tool-tags" content="JSON, 格式化, 美化, 开发工具">
    <link rel="stylesheet" href="/src/style.css">
    
    
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-braces-line text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">JSON 格式化</span>
            </h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
            <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
        </button>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 lg:py-12">
        <div class="flex flex-col gap-6">
            <!-- Toolbar -->
            <div class="flex flex-wrap items-center justify-between gap-4 bg-white dark:bg-slate-900 p-4 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-sm">
                <div class="flex items-center gap-2">
                    <button onclick="beautify()" class="px-5 py-2.5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 text-xs font-bold rounded-xl shadow-lg shadow-slate-900/10 active:scale-95 transition-all flex items-center gap-2">
                        <i class="ri-magic-line"></i> 格式化
                    </button>
                    <button onclick="minify()" class="px-5 py-2.5 bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white text-xs font-bold rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 active:scale-95 transition-all flex items-center gap-2">
                        <i class="ri-contract-left-right-line"></i> 压缩
                    </button>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="copyResult()" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors uppercase tracking-widest flex items-center gap-1.5">
                        <i class="ri-file-copy-line text-sm"></i> 复制
                    </button>
                    <div class="w-px h-4 bg-slate-200 dark:bg-slate-800 mx-1"></div>
                    <button onclick="clearAll()" class="text-[10px] font-bold text-slate-400 hover:text-rose-500 transition-colors uppercase tracking-widest flex items-center gap-1.5">
                        <i class="ri-delete-bin-7-line text-sm"></i> 清空
                    </button>
                </div>
            </div>

            <!-- Main Editor Area -->
            <div class="relative group">
                <textarea id="json-input" 
                    class="w-full h-[60vh] p-8 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2.5rem] shadow-sm focus:ring-2 focus:ring-slate-900 dark:focus:ring-white focus:border-transparent outline-none transition-all font-mono text-sm leading-relaxed custom-scroll"
                    placeholder="在此处输入或粘贴 JSON 字符串..."></textarea>
                
                <div id="status-badge" class="absolute bottom-8 right-8 flex items-center gap-2 px-4 py-2 bg-slate-50 dark:bg-slate-800 rounded-full border border-slate-100 dark:border-slate-700 text-[10px] font-bold uppercase tracking-widest transition-all">
                    <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-300"></div>
                    <span id="status-text" class="text-slate-400">待输入</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <!-- INJECT_FOOTER -->

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script type="module">
        import { initTheme, toggleTheme, showToast } from '/src/common.js';
        window.toggleTheme = toggleTheme;
        window.showToast = showToast;
        const editor = document.getElementById('json-input');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        function updateStatus(type, message) {
            statusText.textContent = message;
            if (type === 'success') {
                statusDot.className = 'w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]';
                statusText.className = 'text-emerald-500';
            } else if (type === 'error') {
                statusDot.className = 'w-2 h-2 rounded-full bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.5)]';
                statusText.className = 'text-rose-500';
            } else {
                statusDot.className = 'w-2 h-2 rounded-full bg-slate-300';
                statusText.className = 'text-slate-400';
            }
        }

        function beautify() {
            const val = editor.value.trim();
            if (!val) return;
            try {
                const parsed = JSON.parse(val);
                editor.value = JSON.stringify(parsed, null, 4);
                updateStatus('success', '有效 JSON');
                showToast('格式化成功');
            } catch (e) {
                updateStatus('error', '无效格式');
                showToast('格式错误', 'error');
            }
        }

        function minify() {
            const val = editor.value.trim();
            if (!val) return;
            try {
                const parsed = JSON.parse(val);
                editor.value = JSON.stringify(parsed);
                updateStatus('success', '压缩完成');
                showToast('压缩成功');
            } catch (e) {
                updateStatus('error', '无法压缩');
                showToast('无法解析 JSON', 'error');
            }
        }

        async function copyResult() {
            if (!editor.value.trim()) return;
            try {
                await navigator.clipboard.writeText(editor.value);
                showToast('内容已复制');
            } catch (err) {
                showToast('复制失败', 'error');
            }
        }

        function clearAll() {
            editor.value = '';
            updateStatus('idle', '待输入');
        }

        
        editor.addEventListener('input', () => {
            if (!editor.value.trim()) updateStatus('idle', '待输入');
        });
        // Expose functions to window for onclick handlers
        window.beautify = beautify;
        window.clearAll = clearAll;
        window.copyResult = copyResult;
        window.minify = minify;

    </script>
</body>
</html>
