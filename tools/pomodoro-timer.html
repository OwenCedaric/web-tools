<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>番茄钟 - {{siteName}}</title>
    <meta name="description" content="基于番茄工作法的简约高效计时器，助您通过时间管理提高工作效率。">
    <meta name="tool-icon" content="ri-timer-line">
    <meta name="tool-tags" content="番茄钟, 计时器, 生产力, 时间管理">
    <link rel="stylesheet" href="/src/style.css">

</head>
<body class="bg-slate-50  text-slate-900  min-h-screen transition-colors duration-200" id="bodyCtx">
    <!-- Header -->
    <header class="h-16 bg-white/80  backdrop-blur-md border-b border-slate-200  flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100  rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-timer-line text-slate-900 " id="header-icon"></i>
                <span class="tracking-tight">专注番茄钟</span>
            </h1>
        </div>
        
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 lg:py-20">
        <div class="flex flex-col items-center space-y-12">
            <!-- Mode Switcher -->
            <div class="bg-white  border border-slate-200  p-1.5 rounded-[2rem] shadow-sm flex gap-1">
                <button onclick="setMode('work')" id="btn-work" class="px-8 py-3 rounded-[1.5rem] text-[10px] font-bold uppercase tracking-[0.2em] transition-all bg-slate-900 text-white  ">专注 (Work)</button>
                <button onclick="setMode('short')" id="btn-short" class="px-8 py-3 rounded-[1.5rem] text-[10px] font-bold uppercase tracking-[0.2em] transition-all text-slate-400">短休 (Short)</button>
                <button onclick="setMode('long')" id="btn-long" class="px-8 py-3 rounded-[1.5rem] text-[10px] font-bold uppercase tracking-[0.2em] transition-all text-slate-400">长休 (Long)</button>
            </div>

            <!-- Timer Circle -->
            <div class="relative w-72 h-72 sm:w-80 sm:h-80 flex items-center justify-center">
                <svg class="absolute inset-0 w-full h-full -rotate-90">
                    <circle cx="50%" cy="50%" r="48%" stroke="currentColor" stroke-width="4" fill="transparent" class="text-slate-100 "></circle>
                    <circle id="progress-circle" cx="50%" cy="50%" r="48%" stroke="currentColor" stroke-width="4" fill="transparent" stroke-dasharray="1000" stroke-dashoffset="0" stroke-linecap="round" class="timer-progress text-slate-900  transition-all duration-300"></circle>
                </svg>
                
                <div class="text-center z-10 space-y-1">
                    <div id="timeDisplay" class="text-7xl font-bold tracking-tighter tabular-nums text-slate-900 ">25:00</div>
                    <div id="modeLabel" class="text-[10px] font-bold uppercase tracking-[0.3em] text-slate-400">Pomodoro</div>
                </div>
            </div>

            <!-- Controls -->
            <div class="flex items-center gap-6">
                <button onclick="resetTimer()" class="w-16 h-16 flex items-center justify-center rounded-3xl bg-white  border border-slate-200  text-slate-400 hover:text-slate-900  transition-colors hover:shadow-lg active:scale-95">
                    <i class="ri-refresh-line text-2xl"></i>
                </button>
                
                <button onclick="toggleTimer()" id="startBtn" class="px-16 py-6 rounded-[2.5rem] bg-slate-900  text-white  text-sm font-bold uppercase tracking-[0.2em] shadow-2xl hover:shadow-slate-900/10 active:scale-95 transition-all">
                    开始专注
                </button>

                <button onclick="skipTimer()" class="w-16 h-16 flex items-center justify-center rounded-3xl bg-white  border border-slate-200  text-slate-400 hover:text-slate-900  transition-colors hover:shadow-lg active:scale-95" title="跳过当前阶段">
                    <i class="ri-skip-forward-line text-2xl"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <!-- INJECT_FOOTER -->

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script type="module">
        import { showToast  } from '/src/common.js';
        
        window.showToast = showToast;
        const TIMES = { work: 25 * 60, short: 5 * 60, long: 15 * 60 };
        let currentMode = 'work';
        let timeLeft = TIMES[currentMode];
        let totalTime = TIMES[currentMode];
        let isRunning = false;
        let timerId = null;

        const display = document.getElementById('timeDisplay');
        const startBtn = document.getElementById('startBtn');
        const progressCircle = document.getElementById('progress-circle');
        const circumference = 2 * Math.PI * (parseFloat(progressCircle.getAttribute('r')) / 100 * 288); // Approx for 50% r=48%

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            const str = `${m}:${s}`;
            display.textContent = str;
            document.title = `${str} - 番茄钟`;
            
            // Update circular progress
            const offset = 1000 - (timeLeft / totalTime * 1000);
            progressCircle.style.strokeDasharray = "1000";
            progressCircle.style.strokeDashoffset = offset;
        }

        function setMode(mode) {
            if (isRunning && !confirm("计时器正在运行，确定要切换并重置吗？")) return;
            
            stopTimer();
            currentMode = mode;
            timeLeft = TIMES[mode];
            totalTime = TIMES[mode];

            // UI Update
            document.querySelectorAll('button[id^="btn-"]').forEach(btn => {
                btn.className = "px-8 py-3 rounded-[1.5rem] text-[10px] font-bold uppercase tracking-[0.2em] transition-all text-slate-400";
            });
            const activeBtn = document.getElementById(`btn-${mode}`);
            activeBtn.className = "px-8 py-3 rounded-[1.5rem] text-[10px] font-bold uppercase tracking-[0.2em] transition-all bg-slate-900 text-white   shadow-xl";
            
            const labels = { work: '专注 (Pomodoro)', short: '短休 (Short Break)', long: '长休 (Long Break)' };
            document.getElementById('modeLabel').textContent = labels[mode];
            
            // Mode-specific accents (Optional: subtly change circle color for visual cue while staying grayscale-ish)
            const colors = { work: 'text-slate-900', short: 'text-emerald-500', long: 'text-sky-500' };
            progressCircle.className = `timer-progress transition-all duration-300 ${colors[mode]}`;
            
            updateDisplay();
        }

        function toggleTimer() {
            if (isRunning) stopTimer();
            else startTimer();
        }

        function startTimer() {
            if (timeLeft <= 0) return;
            isRunning = true;
            startBtn.textContent = '暂停专注';
            startBtn.classList.replace('bg-slate-900', 'bg-slate-100');
            startBtn.classList.replace('text-white', 'text-slate-500');
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    stopTimer();
                    playAlarm();
                    showToast("专注时间到！");
                }
            }, 1000);
        }

        function stopTimer() {
            isRunning = false;
            clearInterval(timerId);
            startBtn.textContent = '开始专注';
            startBtn.classList.replace('bg-slate-100', 'bg-slate-900');
            startBtn.classList.replace('text-slate-500', 'text-white');
        }

        function resetTimer() {
            stopTimer();
            timeLeft = TIMES[currentMode];
            updateDisplay();
            showToast("已重置计时器");
        }

        function skipTimer() {
            if (confirm("确定要跳过当前阶段吗？")) {
                const sequences = { work: 'short', short: 'work', long: 'work' };
                setMode(sequences[currentMode]);
                showToast("已跳过当前阶段");
            }
        }

        function playAlarm() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (ctx.state === 'suspended') ctx.resume();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime);
                gain.gain.setValueAtTime(0, ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 1.5);
                osc.start();
                osc.stop(ctx.currentTime + 1.5);
            } catch (e) {}
            alert("时间到！休息一下吧。");
        }

        // Init
        updateDisplay();
        // Expose functions to window for onclick handlers
        window.resetTimer = resetTimer;
        window.setMode = setMode;
        window.skipTimer = skipTimer;
        window.toggleTimer = toggleTimer;

    </script>
</body>
</html>
