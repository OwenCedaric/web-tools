<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keycode Info - Web Tools</title>
    <meta name="description" content="实时检测键盘事件属性，获取 JavaScript key, code, keyCode 等详细信息，完美适配开发者调试需求。">
    <meta name="tool-icon" content="ri-keyboard-line">
    <meta name="tool-tags" content="Keycode, Javascript, 事件, 键盘, 调试工具">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; overflow: hidden; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        .pop-in { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }
        
        .pulse-text { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.8; } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200 flex flex-col">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-keyboard-line text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">按键信息检测</span>
            </h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
            <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
        </button>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center p-8 relative">
        <!-- Waiting Prompt -->
        <div id="wait-prompt" class="flex flex-col items-center space-y-6 pulse-text">
            <div class="w-24 h-24 rounded-[2.5rem] bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-300 dark:text-slate-700 shadow-sm">
                <i class="ri-keyboard-box-line text-5xl"></i>
            </div>
            <p class="text-xs font-bold uppercase tracking-[0.4em] text-slate-400">请按下键盘上的任意按键</p>
        </div>

        <!-- Result Content -->
        <div id="result-content" class="hidden w-full max-w-4xl flex flex-col items-center space-y-12">
            <!-- Big Display -->
            <div class="space-y-2 text-center">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.5em]">Pressed Key</p>
                <div id="main-key" class="text-9xl font-bold tracking-tighter text-slate-900 dark:text-white pointer-events-none lowercase">A</div>
            </div>

            <!-- Details Grid -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-6 w-full">
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2rem] p-6 shadow-sm space-y-1 group hover:border-slate-900 dark:hover:border-white transition-all cursor-pointer" onclick="copyValue(this.querySelector('.card-val').innerText)">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">event.key</p>
                    <p class="card-val text-xl font-bold font-mono text-slate-900 dark:text-white break-all">-</p>
                </div>
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2rem] p-6 shadow-sm space-y-1 group hover:border-slate-900 dark:hover:border-white transition-all cursor-pointer" onclick="copyValue(this.querySelector('.card-val').innerText)">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">event.code</p>
                    <p class="card-val text-xl font-bold font-mono text-slate-900 dark:text-white break-all">-</p>
                </div>
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2rem] p-6 shadow-sm space-y-1 group hover:border-slate-900 dark:hover:border-white transition-all cursor-pointer" onclick="copyValue(this.querySelector('.card-val').innerText)">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">event.which</p>
                    <p class="card-val text-xl font-bold font-mono text-slate-900 dark:text-white break-all">-</p>
                </div>
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2rem] p-6 shadow-sm space-y-1 group hover:border-slate-900 dark:hover:border-white transition-all cursor-pointer" onclick="copyValue(this.querySelector('.card-val').innerText)">
                    <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Modifier</p>
                    <p class="card-val text-xl font-bold font-mono text-slate-900 dark:text-white break-all">None</p>
                </div>
            </div>

            <!-- Footer Hint -->
            <div class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                <i class="ri-information-line text-sm opacity-50"></i> 点击上方卡片可复制其数值
            </div>
        </div>
    </main>

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script>
        const prompt = document.getElementById('wait-prompt');
        const content = document.getElementById('result-content');
        const mainDisp = document.getElementById('main-key');
        const cards = document.querySelectorAll('.card-val');

        window.addEventListener('keydown', (e) => {
            // Prevent default for keys like Space, Tab, Alt to avoid jumping
            if ([' ', 'Tab', 'Alt', 'Meta', 'Control', 'Shift'].includes(e.key)) {
                e.preventDefault();
            }

            prompt.classList.add('hidden');
            content.classList.remove('hidden');
            content.classList.remove('pop-in');
            void content.offsetWidth; // trigger reflow
            content.classList.add('pop-in');

            let keyText = e.key;
            if (keyText === ' ') keyText = 'Space';
            
            mainDisp.textContent = keyText;
            cards[0].textContent = keyText;
            cards[1].textContent = e.code;
            cards[2].textContent = e.which || e.keyCode;

            let mods = [];
            if (e.ctrlKey) mods.push('Ctrl');
            if (e.shiftKey) mods.push('Shift');
            if (e.altKey) mods.push('Alt');
            if (e.metaKey) mods.push('Meta');
            cards[3].textContent = mods.length > 0 ? mods.join(' + ') : 'None';

        }, { passive: false });

        async function copyValue(val) {
            try {
                await navigator.clipboard.writeText(val);
                showToast("已复制: " + val);
            } catch (e) { }
        }

        function showToast(title, type = 'success') {
            const container = document.getElementById('toastContainer');
            if (container.children.length > 2) container.children[0].remove();
            const toast = document.createElement('div');
            const bgClass = type === 'success' ? 'bg-slate-900 border border-slate-800' : 'bg-rose-600';
            const icon = type === 'success' ? 'ri-checkbox-circle-fill' : 'ri-error-warning-fill';
            
            toast.className = `flex items-center gap-3 px-5 py-3 rounded-2xl shadow-2xl backdrop-blur-xl text-white transform transition-all duration-300 translate-y-10 opacity-0 ${bgClass}`;
            toast.innerHTML = `
                <i class="${icon} text-lg opacity-80"></i>
                <span class="font-bold text-[12px] truncate tracking-tight uppercase">${title}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.className = document.documentElement.classList.contains('dark') ? 'ri-sun-line text-xl opacity-70' : 'ri-moon-line text-xl opacity-70';
            }
        }

        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcon();
    </script>
</body>
</html>
