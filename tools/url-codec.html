<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL 编解码 - {{siteName}}</title>
    <meta name="description" content="在线 URL 编解码工具，处理百分比编码，解决链接参数中的各种特殊字符问题。">
    <meta name="tool-icon" content="ri-link">
    <meta name="tool-tags" content="URL, 编解码, 开发者工具, Percent-encoding">
    <link rel="stylesheet" href="/src/style.css">
    
    
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-link text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">URL 编解码</span>
            </h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
            <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
        </button>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 lg:py-12">
        <div class="grid lg:grid-cols-2 gap-6 lg:gap-8">
            <!-- Normal Panel -->
            <div class="flex flex-col gap-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="ri-article-line text-slate-400"></i> 处理前
                    </h2>
                    <div class="flex gap-4">
                        <button onclick="clearAll('raw')" class="text-[10px] font-bold text-slate-400 hover:text-rose-500 transition-colors uppercase">清空</button>
                        <button onclick="copyToClipboard('raw')" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors uppercase">复制</button>
                    </div>
                </div>
                <div class="relative group">
                    <textarea id="raw-input" 
                        class="w-full h-64 lg:h-[400px] p-8 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-sm focus:ring-2 focus:ring-slate-900 dark:focus:ring-white focus:border-transparent outline-none transition-all font-mono text-sm leading-relaxed"
                        placeholder="输入你想要转换的 URL 或参数..."></textarea>
                </div>
                <button onclick="encode()" class="w-full py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-2xl shadow-xl shadow-slate-900/10 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                    编码 URL <i class="ri-arrow-right-line opacity-50"></i>
                </button>
            </div>

            <!-- Result Panel -->
            <div class="flex flex-col gap-4">
                <div class="flex items-center justify-between px-2">
                    <h1 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="ri-braces-line text-slate-400"></i> 处理后
                    </h1>
                    <div class="flex gap-4">
                        <button onclick="clearAll('encoded')" class="text-[10px] font-bold text-slate-400 hover:text-rose-500 transition-colors uppercase">清空</button>
                        <button onclick="copyToClipboard('encoded')" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors uppercase tracking-widest">复制</button>
                    </div>
                </div>
                <div class="relative group">
                    <textarea id="encoded-input" 
                        class="w-full h-64 lg:h-[400px] p-8 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-sm focus:ring-2 focus:ring-slate-900 dark:focus:ring-white focus:border-transparent outline-none transition-all font-mono text-sm leading-relaxed"
                        placeholder="在此处输入或粘贴已编码的内容..."></textarea>
                </div>
                <button onclick="decode()" class="w-full py-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 font-bold rounded-2xl shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                    <i class="ri-arrow-left-line opacity-50"></i> 解码 URL
                </button>
            </div>
        </div>
    </main>

    <!-- INJECT_FOOTER -->

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script type="module">
        import { initTheme, toggleTheme, showToast } from '/src/common.js';
        window.toggleTheme = toggleTheme;
        window.showToast = showToast;
        const rawEl = document.getElementById('raw-input');
        const encodedEl = document.getElementById('encoded-input');

        function encode() {
            try {
                const val = rawEl.value;
                if (!val) return;
                encodedEl.value = encodeURIComponent(val);
                showToast("编码完成");
            } catch (e) {
                showToast("编码失败", "error");
            }
        }

        function decode() {
            try {
                const val = encodedEl.value;
                if (!val) return;
                rawEl.value = decodeURIComponent(val);
                showToast("解码完成");
            } catch (e) {
                showToast("无效编码格式", "error");
            }
        }

        async function copyToClipboard(type) {
            const el = type === 'raw' ? rawEl : encodedEl;
            if (!el.value) return;
            try {
                await navigator.clipboard.writeText(el.value);
                showToast("已成功复制");
            } catch (err) {
                showToast("复制过程中出错", "error");
            }
        }

        function clearAll(type) {
            if (type === 'raw') rawEl.value = '';
            else encodedEl.value = '';
        }
        // Expose functions to window for onclick handlers
        window.clearAll = clearAll;
        window.copyToClipboard = copyToClipboard;
        window.decode = decode;
        window.encode = encode;

    </script>
</body>
</html>
