<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视觉排版引擎 v4.0 - {{siteName}}</title>
    <meta name="description" content="图文完全解耦版引擎，支持双向标签、自由拖拽布局、与AI纯净底图合成。">
    <meta name="tool-icon" content="ri-layout-masonry-line">
    <meta name="tool-tags" content="Design, Typography, E-commerce, Tool">
    <link rel="stylesheet" href="/src/style.css">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    
    <style>
        /* 强制渲染区西里尔字母使用无衬线粗体 */
        .ru-typography {
            font-family: "Arial Black", "Impact", sans-serif;
            text-transform: uppercase;
        }

        .draggable-element {
            cursor: move;
            pointer-events: auto;
            z-index: 50;
        }

        .draggable-element:hover {
            outline: 2px dashed #ff6b00;
            outline-offset: 4px;
            border-radius: 4px;
        }

        .canvas-container {
            width: 600px;
            height: 800px;
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .canvas-container {
                transform: scale(0.6);
                transform-origin: top center;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-layout-masonry-line text-slate-900"></i>
                <span class="tracking-tight">视觉排版引擎 v4.0</span>
            </h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 lg:py-12">
        <div id="root"></div>
    </main>

    <!-- Footer -->
    <!-- INJECT_FOOTER -->

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script type="module">
        import { showToast } from '/src/common.js';
        window.showToast = showToast;
    </script>
    
    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        const initialData = {
            product_name: { text: "СИБИРСКИЙ ВСПЛЕСК", pos: { x: 300, y: 60 } },
            callouts: [
                { label: "НАТУРАЛЬНЫЙ", content: "ЛИСТ ТЕА", dir: "left", pos: { x: 150, y: 250 } },
                { label: "СУПЕР", content: "ОХЛАЖДЕНИЕ", dir: "right", pos: { x: 450, y: 480 } },
                { label: "ВИТАМИН C +", content: "ВИТАМИН C", dir: "right", pos: { x: 450, y: 650 } }
            ],
            sidebar: {
                title: "ХАРАКТЕРИСТИКИ",
                pos: { x: 480, y: 280 },
                parameters: [
                    { name: "ОБЪЕМ", value: "500 МЛ" },
                    { name: "КЭШБЭК", value: "10%" }
                ]
            },
            reviews: { stars: 5, text: "ОЧЕНЬ ВКУСНО, БОДРИТ!", pos: { x: 400, y: 730 } }
        };

        function App() {
            const [imageSrc, setImageSrc] = useState(null);
            const [data, setData] = useState(initialData);
            const [jsonText, setJsonText] = useState(JSON.stringify(initialData, null, 2));
            const canvasRef = useRef(null);

            // 同步数据到 JSON 文本框
            useEffect(() => {
                setJsonText(JSON.stringify(data, null, 2));
            }, [data]);

            const handleJsonChange = (e) => {
                setJsonText(e.target.value);
                try {
                    const parsed = JSON.parse(e.target.value);
                    setData(parsed);
                } catch (err) { }
            };

            const handleDrag = (id, clientX, clientY, type, offset) => {
                if (type !== 'move') return;
                const rect = canvasRef.current.getBoundingClientRect();
                const scale = 600 / rect.width;
                let newX = (clientX - rect.left) * scale - offset.x;
                let newY = (clientY - rect.top) * scale - offset.y;

                setData(prev => {
                    const next = { ...prev };
                    if (id === 'p-name') next.product_name.pos = { x: newX, y: newY };
                    else if (id === 'sidebar') next.sidebar.pos = { x: newX, y: newY };
                    else if (id === 'reviews') next.reviews.pos = { x: newX, y: newY };
                    else if (id.startsWith('callout-')) {
                        const index = parseInt(id.split('-')[1]);
                        next.callouts[index].pos = { x: newX, y: newY };
                    }
                    return next;
                });
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => setImageSrc(ev.target.result);
                    reader.readAsDataURL(file);
                }
            };

            const exportImage = () => {
                if (!canvasRef.current) return;
                html2canvas(canvasRef.current, { scale: 2, useCORS: true }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `ru_ecomm_asset_${Date.now()}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    if (window.showToast) {
                        window.showToast('导出成功');
                    }
                });
            };

            return (
                <div className="bg-white border border-slate-200 rounded-[2.5rem] shadow-sm overflow-hidden flex flex-col md:flex-row min-h-[75vh]">
                    {/* 左侧：控制台 */}
                    <div className="w-full md:w-1/3 bg-slate-50 border-r border-slate-200 p-8 flex flex-col gap-6">
                        <div className="flex flex-col gap-3">
                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wide">1. 上传 AI 底图</label>
                            <input
                                type="file"
                                accept="image/*"
                                onChange={handleImageUpload}
                                className="text-sm file:mr-4 file:py-2.5 file:px-5 file:border-0 file:rounded-xl file:text-xs file:font-bold file:bg-slate-900 file:text-white hover:file:bg-slate-800 transition-colors file:shadow-lg file:shadow-slate-900/10 cursor-pointer block w-full border border-slate-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-slate-900"
                            />
                        </div>

                        <div className="flex flex-col gap-3 flex-grow">
                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wide">2. JSON 配置 (支持 dir 左右切换与拖动同步)</label>
                            <textarea
                                value={jsonText}
                                onChange={handleJsonChange}
                                className="w-full flex-grow p-5 bg-white border border-slate-200 rounded-2xl text-sm font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent resize-none shadow-sm custom-scroll leading-relaxed"
                            ></textarea>
                        </div>

                        <button
                            onClick={exportImage}
                            className="w-full py-4 bg-slate-900 text-white text-xs font-bold rounded-xl shadow-lg shadow-slate-900/10 active:scale-95 transition-all flex items-center justify-center gap-2 uppercase tracking-widest"
                        >
                            <i className="ri-download-2-line text-sm"></i> 导出 3:4 高转化率资产
                        </button>
                    </div>

                    {/* 右侧：3:4 渲染画布 */}
                    <div className="w-full md:w-2/3 bg-slate-100/50 flex items-center justify-center p-8 overflow-auto">
                        <div
                            ref={canvasRef}
                            className="canvas-container relative bg-white shadow-xl overflow-hidden ru-typography pointer-events-none select-none"
                            style={{ flexShrink: 0 }}
                        >
                            {/* 底图层 */}
                            {imageSrc ? (
                                <img src={imageSrc} className="absolute inset-0 w-full h-full object-cover z-0" />
                            ) : (
                                <div className="absolute inset-0 flex flex-col items-center justify-center border-2 border-dashed border-slate-300 bg-slate-50 z-0 m-6 text-slate-400">
                                    <i className="ri-image-add-line text-4xl mb-2"></i>
                                    <p className="font-bold text-sm tracking-widest">等待底图加载</p>
                                </div>
                            )}

                            {/* 信息图表覆盖层 (Overlay UI) */}
                            <div className="absolute inset-0 z-10 p-8">
                                {/* PRODUCT NAME */}
                                {data.product_name && (
                                    <DraggableItem id="p-name" pos={data.product_name.pos} onDrag={handleDrag} centered>
                                        <div className="bg-[#FF6B00] text-white px-6 py-2 text-3xl font-black shadow-[4px_4px_0_rgba(0,0,0,1)] whitespace-nowrap">
                                            {data.product_name.text}
                                        </div>
                                    </DraggableItem>
                                )}

                                {/* CALLOUTS (左右双向) */}
                                {data.callouts && data.callouts.map((c, i) => (
                                    <DraggableItem key={i} id={`callout-${i}`} pos={c.pos} onDrag={handleDrag}>
                                        <div className={`flex items-center ${c.dir === 'right' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {/* LABEL BOX */}
                                            <div className={`bg-white border-2 border-black p-2 shadow-[4px_4px_0_rgba(0,0,0,1)] min-w-[120px] ${c.dir === 'right' ? 'text-right' : 'text-left'}`}>
                                                <div className="text-[10px] font-bold text-slate-500">{c.label}</div>
                                                <div className="text-lg font-black text-black leading-none mt-1">{c.content}</div>
                                            </div>
                                            {/* DYNAMIC POINTER LINE */}
                                            <div className="flex items-center">
                                                <div className="w-10 h-[2px] bg-black"></div>
                                                <div className="w-3 h-3 rounded-full border-2 border-black bg-white"></div>
                                            </div>
                                        </div>
                                    </DraggableItem>
                                ))}

                                {/* SIDEBAR */}
                                {data.sidebar && (
                                    <DraggableItem id="sidebar" pos={data.sidebar.pos} onDrag={handleDrag} centered>
                                        <div className="w-[280px]">
                                            <div className="bg-[#0066FF] text-white p-2 text-xl font-black text-center shadow-[4px_4px_0_rgba(0,0,0,1)] uppercase">
                                                {data.sidebar.title}
                                            </div>
                                            <div className="bg-white border-2 border-[#0066FF] p-4 flex justify-between shadow-[4px_4px_0_rgba(0,0,0,0.2)]">
                                                {data.sidebar.parameters && data.sidebar.parameters.map((p, idx) => (
                                                    <div key={idx} className="flex flex-col items-center">
                                                        <span className="text-4xl font-black text-black">{p.value.split(' ')[0]}</span>
                                                        <span className="text-[10px] font-bold text-slate-500 mt-1">{p.value.split(' ')[1] || p.name}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </DraggableItem>
                                )}

                                {/* REVIEWS */}
                                {data.reviews && (
                                    <DraggableItem id="reviews" pos={data.reviews.pos} onDrag={handleDrag} centered>
                                        <div className="bg-white p-3 border-2 border-dashed border-slate-300 text-center shadow-md">
                                            <div className="text-orange-400 text-xl tracking-[0.2em]">{"★".repeat(data.reviews.stars)}</div>
                                            <p className="text-[10px] font-black leading-tight mt-1">{data.reviews.text}</p>
                                        </div>
                                    </DraggableItem>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // 拖拽辅助组件
        function DraggableItem({ id, pos, onDrag, children, centered }) {
            const ref = useRef(null);
            const [startOffset, setStartOffset] = useState({ x: 0, y: 0 });

            const onMouseDown = (e) => {
                const rect = ref.current.getBoundingClientRect();
                const offsetX = centered ? (e.clientX - (rect.left + rect.width / 2)) : (e.clientX - rect.left);
                const offsetY = e.clientY - rect.top;
                setStartOffset({ x: offsetX, y: offsetY });

                const onMouseMove = (moveE) => onDrag(id, moveE.clientX, moveE.clientY, 'move', { x: offsetX, y: offsetY });
                const onMouseUp = () => {
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                };
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
            };

            const style = {
                left: `${pos.x}px`,
                top: `${pos.y}px`,
                transform: centered ? 'translateX(-50%)' : 'none'
            };

            return (
                <div ref={ref} onMouseDown={onMouseDown} className="absolute draggable-element" style={style}>
                    {children}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
