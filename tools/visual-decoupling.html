<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视觉排版引擎 v4.0 - {{siteName}}</title>
    <meta name="description" content="图文完全解耦版引擎，支持双向标签、自由拖拽布局、与AI纯净底图合成。">
    <meta name="tool-icon" content="ri-layout-masonry-line">
    <meta name="tool-tags" content="Design, Typography, E-commerce, Tool">
    <link rel="stylesheet" href="/src/style.css">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
    
    <style>
        /* 强制渲染区西里尔字母使用无衬线粗体 */
        .ru-typography {
            font-family: "Arial Black", "Impact", sans-serif;
            text-transform: uppercase;
        }

        .draggable-element {
            cursor: move;
            pointer-events: auto;
            z-index: 50;
        }

        .draggable-element:hover {
            outline: 2px dashed #ff6b00;
            outline-offset: 4px;
            border-radius: 4px;
        }

        .canvas-container {
            width: 600px;
            height: 800px;
            transition: all 0.3s ease;
        }

        @media (max-width: 768px) {
            .canvas-container {
                transform: scale(0.6);
                transform-origin: top center;
            }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 backdrop-blur-md border-b border-slate-200 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-layout-masonry-line text-slate-900"></i>
                <span class="tracking-tight">视觉排版引擎 v4.0</span>
            </h1>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 lg:py-12">
        <div id="root"></div>
    </main>

    <!-- Footer -->
    <!-- INJECT_FOOTER -->

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script type="module">
        import { showToast } from '/src/common.js';
        window.showToast = showToast;
    </script>
    
    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        const initialData = {
            product_name: { text: "СИБИРСКИЙ ВСПЛЕСК", pos: { x: 300, y: 60 } },
            callouts: [
                { label: "НАТУРАЛЬНЫЙ", content: "ЛИСТ ТЕА", dir: "left", pos: { x: 150, y: 250 } },
                { label: "СУПЕР", content: "ОХЛАЖДЕНИЕ", dir: "right", pos: { x: 450, y: 480 } },
                { label: "ВИТАМИН C +", content: "ВИТАМИН C", dir: "right", pos: { x: 450, y: 650 } }
            ],
            sidebar: {
                title: "ХАРАКТЕРИСТИКИ",
                pos: { x: 480, y: 280 },
                parameters: [
                    { name: "ОБЪЕМ", value: "500 МЛ" },
                    { name: "КЭШБЭК", value: "10%" }
                ]
            },
            reviews: { stars: 5, text: "ОЧЕНЬ ВКУСНО, БОДРИТ!", pos: { x: 400, y: 730 } }
        };

        function App() {
            const [imageSrc, setImageSrc] = useState(null);
            const [data, setData] = useState(initialData);
            const [jsonText, setJsonText] = useState(JSON.stringify(initialData, null, 2));
            const canvasRef = useRef(null);

            // 同步数据到 JSON 文本框
            useEffect(() => {
                setJsonText(JSON.stringify(data, null, 2));
            }, [data]);

            const handleJsonChange = (e) => {
                setJsonText(e.target.value);
                try {
                    const parsed = JSON.parse(e.target.value);
                    setData(parsed);
                } catch (err) { }
            };

            const handleDrag = (id, clientX, clientY, type, extra) => {
                setData(prev => {
                    const next = JSON.parse(JSON.stringify(prev));
                    let target;
                    if (id === 'p-name') target = next.product_name;
                    else if (id === 'sidebar') target = next.sidebar;
                    else if (id === 'reviews') target = next.reviews;
                    else if (id.startsWith('callout-')) {
                        const index = parseInt(id.split('-')[1]);
                        target = next.callouts[index];
                    }
                    if (!target) return next;

                    if (type === 'move') {
                        target.pos = { x: extra.x, y: extra.y };
                    } else if (type === 'resize') {
                        target.scale = extra;
                    } else if (type === 'width') {
                        target.width = extra;
                    }
                    return next;
                });
            };

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (ev) => setImageSrc(ev.target.result);
                    reader.readAsDataURL(file);
                }
            };

            const exportImage = () => {
                if (!canvasRef.current) return;
                
                if (typeof htmlToImage === 'undefined') {
                    if (window.showToast) window.showToast('截图库加载失败，请检查网络');
                    else alert('截图库加载失败，请检查网络');
                    return;
                }
                
                htmlToImage.toPng(canvasRef.current, { pixelRatio: 2 })
                    .then(dataUrl => {
                        const link = document.createElement('a');
                        link.download = `ru_ecomm_asset_${Date.now()}.png`;
                        link.href = dataUrl;
                        link.click();
                        if (window.showToast) window.showToast('导出成功');
                        else alert('导出成功');
                    })
                    .catch(err => {
                        console.error('Export failed:', err);
                        const msg = err ? (err.message || err.toString()) : '未知错误';
                        if (window.showToast) window.showToast('导出失败: ' + msg);
                        else alert('导出失败: ' + msg);
                    });
            };

            return (
                <div className="bg-white border border-slate-200 rounded-[2.5rem] shadow-sm overflow-hidden flex flex-col md:flex-row min-h-[75vh]">
                    {/* 左侧：控制台 */}
                    <div className="w-full md:w-1/3 bg-slate-50 border-r border-slate-200 p-8 flex flex-col gap-6">
                        <div className="flex flex-col gap-3">
                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wide">1. 上传 AI 底图</label>
                            <input
                                type="file"
                                accept="image/*"
                                onChange={handleImageUpload}
                                className="text-sm file:mr-4 file:py-2.5 file:px-5 file:border-0 file:rounded-xl file:text-xs file:font-bold file:bg-slate-900 file:text-white hover:file:bg-slate-800 transition-colors file:shadow-lg file:shadow-slate-900/10 cursor-pointer block w-full border border-slate-200 rounded-xl bg-white focus:outline-none focus:ring-2 focus:ring-slate-900"
                            />
                        </div>

                        <div className="flex flex-col gap-3 flex-grow">
                            <label className="text-xs font-bold text-slate-500 uppercase tracking-wide">2. JSON 配置 (支持 dir 左右切换与拖动同步)</label>
                            <textarea
                                value={jsonText}
                                onChange={handleJsonChange}
                                className="w-full flex-grow p-5 bg-white border border-slate-200 rounded-2xl text-sm font-mono text-slate-800 focus:outline-none focus:ring-2 focus:ring-slate-900 focus:border-transparent resize-y shadow-sm custom-scroll leading-relaxed"
                            ></textarea>
                        </div>

                        <button
                            onClick={exportImage}
                            className="w-full py-4 bg-slate-900 text-white text-xs font-bold rounded-xl shadow-lg shadow-slate-900/10 active:scale-95 transition-all flex items-center justify-center gap-2 uppercase tracking-widest"
                        >
                            <i className="ri-download-2-line text-sm"></i> 导出 3:4 高转化率资产
                        </button>
                    </div>

                    {/* 右侧：3:4 渲染画布 */}
                    <div className="w-full md:w-2/3 bg-slate-100/50 flex items-center justify-center p-8 overflow-auto">
                        <div
                            ref={canvasRef}
                            className="canvas-container relative bg-white shadow-xl overflow-hidden ru-typography pointer-events-none select-none"
                            style={{ flexShrink: 0 }}
                        >
                            {/* 底图层 */}
                            {imageSrc ? (
                                <img src={imageSrc} className="absolute inset-0 w-full h-full object-cover z-0" />
                            ) : (
                                <div className="absolute inset-0 flex flex-col items-center justify-center border-2 border-dashed border-slate-300 bg-slate-50 z-0 m-6 text-slate-400">
                                    <i className="ri-image-add-line text-4xl mb-2"></i>
                                    <p className="font-bold text-sm tracking-widest">等待底图加载</p>
                                </div>
                            )}

                            {/* 信息图表覆盖层 (Overlay UI) */}
                            <div className="absolute inset-0 z-10 p-8">
                                {/* PRODUCT NAME */}
                                {data.product_name && (
                                    <DraggableItem id="p-name" pos={data.product_name.pos} scale={data.product_name.scale || 1} onDrag={handleDrag} centered>
                                        <div className="relative">
                                            <div 
                                                className="bg-[#FF6B00] text-white px-6 py-2 text-3xl font-black shadow-[4px_4px_0_rgba(0,0,0,1)] whitespace-pre-wrap break-words text-center"
                                                style={{ width: data.product_name.width ? `${data.product_name.width}px` : 'auto', minWidth: '150px' }}
                                            >
                                                {data.product_name.text}
                                            </div>
                                            <WidthHandle id="p-name" width={data.product_name.width} scale={data.product_name.scale || 1} startWidthDefault={200} onDrag={handleDrag} dir="right" />
                                            <WidthHandle id="p-name" width={data.product_name.width} scale={data.product_name.scale || 1} startWidthDefault={200} onDrag={handleDrag} dir="left" />
                                        </div>
                                    </DraggableItem>
                                )}

                                {/* CALLOUTS (左右双向) */}
                                {data.callouts && data.callouts.map((c, i) => (
                                    <DraggableItem key={i} id={`callout-${i}`} pos={c.pos} scale={c.scale || 1} onDrag={handleDrag}>
                                        <div className={`flex items-center ${c.dir === 'right' ? 'flex-row-reverse' : 'flex-row'}`}>
                                            {/* LABEL BOX */}
                                            <div className="relative">
                                                <div 
                                                    className={`bg-white border-2 border-black p-2 shadow-[4px_4px_0_rgba(0,0,0,1)] whitespace-pre-wrap break-words ${c.dir === 'right' ? 'text-right' : 'text-left'}`}
                                                    style={{ width: c.width ? `${c.width}px` : 'auto', minWidth: '120px' }}
                                                >
                                                    <div className="text-[10px] font-bold text-slate-500">{c.label}</div>
                                                    <div className="text-lg font-black text-black leading-none mt-1">{c.content}</div>
                                                </div>
                                                <WidthHandle 
                                                    id={`callout-${i}`} 
                                                    width={c.width} 
                                                    scale={c.scale || 1}
                                                    startWidthDefault={120} 
                                                    onDrag={handleDrag} 
                                                    dir={c.dir === 'right' ? 'left' : 'right'} 
                                                />
                                            </div>
                                            {/* DYNAMIC POINTER LINE */}
                                            <div className="flex items-center">
                                                <div className="w-10 h-[2px] bg-black"></div>
                                                <div className="w-3 h-3 rounded-full border-2 border-black bg-white"></div>
                                            </div>
                                        </div>
                                    </DraggableItem>
                                ))}

                                {/* SIDEBAR */}
                                {data.sidebar && (
                                    <DraggableItem id="sidebar" pos={data.sidebar.pos} scale={data.sidebar.scale || 1} onDrag={handleDrag} centered>
                                        <div className="relative">
                                            <div style={{ width: data.sidebar.width ? `${data.sidebar.width}px` : '280px', minWidth: '180px' }}>
                                                <div className="bg-[#0066FF] text-white p-2 text-xl font-black text-center shadow-[4px_4px_0_rgba(0,0,0,1)] uppercase whitespace-pre-wrap break-words">
                                                    {data.sidebar.title}
                                                </div>
                                                <div className="bg-white border-2 border-[#0066FF] p-4 flex justify-between shadow-[4px_4px_0_rgba(0,0,0,0.2)]">
                                                    {data.sidebar.parameters && data.sidebar.parameters.map((p, idx) => (
                                                        <div key={idx} className="flex flex-col items-center">
                                                            <span className="text-4xl font-black text-black">{p.value.split(' ')[0]}</span>
                                                            <span className="text-[10px] font-bold text-slate-500 mt-1">{p.value.split(' ')[1] || p.name}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            <WidthHandle id="sidebar" width={data.sidebar.width} scale={data.sidebar.scale || 1} startWidthDefault={280} onDrag={handleDrag} dir="right" />
                                            <WidthHandle id="sidebar" width={data.sidebar.width} scale={data.sidebar.scale || 1} startWidthDefault={280} onDrag={handleDrag} dir="left" />
                                        </div>
                                    </DraggableItem>
                                )}

                                {/* REVIEWS */}
                                {data.reviews && (
                                    <DraggableItem id="reviews" pos={data.reviews.pos} scale={data.reviews.scale || 1} onDrag={handleDrag} centered>
                                        <div className="relative">
                                            <div 
                                                className="bg-white p-3 border-2 border-dashed border-slate-300 text-center shadow-md whitespace-pre-wrap break-words"
                                                style={{ width: data.reviews.width ? `${data.reviews.width}px` : 'auto', minWidth: '150px' }}
                                            >
                                                <div className="text-orange-400 text-xl tracking-[0.2em]">{"★".repeat(data.reviews.stars)}</div>
                                                <p className="text-[10px] font-black leading-tight mt-1">{data.reviews.text}</p>
                                            </div>
                                            <WidthHandle id="reviews" width={data.reviews.width} scale={data.reviews.scale || 1} startWidthDefault={150} onDrag={handleDrag} dir="right" />
                                            <WidthHandle id="reviews" width={data.reviews.width} scale={data.reviews.scale || 1} startWidthDefault={150} onDrag={handleDrag} dir="left" />
                                        </div>
                                    </DraggableItem>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // 拖拽辅助组件
        function DraggableItem({ id, pos, scale = 1, onDrag, children, centered }) {
            const ref = useRef(null);

            const onMouseDown = (e) => {
                e.stopPropagation();
                
                // 处理整体缩放
                if (e.target.classList.contains('scale-handle') || e.target.closest('.scale-handle')) {
                    const startX = e.clientX;
                    const startScale = scale;
                    const onMouseMove = (moveE) => {
                        const deltaX = moveE.clientX - startX;
                        const newScale = Math.max(0.3, Math.min(5, startScale + deltaX * 0.01));
                        onDrag(id, 0, 0, 'resize', Number(newScale.toFixed(2)));
                    };
                    const onMouseUp = () => {
                        window.removeEventListener('mousemove', onMouseMove);
                        window.removeEventListener('mouseup', onMouseUp);
                    };
                    window.addEventListener('mousemove', onMouseMove);
                    window.addEventListener('mouseup', onMouseUp);
                    return;
                }

                // 处理平滑移动 (使用Delta规避scale偏移)
                const startClientX = e.clientX;
                const startClientY = e.clientY;
                const startPos = { ...pos };

                const onMouseMove = (moveE) => {
                    const canvasRect = document.querySelector('.canvas-container').getBoundingClientRect();
                    const viewScale = 600 / canvasRect.width;
                    
                    const deltaX = (moveE.clientX - startClientX) * viewScale;
                    const deltaY = (moveE.clientY - startClientY) * viewScale;
                    
                    onDrag(id, 0, 0, 'move', { 
                        x: Math.round(startPos.x + deltaX), 
                        y: Math.round(startPos.y + deltaY) 
                    });
                };
                
                const onMouseUp = () => {
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                };
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
            };

            const style = {
                left: `${pos.x}px`,
                top: `${pos.y}px`,
                transform: centered ? `translateX(-50%) scale(${scale})` : `scale(${scale})`,
                transformOrigin: centered ? 'top center' : 'top left',
            };

            return (
                <div ref={ref} onMouseDown={onMouseDown} className="absolute draggable-element group" style={style}>
                    {children}
                    <div className="scale-handle absolute -right-3 -bottom-3 w-6 h-6 bg-slate-800 border-2 border-white rounded-full shadow-md opacity-0 group-hover:opacity-100 cursor-nwse-resize flex items-center justify-center transition-opacity z-50" title="拖拽缩放(文字大小)">
                        <svg className="w-3 h-3 text-white pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4"></path></svg>
                    </div>
                </div>
            );
        }

        // 宽度调整手柄 (用于控制文字换行)
        function WidthHandle({ id, width, scale = 1, onDrag, startWidthDefault, dir = 'right' }) {
            const onMouseDown = (e) => {
                e.stopPropagation();
                const startX = e.clientX;
                const startWidth = width || startWidthDefault;
                
                const onMouseMove = (moveE) => {
                    const canvasRect = document.querySelector('.canvas-container').getBoundingClientRect();
                    const viewScale = 600 / canvasRect.width;
                    
                    // 修正因为缩放导致的拖拽速度差异
                    const deltaX = (moveE.clientX - startX) * viewScale / scale;
                    const delta = dir === 'left' ? -deltaX : deltaX;
                    const newWidth = Math.max(50, startWidth + delta);
                    
                    onDrag(id, 0, 0, 'width', Math.round(newWidth));
                };
                const onMouseUp = () => {
                    window.removeEventListener('mousemove', onMouseMove);
                    window.removeEventListener('mouseup', onMouseUp);
                };
                window.addEventListener('mousemove', onMouseMove);
                window.addEventListener('mouseup', onMouseUp);
            };

            const posClass = dir === 'left' ? '-left-2 cursor-w-resize' : '-right-2 cursor-e-resize';

            return (
                <div 
                    onMouseDown={onMouseDown}
                    className={`absolute top-0 bottom-0 w-4 ${posClass} bg-blue-500/0 hover:bg-blue-500/50 transition-colors z-40 rounded`}
                    title="拖拽调整宽度(控制换行)"
                ></div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
