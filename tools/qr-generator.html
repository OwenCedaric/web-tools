<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code 生成器 - {{siteName}}</title>
    <meta name="description" content="极简高效的在线二维码生成工具，支持文本、网址转换，可调节容错率与尺寸，一键下载保存。">
    <meta name="tool-icon" content="ri-qr-code-line">
    <meta name="tool-tags" content="二维码, QR Code, 生成器, 开发者工具">
    <link rel="stylesheet" href="/src/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-qr-code-line text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">QR Code 生成器</span>
            </h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
            <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
        </button>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 lg:py-12">
        <div class="grid lg:grid-cols-[1fr,400px] gap-8">
            <!-- Left: Settings -->
            <div class="space-y-6">
                <!-- Data Input -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2.5rem] p-8 shadow-sm space-y-4">
                    <div class="flex items-center justify-between mb-4">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                             <i class="ri-article-line"></i> 二维码内容
                        </label>
                        <button onclick="clearAll()" class="text-[10px] font-bold text-slate-400 hover:text-rose-500 transition-colors uppercase">清空</button>
                    </div>
                    <textarea id="qr-data" 
                        class="w-full h-40 p-6 bg-slate-50 dark:bg-slate-800/50 border-none rounded-2xl focus:ring-2 focus:ring-slate-900 dark:focus:ring-white outline-none transition-all font-medium text-sm leading-relaxed"
                        placeholder="输入网址或文本..."></textarea>
                </div>

                <!-- Appearance -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2.5rem] p-8 shadow-sm space-y-8">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="ri-equalizer-line"></i> 外观设置
                    </h2>
                    
                    <div class="grid sm:grid-cols-2 gap-8">
                        <!-- Colors -->
                        <div class="space-y-4">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">颜色配置</label>
                            <div class="grid grid-cols-2 gap-3">
                                <div class="space-y-2">
                                    <span class="text-[10px] text-slate-400 p-1">前景色</span>
                                    <input type="color" id="qr-color-dark" value="#0f172a" class="w-full h-10 rounded-xl cursor-pointer border-none bg-slate-50 dark:bg-slate-800">
                                </div>
                                <div class="space-y-2">
                                    <span class="text-[10px] text-slate-400 p-1">背景色</span>
                                    <input type="color" id="qr-color-light" value="#ffffff" class="w-full h-10 rounded-xl cursor-pointer border-none bg-slate-50 dark:bg-slate-800">
                                </div>
                            </div>
                        </div>

                        <!-- Error Correction -->
                        <div class="space-y-4">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">容错级别</label>
                            <select id="qr-error-level" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-xl px-4 py-3 text-sm font-bold focus:ring-2 focus:ring-slate-900 dark:focus:ring-white outline-none">
                                <option value="L">L (7%) - 极速</option>
                                <option value="M" selected>M (15%) - 标准</option>
                                <option value="Q">Q (25%) - 良好</option>
                                <option value="H">H (30%) - 最佳</option>
                            </select>
                        </div>
                    </div>

                    <!-- Margin & Size -->
                    <div class="grid sm:grid-cols-2 gap-8">
                        <div class="space-y-4">
                            <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                <span>内边距 (Margin)</span>
                                <span id="margin-val" class="text-slate-900 dark:text-white font-mono">2</span>
                            </div>
                            <input type="range" id="qr-margin" min="0" max="100" value="2" class="w-full h-1.5 bg-slate-100 dark:bg-slate-800 rounded-lg appearance-none cursor-pointer accent-slate-900 dark:accent-white">
                        </div>
                        <div class="space-y-4">
                            <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                <span>尺寸 (Size)</span>
                                <span id="size-val" class="text-slate-900 dark:text-white font-mono">400px</span>
                            </div>
                            <input type="range" id="qr-size" min="100" max="2000" step="50" value="400" class="w-full h-1.5 bg-slate-100 dark:bg-slate-800 rounded-lg appearance-none cursor-pointer accent-slate-900 dark:accent-white">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Preview -->
            <div class="space-y-6">
                <!-- Preview Canvas Card -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[3rem] p-6 shadow-sm overflow-hidden flex flex-col items-center">
                    <div class="w-full flex items-center justify-between mb-8 px-2">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">实时预览</span>
                        <div class="flex items-center gap-1.5 text-[10px] font-bold text-emerald-500 uppercase tracking-tighter">
                            <i class="ri-checkbox-circle-fill"></i> 即时更新
                        </div>
                    </div>
                    
                    <div class="preview-checkerboard w-full aspect-square rounded-[2rem] flex items-center justify-center overflow-hidden p-8 border border-slate-50 dark:border-slate-800 shadow-inner">
                        <canvas id="preview-canvas" class="rounded-lg shadow-2xl"></canvas>
                    </div>

                    <div class="w-full mt-10 grid grid-cols-2 gap-4">
                         <div class="p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-100 dark:border-slate-800 text-center">
                             <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">密度</p>
                             <span id="version-display" class="text-xs font-mono font-bold">—</span>
                         </div>
                         <div class="p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl border border-slate-100 dark:border-slate-800 text-center">
                             <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">类型</p>
                             <span class="text-xs font-bold uppercase tracking-widest">Static</span>
                         </div>
                    </div>
                </div>

                <!-- Download Actions -->
                <div class="flex gap-4">
                    <button onclick="download('png')" class="flex-1 h-16 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-2xl shadow-xl active:scale-95 transition-all flex items-center justify-center gap-2">
                        <i class="ri-file-download-line text-lg"></i>
                        <span class="uppercase tracking-widest">PNG 导出</span>
                    </button>
                    <button onclick="download('svg')" class="flex-1 h-16 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white font-bold rounded-2xl shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <i class="ri-code-s-line text-lg"></i>
                        <span class="uppercase tracking-widest">SVG 导出</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <!-- INJECT_FOOTER -->

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script type="module">
        import { initTheme, toggleTheme, showToast } from '/src/common.js';
        window.toggleTheme = toggleTheme;
        window.showToast = showToast;
        const inputs = {
            data: document.getElementById('qr-data'),
            colorDark: document.getElementById('qr-color-dark'),
            colorLight: document.getElementById('qr-color-light'),
            size: document.getElementById('qr-size'),
            margin: document.getElementById('qr-margin'),
            level: document.getElementById('qr-error-level')
        };

        const canvas = document.getElementById('preview-canvas');

        function generateQR() {
            const data = inputs.data.value.trim() || "https://github.com/cedar-tools";
            
            QRCode.toCanvas(canvas, data, {
                width: inputs.size.value,
                margin: inputs.margin.value,
                errorCorrectionLevel: inputs.level.value,
                color: {
                    dark: inputs.colorDark.value,
                    light: inputs.colorLight.value
                }
            }, function (error) {
                if (error) {
                    console.error(error);
                    showToast("生成失败，内容过长", "error");
                } else {
                    document.getElementById('size-val').textContent = `${inputs.size.value}px`;
                    document.getElementById('margin-val').textContent = inputs.margin.value;
                    // Extract version (rough estimation from visual modules)
                    document.getElementById('version-display').textContent = `Standard`;
                }
            });
        }

        async function download(format) {
            const data = inputs.data.value.trim() || "web-tools";
            if (format === 'png') {
                const link = document.createElement('a');
                link.download = `qr-${Date.now()}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            } else {
                // Generate SVG
                try {
                    const svgString = await QRCode.toString(data, {
                        type: 'svg',
                        width: inputs.size.value,
                        margin: inputs.margin.value,
                        errorCorrectionLevel: inputs.level.value,
                        color: {
                            dark: inputs.colorDark.value,
                            light: inputs.colorLight.value
                        }
                    });
                    const blob = new Blob([svgString], {type: 'image/svg+xml'});
                    const url = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.download = `qr-${Date.now()}.svg`;
                    link.href = url;
                    link.click();
                    URL.revokeObjectURL(url);
                } catch (e) {
                    showToast("SVG 导出失败", "error");
                }
            }
            showToast('已开始下载');
        }

        function clearAll() {
            inputs.data.value = '';
            generateQR();
        }

        
        
        Object.values(inputs).forEach(el => el.addEventListener('input', generateQR));
        // Initial Generate
        generateQR();
    </script>
</body>
</html>
