    <style>
        /* 3:4 Social Media Standard Specification (Base 1200px) */
        .canvas-wrapper {
            position: relative;
            width: 300px;
            /* UI Preview width */
            height: 400px;
            /* UI Preview height (3:4) */
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            background: #f1f5f9;
            flex-shrink: 0;
            transition: background-color 0.3s;
        }

        /* Essential Scaler Wrapper for UI Preview */
        .canvas-scaler {
            zoom: 0.25;
            /* Standard preview scale */
            width: 1200px;
            height: 1600px;
            display: block;
        }

        /* 1200x1600 Logical Page (Social Media Base) */
        .canvas-page {
            width: 1200px;
            height: 1600px;
            background-color: #ffffff !important;
            box-sizing: border-box;
            padding: 120px;
            /* 10% Mandatory Padding */
            display: flex;
            flex-direction: column;
            color: #1A1A1A;

            /* Clean state for perfect screenshot/export */
            transform: none;
            isolation: isolate;
            /* Isolated stacking context */
            contain: layout;
            /* Protect layout during measurement */

            /* Smoothing and standard rendering */
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Snapshot Mode: Pure Fixed Layout for DevTools Capture */
        .is-snapshot header,
        .is-snapshot aside,
        .is-snapshot footer,
        .is-snapshot .no-snapshot {
            display: none !important;
        }

        .is-snapshot main {
            overflow: visible !important;
            height: auto !important;
            background: #ffffff !important;
        }

        .is-snapshot .canvas-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 120px;
            padding: 100px 0;
            background: #f8fafc !important;
            /* Slightly off-white to see the cards clearly */
            max-width: none;
        }

        .is-snapshot .canvas-scaler {
            zoom: 1 !important;
            /* Force 1:1 scale for perfect DevTools capture */
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1) !important;
            position: relative;
        }

        /* Card Separator in Snapshot Mode */
        .is-snapshot .canvas-wrapper::after {
            content: "NEXT SLIDE";
            position: absolute;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            font-weight: 700;
            color: #cbd5e1;
            letter-spacing: 4px;
            pointer-events: none;
        }

        .is-snapshot .canvas-wrapper:last-child::after {
            display: none;
        }

        .is-snapshot .canvas-wrapper {
            width: 1200px !important;
            height: 1600px !important;
            box-shadow: none !important;
            border-radius: 0 !important;
        }

        .is-snapshot .canvas-page {
            box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.05);
            /* Minimal frame */
            pointer-events: none;
            /* BLOCK DevTools overlays on hover */
            user-select: none;
        }

        /* Floating Exit Button */
        #exit-snapshot-btn {
            display: none;
            position: fixed;
            top: 32px;
            right: 32px;
            z-index: 9999;
            padding: 12px 24px;
            background: #1e293b;
            color: white;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        #exit-snapshot-btn:hover {
            background: #0f172a;
            transform: translateY(-2px);
        }

        .is-snapshot #exit-snapshot-btn {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Typography & Layout inside Canvas */
        .author-header {
            display: flex;
            align-items: center;
            margin-bottom: 60px;
            flex-shrink: 0;
        }

        .avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            margin-right: 20px;
            object-fit: cover;
            border: 2px solid rgba(0, 0, 0, 0.05);
        }

        .author-name {
            font-size: 30px;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #888888;
        }

        .content-flow {
            flex: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .content-flow h1 {
            font-size: 105px;
            font-weight: 950;
            margin-bottom: 48px;
            line-height: 1.2;
            letter-spacing: -0.01em;
            color: #1A1A1A;
        }

        .content-flow h2 {
            font-size: 65px;
            font-weight: 700;
            margin-bottom: 32px;
            line-height: 1.4;
            color: #1A1A1A;
            padding-left: 24px;
            border-left: 12px solid #1A1A1A;
        }

        .content-flow p,
        .content-flow li {
            font-size: 44px;
            font-weight: 400;
            line-height: 1.8;
            color: #4A4A4A;
            margin-bottom: 36px;
            text-align: justify;
            letter-spacing: 0.5px;
            word-break: break-word;
            max-width: 22em;
        }

        .canvas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, 300px);
            gap: 32px;
            justify-content: center;
            padding-bottom: 60px;
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen transition-colors duration-200">

    <header

    <main class="lg:flex h-[calc(100vh-64px)] overflow-hidden">
        <!-- Sidebar: Controls -->
        <aside
            class="lg:w-[380px] flex flex-col border-r border-slate-200 bg-white h-[45vh] lg:h-full overflow-hidden shadow-sm">
            <div class="p-6 space-y-6 flex-none border-b border-slate-100">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label
                            class="ui-label text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">作者昵称</label>
                        <input type="text" id="nick-input" value="Lucas"
                            class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl text-sm focus:ring-2 ring-slate-200 transition-all text-slate-900">
                    </div>
                    <div class="space-y-2">
                        <label
                            class="ui-label text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1">头像链接</label>
                        <input type="text" id="avatar-input"
                            value="https://api.dicebear.com/9.x/notionists/svg?seed=Anonymous&backgroundColor=ffffff"
                            class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl text-sm focus:ring-2 ring-slate-200 transition-all text-slate-900">
                    </div>
                </div>
            </div>

            <div class="flex-1 p-6 overflow-hidden flex flex-col">
                <label
                    class="ui-label text-[10px] font-bold text-slate-400 uppercase tracking-widest pl-1 mb-4">Markdown
                    内容</label>
                <textarea id="md-input"
                    class="flex-1 w-full p-4 bg-slate-50 border-none rounded-2xl text-sm leading-relaxed resize-none focus:ring-2 ring-slate-200 transition-all font-mono text-slate-900"
                    placeholder="在此输入 Markdown..."># 结构解耦与渲染一致性

我们通过拆分外围控制层（Wrapper）和核心数据层（Page），在物理层面解决了 UI 预览与节点抓取的冲突。

## 快照模式

现在，在“快照模式”下，所有非核心 UI 都将消失，卡片以 **1:1 原生高清尺寸 (1200x1600)** 呈现。

配合浏览器开发者工具的“节点截图”功能，您可以获得极其纯净、像素级的专业导出效果。按 ESC 键即可随时退出快照预览。</textarea>
            </div>
            <div class="p-4 bg-slate-50/50 border-t border-slate-100">
                <p class="text-[10px] text-slate-400 text-center leading-relaxed font-medium">快照模式下支持 1:1 像素级 DevTools
                    截图</p>
            </div>
        </aside>

        <!-- Preview Stage -->
        <section class="flex-1 bg-slate-100 overflow-y-auto p-4 lg:p-12">
            <div class="canvas-grid" id="preview-area">
                <!-- Canvases will be injected here -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <!-- INJECT_FOOTER -->

    <script type="module">
        import { showToast } from '/src/common.js';
        import { marked } from 'marked';
        import * as htmlToImage from 'html-to-image';

        window.showToast = showToast;
        window.exportCanvases = exportCanvases;
        window.toggleSnapshot = toggleSnapshot;

        const mdInput = document.getElementById('md-input');
        const nickInput = document.getElementById('nick-input');
        const avatarInput = document.getElementById('avatar-input');
        const previewArea = document.getElementById('preview-area');
        const exportBtn = document.getElementById('export-btn');

        // 安全盘古：仅针对文本节点添加空格，不破坏 HTML/Markdown 语法
        function applyPangu(root) {
            const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null, false);
            while (walker.nextNode()) {
                const node = walker.currentNode;
                node.textContent = node.textContent
                    .replace(/([\u4e00-\u9fa5])([a-zA-Z0-9])/g, '$1 $2')
                    .replace(/([a-zA-Z0-9])([\u4e00-\u9fa5])/g, '$1 $2');
            }
        }

        // 创建卡片结构
        function createNewPage(name, avatar) {
            const wrapper = document.createElement('div');
            wrapper.className = 'canvas-wrapper';
            const scaler = document.createElement('div');
            scaler.className = 'canvas-scaler';
            const page = document.createElement('div');
            page.className = 'canvas-page';

            const imgSrc = (avatar || '').trim() || 'https://api.dicebear.com/9.x/notionists/svg?seed=Anonymous&backgroundColor=ffffff';
            const displayName = (name || '').trim() || 'Anonymous';

            page.innerHTML = `
                <div class="author-header">
                    <img src="${imgSrc}" class="avatar" alt="avatar" crossorigin="anonymous">
                    <span class="author-name">${displayName}</span>
                </div>
                <div class="content-flow"></div>
            `;

            scaler.appendChild(page);
            wrapper.appendChild(scaler);
            return { container: wrapper, flow: page.querySelector('.content-flow') };
        }

        // 离屏渲染计算 Tank
        let renderTank = null;
        function getRenderTank() {
            if (!renderTank) {
                renderTank = document.createElement('div');
                renderTank.id = 'render-tank';
                renderTank.style.cssText = 'position: fixed; left: -9999px; top: 0; width: 1200px; height: 1600px; visibility: hidden; pointer-events: none; overflow: hidden;';
                document.body.appendChild(renderTank);
            }
            return renderTank;
        }

        // 原子渲染引擎
        function renderContent() {
            const currentName = nickInput.value;
            const currentAvatar = avatarInput.value;
            const rawHtml = marked.parse(mdInput.value);

            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = rawHtml;
            applyPangu(tempDiv);
            const elements = Array.from(tempDiv.children);

            const tank = getRenderTank();
            tank.innerHTML = '';
            const finalizedPages = [];

            if (elements.length === 0) {
                const emptyPage = createNewPage(currentName, currentAvatar);
                finalizedPages.push(emptyPage.container);
                previewArea.replaceChildren(...finalizedPages);
                return;
            }

            let pageObj = createNewPage(currentName, currentAvatar);
            tank.appendChild(pageObj.container);

            elements.forEach(el => {
                const isHeading = el.tagName === 'H2' || el.tagName === 'H1';
                pageObj.flow.appendChild(el);

                let isOverflow = pageObj.flow.scrollHeight > pageObj.flow.clientHeight;
                if (!isOverflow && isHeading) {
                    const remainingSpace = pageObj.flow.clientHeight - pageObj.flow.scrollHeight;
                    if (remainingSpace < 160) isOverflow = true;
                }

                if (isOverflow) {
                    if (pageObj.flow.children.length > 1) {
                        pageObj.flow.removeChild(el);
                        finalizedPages.push(pageObj.container);
                        tank.innerHTML = '';
                        pageObj = createNewPage(currentName, currentAvatar);
                        tank.appendChild(pageObj.container);
                        pageObj.flow.appendChild(el);
                    }
                }
            });
            finalizedPages.push(pageObj.container);
            previewArea.replaceChildren(...finalizedPages);
        }

        // 快照模式切换
        function toggleSnapshot() {
            const isSnapshot = document.body.classList.toggle('is-snapshot');
            const btnText = document.querySelector('#snapshot-toggle span');
            const btnIcon = document.querySelector('#snapshot-toggle i');

            btnText.textContent = isSnapshot ? '退出快照' : '快照模式';
            btnIcon.className = isSnapshot ? 'ri-close-line' : 'ri-camera-lens-line';

            if (isSnapshot) {
                showToast('已进入快照模式：UI 已隐藏，卡片重置为 1:1 比例。您可以直接右键某个卡片节点进行“捕捉节点截图”。');
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && document.body.classList.contains('is-snapshot')) {
                toggleSnapshot();
            }
        });

        // 导出 PNG
        async function exportCanvases() {
            const exportTargets = document.querySelectorAll('.canvas-page');
            if (exportTargets.length === 0) return;

            const originalText = exportBtn.innerHTML;
            exportBtn.innerHTML = '<i class="ri-loader-4-line animate-spin"></i> <span>导出中...</span>';
            exportBtn.disabled = true;

            try {
                for (let i = 0; i < exportTargets.length; i++) {
                    const dataUrl = await htmlToImage.toPng(exportTargets[i], {
                        width: 1200,
                        height: 1600,
                        style: { transform: 'none', zoom: '1' },
                        pixelRatio: 2,
                        backgroundColor: '#ffffff'
                    });

                    const link = document.createElement('a');
                    link.download = `TypeFlow-Slide-${i + 1}.png`;
                    link.href = dataUrl;
                    link.click();
                    await new Promise(r => setTimeout(r, 400));
                }
                showToast('全部画板导出成功');
            } catch (err) {
                showToast('导出出错', 'error');
            } finally {
                exportBtn.innerHTML = originalText;
                exportBtn.disabled = false;
            }
        }

        // 生命周期监听
        let timeout;
        const triggerRender = () => {
            clearTimeout(timeout);
            timeout = setTimeout(renderContent, 100);
        };

        [mdInput, nickInput, avatarInput].forEach(el => el.addEventListener('input', triggerRender));
        renderContent();
    </script>
</body>
