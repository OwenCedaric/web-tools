<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID 生成器 - {{siteName}}</title>
    <meta name="description" content="快速生成符合标准的 v4 UUID (通用唯一识别码)，支持批量生成、大小写转换及多种格式选项。">
    <meta name="tool-icon" content="ri-fingerprint-line">
    <meta name="tool-tags" content="UUID, GUID, 生成器, 开发者工具, 唯一识别码">
    <link rel="stylesheet" href="/src/style.css">
    
    
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-fingerprint-line text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">UUID 生成器</span>
            </h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
            <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
        </button>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 lg:py-12 space-y-8">
        <!-- Main Single UUID -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[3rem] p-8 lg:p-12 shadow-sm space-y-8">
            <div id="mainUuid" onclick="copyValue(this.innerText)" class="group relative bg-slate-50 dark:bg-slate-950 border-2 border-dashed border-slate-100 dark:border-slate-800/50 rounded-[2rem] p-10 flex items-center justify-center cursor-pointer hover:border-slate-900 dark:hover:border-white transition-all active:scale-[0.99]">
                <div class="absolute top-4 left-1/2 -translate-x-1/2 text-[10px] font-bold text-slate-400 uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">点击复制</div>
                <div id="uuid-text" class="text-2xl sm:text-4xl font-bold font-mono tracking-tighter text-slate-900 dark:text-white break-all text-center">Loading...</div>
            </div>

            <div class="flex flex-wrap items-center justify-center gap-4">
                <button onclick="generateMainUuid()" class="px-10 py-5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-[1.5rem] shadow-xl active:scale-95 transition-all flex items-center gap-2">
                    <i class="ri-refresh-line"></i> 生成新 ID
                </button>
                
                <!-- Quick Options -->
                <div class="flex bg-slate-100 dark:bg-slate-800 p-1.5 rounded-2xl">
                    <button onclick="toggleOption('uppercase')" id="opt-upper" class="px-6 py-2.5 text-[10px] font-bold uppercase tracking-widest rounded-xl transition-all text-slate-400">大写</button>
                    <button onclick="toggleOption('hyphens')" id="opt-hyphen" class="px-6 py-2.5 text-[10px] font-bold uppercase tracking-widest rounded-xl transition-all bg-white dark:bg-slate-900 text-slate-900 dark:text-white shadow-sm ring-1 ring-slate-900/5">连字符</button>
                    <button onclick="toggleOption('braces')" id="opt-brace" class="px-6 py-2.5 text-[10px] font-bold uppercase tracking-widest rounded-xl transition-all text-slate-400">大括号</button>
                </div>
            </div>
        </div>

        <!-- Bulk Generation -->
        <div class="grid lg:grid-cols-[1fr_350px] gap-8">
            <!-- Output Area -->
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[3rem] p-10 shadow-sm space-y-6">
                <div class="flex items-center justify-between px-2">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="ri-list-check-3"></i> 批量生成结果
                    </h2>
                    <button onclick="copyMulti()" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white transition-all uppercase flex items-center gap-1 group">
                        <i class="ri-file-copy-line transition-transform group-hover:scale-110"></i> 复制全部
                    </button>
                </div>
                
                <textarea id="multiOutput" readonly class="w-full h-[400px] bg-slate-50 dark:bg-slate-800/50 border-none rounded-[2rem] p-8 font-mono text-sm leading-relaxed text-slate-600 dark:text-slate-400 outline-none resize-none" placeholder="批量生成的结果将显示在这里..."></textarea>
            </div>

            <!-- Bulk Controls -->
            <aside class="space-y-6">
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2.5rem] p-8 shadow-sm space-y-8">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">生成数量</label>
                        <div class="relative group">
                            <input type="number" id="genCount" value="10" min="1" max="1000" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-6 py-4 font-mono text-xl focus:ring-2 focus:ring-slate-900 dark:focus:ring-white outline-none transition-all">
                            <span class="absolute right-6 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 uppercase">Qty</span>
                        </div>
                    </div>

                    <button onclick="generateMultiple()" class="w-full py-5 bg-white dark:bg-slate-800 border-2 border-slate-900 dark:border-white text-slate-900 dark:text-white font-bold rounded-[1.5rem] hover:bg-slate-50 dark:hover:bg-slate-700 active:scale-95 transition-all flex items-center justify-center gap-2">
                        <i class="ri-stack-line text-lg"></i> 开始批量生成
                    </button>

                    <div class="pt-4 space-y-4">
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest block border-b border-slate-100 dark:border-slate-800 pb-2">快速设置</p>
                        <div class="flex flex-wrap gap-2">
                            <button onclick="setBulkCount(10)" class="px-4 py-2 rounded-xl bg-slate-50 dark:bg-slate-800 text-[10px] font-bold uppercase hover:bg-slate-100 transition-colors">10</button>
                            <button onclick="setBulkCount(50)" class="px-4 py-2 rounded-xl bg-slate-50 dark:bg-slate-800 text-[10px] font-bold uppercase hover:bg-slate-100 transition-colors">50</button>
                            <button onclick="setBulkCount(100)" class="px-4 py-2 rounded-xl bg-slate-50 dark:bg-slate-800 text-[10px] font-bold uppercase hover:bg-slate-100 transition-colors">100</button>
                            <button onclick="setBulkCount(500)" class="px-4 py-2 rounded-xl bg-slate-50 dark:bg-slate-800 text-[10px] font-bold uppercase hover:bg-slate-100 transition-colors">500</button>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <!-- Footer -->
    <!-- INJECT_FOOTER -->

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script type="module">
        import { initTheme, toggleTheme, showToast } from '/src/common.js';
        window.toggleTheme = toggleTheme;
        window.showToast = showToast;
        const config = {
            uppercase: false,
            hyphens: true,
            braces: false
        };

        function generateUUIDv4() {
            if (typeof crypto !== 'undefined' && crypto.randomUUID) {
                return crypto.randomUUID();
            }
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function formatUUID(uuid) {
            let res = uuid;
            res = config.uppercase ? res.toUpperCase() : res.toLowerCase();
            if (!config.hyphens) res = res.replace(/-/g, '');
            if (config.braces) res = `{${res}}`;
            return res;
        }

        function generateMainUuid() {
            document.getElementById('uuid-text').textContent = formatUUID(generateUUIDv4());
        }

        function toggleOption(opt) {
            config[opt] = !config[opt];
            const btn = document.getElementById(`opt-${opt === 'uppercase' ? 'upper' : opt === 'hyphens' ? 'hyphen' : 'brace'}`);
            if (config[opt]) {
                btn.className = "px-6 py-2.5 text-[10px] font-bold uppercase tracking-widest rounded-xl transition-all bg-white dark:bg-slate-900 text-slate-900 dark:text-white shadow-sm ring-1 ring-slate-900/5";
            } else {
                btn.className = "px-6 py-2.5 text-[10px] font-bold uppercase tracking-widest rounded-xl transition-all text-slate-400";
            }
            generateMainUuid();
        }

        async function copyValue(val) {
            if (val === "Loading...") return;
            try {
                await navigator.clipboard.writeText(val);
                showToast("ID 已复制");
            } catch (e) { }
        }

        function generateMultiple() {
            const count = parseInt(document.getElementById('genCount').value) || 10;
            const validCount = Math.min(Math.max(count, 1), 5000);

            let result = '';
            for (let i = 0; i < validCount; i++) {
                result += formatUUID(generateUUIDv4()) + '\n';
            }
            document.getElementById('multiOutput').value = result;
            showToast(`已生成 ${validCount} 个 ID`);
        }

        function setBulkCount(n) {
            document.getElementById('genCount').value = n;
            generateMultiple();
        }

        async function copyMulti() {
            const val = document.getElementById('multiOutput').value;
            if (!val) return;
            try {
                await navigator.clipboard.writeText(val);
                showToast('全部 ID 已复制');
            } catch (e) { }
        }

                generateMainUuid();
    </script>
</body>
</html>
