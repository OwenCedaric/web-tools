<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>屏幕清理助手 - Web Tools</title>
    <meta name="description" content="一键开启纯黑全屏模式，帮助您更清晰地发现显示器上的灰尘、指纹和污渍，并提供专业的屏幕清洁建议。">
    <meta name="tool-icon" content="ri-computer-line">
    <meta name="tool-tags" content="屏幕清理, 系统工具, 全屏, 维护">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        
        .is-black { background-color: #000 !important; cursor: none; }
        .is-black * { opacity: 0 !important; pointer-events: none !important; }
        
        #exit-hint { 
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.2); font-size: 14px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 4px; pointer-events: none;
            opacity: 0; transition: opacity 0.5s ease; z-index: 10000;
        }
        .is-black #exit-hint { opacity: 1; }
        
        .fade-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-all duration-500">
    <!-- Header -->
    <header id="main-header" class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-computer-line text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">屏幕清理助手</span>
            </h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
            <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
        </button>
    </header>

    <main id="main-content" class="max-w-4xl mx-auto px-4 py-12 lg:py-24 space-y-12 fade-in text-center">
        <div class="space-y-4">
            <h2 class="text-4xl sm:text-5xl font-bold tracking-tight text-slate-900 dark:text-white">发现每一粒灰尘</h2>
            <p class="text-slate-500 dark:text-slate-400 text-lg max-w-2xl mx-auto leading-relaxed">
                显示器上的污渍在纯黑背景下无所遁形。一键进入全屏黑色模式，开启专业清洁流程。
            </p>
        </div>

        <button onclick="enterBlackScreen()" class="group relative px-12 py-6 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-[2.5rem] shadow-2xl active:scale-95 transition-all flex items-center gap-3 mx-auto overflow-hidden">
            <i class="ri-fullscreen-line text-2xl group-hover:scale-110 transition-transform"></i>
            <span class="text-xl">开启纯黑全屏</span>
        </button>

        <div class="pt-12 text-left space-y-8">
            <div class="flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-4">
                <i class="ri-lightbulb-line"></i> 屏幕安全清理建议
            </div>

            <div class="grid sm:grid-cols-2 gap-6">
                <!-- Tip 1 -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2rem] p-8 shadow-sm space-y-4">
                    <div class="w-12 h-12 rounded-2xl bg-emerald-50 dark:bg-emerald-500/10 flex items-center justify-center text-emerald-600 dark:text-emerald-400">
                        <i class="ri-check-line text-2xl"></i>
                    </div>
                    <div class="space-y-2">
                        <h3 class="font-bold text-slate-900 dark:text-white">推荐工具</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">使用干净、柔软的超细纤维布（如眼镜布），它不会在屏幕的涂层上留下划痕。</p>
                    </div>
                </div>

                <!-- Tip 2 -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2rem] p-8 shadow-sm space-y-4">
                    <div class="w-12 h-12 rounded-2xl bg-rose-50 dark:bg-rose-500/10 flex items-center justify-center text-rose-600 dark:text-rose-400">
                        <i class="ri-close-line text-2xl"></i>
                    </div>
                    <div class="space-y-2">
                        <h3 class="font-bold text-slate-900 dark:text-white">严禁行为</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400 leading-relaxed">严防含酒精和溶剂的清洁剂。液体务必喷在布上，严禁直接喷洒在屏幕上。</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Exiting Mode Interface -->
    <div id="overlay" onclick="exitBlackScreen()" class="fixed inset-0 z-[10000] cursor-none hidden bg-black">
        <div id="exit-hint" class="text-center space-y-2">
            <div>按下 ESC 键或点击任意位置退出</div>
            <div class="text-[10px] opacity-50 tracking-widest">EXIT FULLSCREEN TO RETURN</div>
        </div>
    </div>

    <!-- Footer -->
    <footer id="main-footer" class="py-12 border-t border-slate-200 dark:border-slate-800 text-center text-slate-400 dark:text-slate-600 text-[10px] font-bold uppercase tracking-widest">
        <p>&copy; 2025 Web Tools Collection • Made with ❤️ • <a href="https://ceda.is/" class="hover:text-slate-900 dark:hover:text-white transition-colors">Cedar</a></p>
    </footer>

    <script>
        function enterBlackScreen() {
            const overlay = document.getElementById('overlay');
            overlay.classList.remove('hidden');
            document.body.classList.add('is-black');
            
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) docEl.requestFullscreen().catch(() => {});
            else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
            
            // Hide hint after 3 seconds
            setTimeout(() => {
                document.getElementById('exit-hint').style.opacity = '0';
            }, 3000);
        }

        function exitBlackScreen() {
            const overlay = document.getElementById('overlay');
            overlay.classList.add('hidden');
            document.body.classList.remove('is-black');
            document.getElementById('exit-hint').style.opacity = '1';
            
            if (document.fullscreenElement || document.webkitFullscreenElement) {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) exitBlackScreen();
        });
        document.addEventListener('webkitfullscreenchange', () => {
            if (!document.webkitFullscreenElement) exitBlackScreen();
        });

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.className = document.documentElement.classList.contains('dark') ? 'ri-sun-line text-xl opacity-70' : 'ri-moon-line text-xl opacity-70';
            }
        }

        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcon();
    </script>
</body>
</html>
