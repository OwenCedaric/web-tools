<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>秒表 - {{siteName}}</title>
    <meta name="description" content="高精度在线秒表，支持计次（Lap）功能与毫秒级显示，简约高效。">
    <meta name="tool-icon" content="ri-timer-line">
    <meta name="tool-tags" content="秒表, 计时器, 时间, 运动, 工具">
    <link rel="stylesheet" href="/src/style.css">

</head>

<body
    class="bg-slate-50  text-slate-900  min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header
        class="h-16 bg-white/80  backdrop-blur-md border-b border-slate-200  flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100  rounded-lg transition-colors"
                title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-timer-line text-slate-900 "></i>
                <span class="tracking-tight">极简秒表</span>
            </h1>
        </div>
        
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 lg:py-20 flex flex-col items-center">
        <!-- Main Display -->
        <div class="relative py-12 flex flex-col items-center space-y-2">
            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em] mb-4">Elapsed Time</div>
            <div
                class="flex items-baseline font-mono text-7xl sm:text-8xl font-bold tracking-tighter text-slate-900  tabular-nums">
                <span id="mins">00</span><span class="opacity-30 mx-1">:</span>
                <span id="secs">00</span><span class="opacity-30 mx-1">.</span>
                <span id="ms" class="text-4xl sm:text-5xl text-slate-400 ">00</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="grid grid-cols-2 gap-6 w-full max-w-sm mt-8">
            <button onclick="handleLapReset()" id="lapResetBtn"
                class="h-20 rounded-[2rem] bg-white  border border-slate-200  text-slate-400 hover:text-slate-900  font-bold text-xs uppercase tracking-widest transition-all active:scale-95 flex items-center justify-center gap-2">
                <i class="ri-history-line text-lg"></i> 计次
            </button>
            <button onclick="handleStartStop()" id="startStopBtn"
                class="h-20 rounded-[2rem] bg-slate-900  text-white  font-bold text-xs uppercase tracking-widest shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-2">
                <i id="start-icon" class="ri-play-fill text-lg"></i> <span id="start-text">开始计时</span>
            </button>
        </div>

        <!-- Laps Section -->
        <div class="w-full max-w-xl mt-16 space-y-4">
            <div class="flex items-center justify-between px-6">
                <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                    <i class="ri-list-ordered"></i> 历史计次
                </h2>
                <div id="lap-count" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">0 Laps</div>
            </div>

            <div
                class="bg-white  border border-slate-200  rounded-[2.5rem] overflow-hidden shadow-sm min-h-[120px]">
                <div id="laps-empty"
                    class="py-12 flex flex-col items-center justify-center text-slate-300  space-y-2">
                    <i class="ri-timer-2-line text-4xl"></i>
                    <p class="text-[10px] font-bold uppercase tracking-widest">暂无记录</p>
                </div>

                <div id="lapsList"
                    class="divide-y divide-slate-100  max-h-[400px] overflow-y-auto">
                    <!-- Lap Items -->
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <!-- INJECT_FOOTER -->

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2">
    </div>

    <script type="module">
        import { showToast  } from '/src/common.js';
        
        window.showToast = showToast;
        const minEl = document.getElementById('mins');
        const secEl = document.getElementById('secs');
        const msEl = document.getElementById('ms');
        const lapsList = document.getElementById('lapsList');
        const startBtn = document.getElementById('startStopBtn');
        const startIcon = document.getElementById('start-icon');
        const startText = document.getElementById('start-text');
        const lapBtn = document.getElementById('lapResetBtn');
        const lapCount = document.getElementById('lap-count');
        const lapsEmpty = document.getElementById('laps-empty');

        let isRunning = false;
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval;
        let laps = [];

        function formatTime(time) {
            let d = new Date(time);
            let m = d.getUTCMinutes().toString().padStart(2, '0');
            let s = d.getUTCSeconds().toString().padStart(2, '0');
            let ms = Math.floor(d.getUTCMilliseconds() / 10).toString().padStart(2, '0');
            return { m, s, ms };
        }

        function updateDisplay() {
            let t = formatTime(elapsedTime);
            minEl.innerText = t.m;
            secEl.innerText = t.s;
            msEl.innerText = t.ms;
        }

        function handleStartStop() {
            if (isRunning) {
                // Stop
                clearInterval(timerInterval);
                startText.innerText = "继续计时";
                startIcon.className = "ri-play-fill text-lg";
                startBtn.classList.replace('bg-rose-500', 'bg-slate-900');
                lapBtn.innerHTML = '<i class="ri-history-line text-lg"></i> 重置';
            } else {
                // Start
                startTime = Date.now() - elapsedTime;
                timerInterval = setInterval(() => {
                    elapsedTime = Date.now() - startTime;
                    updateDisplay();
                }, 10);
                startText.innerText = "停止计时";
                startIcon.className = "ri-stop-fill text-lg";
                startBtn.classList.replace('bg-slate-900', 'bg-rose-500');
                lapBtn.innerHTML = '<i class="ri-history-line text-lg"></i> 计次';
            }
            isRunning = !isRunning;
        }

        function handleLapReset() {
            if (isRunning) {
                // Lap
                laps.unshift({ time: elapsedTime, diff: laps.length > 0 ? elapsedTime - laps[0].time : elapsedTime });
                renderLaps();
                showToast("已记录此计次");
            } else {
                // Reset
                elapsedTime = 0;
                laps = [];
                updateDisplay();
                renderLaps();
                lapBtn.innerHTML = '<i class="ri-history-line text-lg"></i> 计次';
                startText.innerText = "开始计时";
                showToast("已重置计时器");
            }
        }

        function renderLaps() {
            lapsList.innerHTML = '';
            lapCount.innerText = `${laps.length} Laps`;
            lapsEmpty.classList.toggle('hidden', laps.length > 0);

            laps.forEach((lap, index) => {
                const num = laps.length - index;
                const t = formatTime(lap.time);
                const d = formatTime(lap.diff);
                const str = `${t.m}:${t.s}.${t.ms}`;
                const diffStr = `+${d.m}:${d.s}.${d.ms}`;

                const li = document.createElement('div');
                li.className = 'lap-row px-8 py-5 flex items-center justify-between hover:bg-slate-50  transition-colors';
                li.innerHTML = `
                    <div class="flex items-center gap-4">
                        <span class="text-[10px] font-bold text-slate-400 font-mono">#${num.toString().padStart(2, '0')}</span>
                        <span class="font-mono font-bold text-lg text-slate-900 ">${str}</span>
                    </div>
                    <span class="text-[10px] font-bold font-mono text-slate-400 uppercase tracking-tight">${diffStr}</span>
                `;
                lapsList.appendChild(li);
            });
        }

        updateDisplay();
        // Expose functions to window for onclick handlers
        window.handleLapReset = handleLapReset;
        window.handleStartStop = handleStartStop;

    </script>
</body>

</html>
