<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X 截图模拟 - {{siteName}}</title>
    <meta name="description" content="高保真 X (Twitter) 推文截图生成器。终极 1:1 细节还原、多图宫格、引用头像、多页支持、适配移动端。">
    <meta name="tool-icon" content="ri-twitter-x-line">
    <meta name="tool-tags" content="X, Twitter, 截图, 1:1, 引用推文, 宫格, 响应式">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        :root {
            --x-light-bg: #FFFFFF;
            --x-light-text: #0F1419;
            --x-light-sec: #536471;
            --x-light-border: #EFF3F4;
            --x-dark-bg: #000000;
            --x-dark-text: #E7E9EA;
            --x-dark-sec: #71767B;
            --x-dark-border: #2F3336;
        }

        .preview-boundary {
            width: 100%;
            max-width: 500px;
            height: 500px;
            background: #f1f5f9;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #e2e8f0;
        }

        @media (min-width: 1024px) {
            .preview-boundary {
                height: 600px;
            }
        }

        .output-container {
            width: 1284px;
            height: 1712px;
            background: var(--x-light-bg);
            display: flex;
            flex-direction: column;
            transform-origin: center;
            flex-shrink: 0;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            color: var(--x-light-text);
            overflow: hidden;
        }

        .output-container.dark-theme {
            background: var(--x-dark-bg) !important;
            color: var(--x-dark-text) !important;
        }

        .tweet-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 56px 48px;
            background: transparent;
            box-sizing: border-box;
        }

        .verified-badge {
            color: #1d9bf0;
            font-size: 36px;
            vertical-align: middle;
        }

        [contenteditable="true"] {
            outline: none;
            min-height: 1.2em;
            cursor: text;
            border-radius: 8px;
            transition: background 0.2s;
        }

        [contenteditable="true"]:hover {
            background: rgba(128, 128, 128, 0.05);
        }

        /* Media Grid X-Style */
        .image-grid {
            display: grid;
            gap: 4px;
            border-radius: 32px;
            overflow: hidden;
            margin-top: 24px;
            border: 1.5px solid var(--x-light-border);
        }

        .dark-theme .image-grid {
            border-color: var(--x-dark-border);
        }

        .image-grid.grid-1 {
            aspect-ratio: 16 / 9;
        }

        .image-grid.grid-2 {
            grid-template-columns: 1fr 1fr;
            aspect-ratio: 16 / 9;
        }

        .image-grid.grid-3 {
            grid-template-columns: 2fr 1fr;
            grid-template-rows: 1fr 1fr;
            aspect-ratio: 16 / 9;
        }

        .image-grid.grid-3 img:nth-child(1) {
            grid-row: span 2;
        }

        .image-grid.grid-4 {
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            aspect-ratio: 16 / 9;
        }

        .image-item {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #eee;
        }

        /* Quote Tweet X-Style */
        .quote-tweet {
            margin-top: 24px;
            border: 1.5px solid var(--x-light-border);
            border-radius: 24px;
            padding: 24px;
        }

        .dark-theme .quote-tweet {
            border-color: var(--x-dark-border);
        }

        .quote-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .quote-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            object-fit: cover;
        }

        .carousel-container {
            display: flex;
            transition: transform 0.3s ease;
            width: 100%;
            height: 100%;
            gap: 0;
        }

        .carousel-item {
            flex: 0 0 100%;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .timestamp-views {
            margin-top: 32px;
            font-size: 28px;
            color: var(--x-light-sec);
            padding-bottom: 24px;
            border-bottom: 1.5px solid var(--x-light-border);
        }

        .dark-theme .timestamp-views {
            color: var(--x-dark-sec);
            border-color: var(--x-dark-border);
        }

        .engagement-row {
            display: flex;
            justify-content: space-between;
            padding: 28px 12px;
            color: var(--x-light-sec);
        }

        .dark-theme .engagement-row {
            color: var(--x-dark-sec);
        }

        .engagement-item {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 28px;
        }

        .engagement-item i {
            font-size: 48px;
        }

        /* Sidebar UI Polishing */
        .settings-card {
            background-color: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 24px;
            padding: 24px;
        }

        .btn-primary {
            background: #0f1419;
            color: #fff;
            border-radius: 16px;
            padding: 12px 24px;
            font-weight: 700;
            transition: all 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn-outline {
            background: #fff;
            border: 1px solid #e2e8f0;
            color: #0f1419;
            border-radius: 16px;
            padding: 12px 24px;
            font-weight: 700;
            transition: all 0.2s;
            cursor: pointer;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

<body
    class="bg-slate-50  text-slate-900  min-h-screen transition-colors duration-200">
    <header
        class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html"
                class="p-2 hover:bg-slate-100  rounded-lg transition-colors"><i
                    class="ri-arrow-left-line text-xl opacity-70"></i></a>
            <h1 class="text-lg font-semibold flex items-center gap-2"><i class="ri-twitter-x-line"></i><span>X 截图 (1:1
                    终极版)</span></h1>
        </div>
        
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 lg:py-12">
        <div class="flex flex-col-reverse lg:grid lg:grid-cols-[400px_1fr] gap-8 lg:gap-12">
            <!-- Sidebar -->
            <div class="space-y-6 lg:overflow-y-auto lg:max-h-[calc(100vh-160px)] pr-2 no-scrollbar">
                <div class="settings-card shadow-sm space-y-4">
                    <h2 class="text-[10px] font-bold text-slate-400  uppercase tracking-widest">用户 &
                        主题</h2>
                    <div class="flex items-center gap-4">
                        <img id="avatar-preview"
                            src="https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png"
                            class="w-16 h-16 rounded-full object-cover cursor-pointer"
                            onclick="document.getElementById('avatar-input').click()">
                        <input type="file" id="avatar-input" class="hidden" accept="image/*">
                        <div class="flex-1 space-y-2">
                            <input type="text" id="user-name" value="User Name"
                                class="sidebar-input w-full bg-slate-50 border-none rounded-xl px-4 py-2 text-sm font-bold outline-none"
                                placeholder="姓名">
                            <input type="text" id="user-handle" value="@username"
                                class="sidebar-input w-full bg-slate-50 border-none rounded-xl px-4 py-2 text-sm text-slate-500 outline-none"
                                placeholder="用户名">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <select id="verified-status"
                            class="sidebar-input w-full bg-slate-50 border-none rounded-xl px-4 py-2 text-xs font-bold outline-none">
                            <option value="none">无认证</option>
                            <option value="blue" selected>蓝色认证</option>
                        </select>
                        <select id="tweet-theme"
                            class="sidebar-input w-full bg-slate-50 border-none rounded-xl px-4 py-2 text-xs font-bold outline-none">
                            <option value="light">浅色推文</option>
                            <option value="dark" selected>深色推文</option>
                        </select>
                    </div>
                </div>

                <div class="settings-card shadow-sm space-y-4">
                    <h2 class="text-[10px] font-bold text-slate-400  uppercase tracking-widest">引用推文
                        (限最后一页)</h2>
                    <div class="flex items-center gap-4">
                        <img id="quote-avatar-preview"
                            src="https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png"
                            class="w-12 h-12 rounded-full object-cover cursor-pointer"
                            onclick="document.getElementById('quote-avatar-input').click()">
                        <input type="file" id="quote-avatar-input" class="hidden" accept="image/*">
                        <div class="flex items-center gap-2 flex-1">
                            <input type="checkbox" id="show-quote" class="w-4 h-4 accent-slate-900">
                            <span class="text-xs font-bold">启用引用</span>
                        </div>
                    </div>
                    <div id="quote-controls" class="space-y-3 hidden">
                        <input type="text" id="quote-name" value="Quote Name"
                            class="sidebar-input w-full bg-slate-50 border-none rounded-xl px-4 py-2 text-xs font-bold outline-none"
                            placeholder="引用姓名">
                        <input type="text" id="quote-handle" value="@quote"
                            class="sidebar-input w-full bg-slate-50 border-none rounded-xl px-4 py-2 text-xs text-slate-500 outline-none"
                            placeholder="引用 Handle">
                        <textarea id="quote-text"
                            class="sidebar-input w-full bg-slate-50 border-none rounded-xl px-4 py-2 text-xs outline-none min-h-[60px]"
                            placeholder="引用内容...">引用内容示例</textarea>
                    </div>
                </div>

                <div class="settings-card shadow-sm space-y-4">
                    <h2 class="text-[10px] font-bold text-slate-400  uppercase tracking-widest">推文互动
                    </h2>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1"><label class="text-[8px] font-bold text-slate-400">转发</label><input
                                type="number" id="metric-retweets" value="1280"
                                class="sidebar-input w-full bg-slate-50 border-none rounded-xl px-4 py-2 text-xs outline-none">
                        </div>
                        <div class="space-y-1"><label class="text-[8px] font-bold text-slate-400">喜欢</label><input
                                type="number" id="metric-likes" value="5620"
                                class="sidebar-input w-full bg-slate-50 border-none rounded-xl px-4 py-2 text-xs outline-none">
                        </div>
                        <div class="space-y-1"><label class="text-[8px] font-bold text-slate-400">评论</label><input
                                type="number" id="metric-comments" value="12"
                                class="sidebar-input w-full bg-slate-50 border-none rounded-xl px-4 py-2 text-xs outline-none">
                        </div>
                        <div class="space-y-1"><label class="text-[8px] font-bold text-slate-400">书签</label><input
                                type="number" id="metric-bookmarks" value="342"
                                class="sidebar-input w-full bg-slate-50 border-none rounded-xl px-4 py-2 text-xs outline-none">
                        </div>
                        <div class="col-span-2 space-y-1"><label
                                class="text-[8px] font-bold text-slate-400">查看</label><input type="text"
                                id="tweet-views" value="1.2M"
                                class="sidebar-input w-full bg-slate-50 border-none rounded-xl px-4 py-2 text-xs outline-none">
                        </div>
                        <div class="col-span-2 space-y-1"><label
                                class="text-[8px] font-bold text-slate-400">时间</label><input type="datetime-local"
                                id="tweet-datetime"
                                class="sidebar-input w-full bg-slate-50 border-none rounded-xl px-4 py-2 text-xs outline-none">
                        </div>
                    </div>
                </div>

                <div class="settings-card shadow-sm space-y-4">
                    <h2 class="text-[10px] font-bold text-slate-400  uppercase tracking-widest">多图宫格
                        (限首页)</h2>
                    <input type="file" id="img-input" class="hidden" accept="image/*" multiple><label for="img-input"
                        class="w-full h-12 border-2 border-dashed border-slate-200  rounded-2xl flex items-center justify-center gap-2 cursor-pointer hover:bg-slate-50  transition-colors text-xs font-bold text-slate-400 tracking-widest"><i
                            class="ri-image-add-line"></i> 上传图片</label>
                    <div id="image-previews" class="flex flex-wrap gap-2 pt-2"></div>
                </div>

                <div class="grid grid-cols-2 gap-4"><button onclick="exportCurrent()"
                        class="btn-outline">下载</button><button onclick="exportAll()" class="btn-primary">批量</button>
                </div>
            </div>

            <!-- Preview Panel -->
            <div class="flex flex-col items-center">
                <div class="w-full max-w-[500px] flex items-center justify-between mb-6 px-2">
                    <div class="flex items-center gap-4"><button onclick="prevPage()"
                            class="p-2 hover:bg-slate-200  rounded-full transition-colors"><i
                                class="ri-arrow-left-line"></i></button><span id="page-display"
                            class="text-[10px] font-bold text-slate-400 uppercase tracking-widest min-w-[60px] text-center whitespace-nowrap">1
                            / 1</span><button onclick="nextPage()"
                            class="p-2 hover:bg-slate-200  rounded-full transition-colors"><i
                                class="ri-arrow-right-line"></i></button></div>
                    <div class="flex items-center gap-3"><button onclick="addPage()" class="btn-primary"
                            style="padding: 10px 20px; font-size: 10px;">新增页</button><button onclick="deletePage()"
                            class="p-2 text-rose-500 hover:bg-rose-50 rounded-lg"><i
                                class="ri-delete-bin-line"></i></button></div>
                </div>

                <div class="preview-boundary shadow-2xl">
                    <div id="carousel" class="carousel-container"></div>
                </div>

                <div class="mt-8 lg:mt-10 flex flex-wrap justify-center gap-4 lg:gap-8 text-slate-400">
                    <div class="flex items-center gap-3"><span
                            class="text-[10px] font-bold uppercase tracking-widest">字号</span><input type="range"
                            id="font-size" min="30" max="60" value="38"
                            class="w-20 lg:w-24 h-1.5 bg-slate-200  rounded-lg appearance-none cursor-pointer accent-slate-900 ">
                    </div>
                    <div class="flex items-center gap-3"><span
                            class="text-[10px] font-bold uppercase tracking-widest">缩放</span><input type="range"
                            id="preview-scale" min="15" max="50" value="35"
                            class="w-20 lg:w-24 h-1.5 bg-slate-200  rounded-lg appearance-none cursor-pointer accent-slate-900 ">
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import * as htmlToImage from 'html-to-image';
        import { showToast  } from '/src/common.js';
         window.showToast = showToast;

        const state = {
            name: 'User Name', handle: '@username', verified: 'blue', theme: 'dark', fontSize: 38, scale: 0.35,
            pages: ['这是终极细节还原版本。\n\n1. 修复了全局 Dark 模式下的标题栏与按钮色彩。\n2. 引用推文支持头像，并仅在最后一页显示。\n3. 推文媒体支持 1-4 张图片的 X 宫格布局（仅首页显示）。'],
            images: [],
            avatar: 'https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png',
            quoteAvatar: 'https://abs.twimg.com/sticky/default_profile_images/default_profile_400x400.png',
            datetime: new Date().toISOString().slice(0, 16),
            retweets: 1280, likes: 5620, bookmarks: 342, comments: 12, views: '1.2M',
            showQuote: false, quoteName: 'Quote User', quoteHandle: '@quote_user', quoteText: '引用推文内容。', currentPage: 0
        };

        const elements = {
            carousel: document.getElementById('carousel'), nameIn: document.getElementById('user-name'), handleIn: document.getElementById('user-handle'),
            verIn: document.getElementById('verified-status'), themeIn: document.getElementById('tweet-theme'), fontIn: document.getElementById('font-size'),
            dateIn: document.getElementById('tweet-datetime'), scaleIn: document.getElementById('preview-scale'), viewIn: document.getElementById('tweet-views'),
            rtIn: document.getElementById('metric-retweets'), likeIn: document.getElementById('metric-likes'), bookmarkIn: document.getElementById('metric-bookmarks'),
            commentIn: document.getElementById('metric-comments'), quoteToggle: document.getElementById('show-quote'), quoteName: document.getElementById('quote-name'),
            quoteHandle: document.getElementById('quote-handle'), quoteText: document.getElementById('quote-text'), avatarIn: document.getElementById('avatar-input'),
            quoteAvatarIn: document.getElementById('quote-avatar-input'), imgIn: document.getElementById('img-input'), imgPrev: document.getElementById('image-previews'), pageDisp: document.getElementById('page-display')
        };

        const map = [['nameIn', 'name'], ['handleIn', 'handle'], ['verIn', 'verified'], ['themeIn', 'theme'], ['fontIn', 'fontSize'], ['dateIn', 'datetime'], ['rtIn', 'retweets'], ['likeIn', 'likes'], ['bookmarkIn', 'bookmarks'], ['commentIn', 'comments'], ['quoteName', 'quoteName'], ['quoteHandle', 'quoteHandle'], ['quoteText', 'quoteText']];
        map.forEach(([id, k]) => (elements[id] || {}).oninput = e => { state[k] = e.target.value; renderAll(); });
        elements.quoteToggle.onchange = e => { state.showQuote = e.target.checked; document.getElementById('quote-controls').classList.toggle('hidden', !state.showQuote); renderAll(); };
        elements.scaleIn.oninput = e => { state.scale = e.target.value / 100; updS(); };

        const setupImg = (inp, k, p) => inp.onchange = e => { const f = e.target.files[0]; if (f) { const r = new FileReader(); r.onload = ev => { state[k] = ev.target.result; if (p) document.getElementById(p).src = state[k]; renderAll(); }; r.readAsDataURL(f); } };
        setupImg(elements.avatarIn, 'avatar', 'avatar-preview');
        setupImg(elements.quoteAvatarIn, 'quoteAvatar', 'quote-avatar-preview');
        elements.imgIn.onchange = e => { const f = Array.from(e.target.files).slice(0, 4 - state.images.length); f.forEach(x => { const r = new FileReader(); r.onload = ev => { state.images.push(ev.target.result); updI(); renderAll(); }; r.readAsDataURL(x); }); };
        window.removeImage = i => { state.images.splice(i, 1); updI(); renderAll(); };
        function updI() { elements.imgPrev.innerHTML = state.images.map((s, i) => `<div class="relative w-12 h-12 rounded-xl overflow-hidden border border-slate-200 "><img src="${s}" class="w-full h-full object-cover"><button onclick="removeImage(${i})" class="absolute -top-1 -right-1 bg-rose-500 text-white rounded-full w-4 h-4 flex items-center justify-center text-[10px]"><i class="ri-close-line"></i></button></div>`).join(''); }

        window.addPage = () => { state.pages.splice(state.currentPage + 1, 0, '新页面...'); state.currentPage++; renderAll(); };
        window.deletePage = () => { if (state.pages.length > 1) { state.pages.splice(state.currentPage, 1); if (state.currentPage >= state.pages.length) state.currentPage = state.pages.length - 1; renderAll(); } };
        window.prevPage = () => { if (state.currentPage > 0) { state.currentPage--; updC(); } };
        window.nextPage = () => { if (state.currentPage < state.pages.length - 1) { state.currentPage++; updC(); } };
        function updC() { elements.carousel.style.transform = `translateX(-${state.currentPage * 100}%)`; elements.pageDisp.textContent = `${state.currentPage + 1} / ${state.pages.length}`; }
        function updS() { document.querySelectorAll('.output-container').forEach(el => el.style.transform = `scale(${state.scale})`); }

        function fmtD(v) { if (!v) return ''; const d = new Date(v); return `${d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })} · ${d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}`; }
        function fmtN(n) { if (isNaN(parseInt(n))) return n; n = parseInt(n); if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M'; if (n >= 1000) return (n / 1000).toFixed(1) + 'K'; return n; }

        function renderAll() {
            elements.carousel.innerHTML = state.pages.map((t, idx) => `<div class="carousel-item"><div id="export-target-${idx}" class="output-container ${state.theme === 'dark' ? 'dark-theme' : ''}" style="transform: scale(${state.scale});">${genCard(t, idx)}</div></div>`).join('');
            document.querySelectorAll('[contenteditable="true"]').forEach((box, i) => { if (box.dataset.type === 'main') box.oninput = e => state.pages[i] = e.target.innerText; });
            updC();
        }

        function genCard(txt, idx) {
            const sec = state.theme === 'light' ? 'var(--x-light-sec)' : 'var(--x-dark-sec)';
            const vIcon = state.verified === 'none' ? '' : `<i class="ri-verified-badge-fill verified-badge"></i>`;
            let media = '';
            // Media Grid (First Page Only)
            if (idx === 0 && state.images.length > 0) media = `<div class="image-grid grid-${state.images.length}">${state.images.map(s => `<img src="${s}" class="image-item">`).join('')}</div>`;
            // Quote (Last Page Only)
            if (state.showQuote && idx === state.pages.length - 1) {
                media += `<div class="quote-tweet"><div class="quote-header"><img src="${state.quoteAvatar}" class="quote-avatar"><div class="font-bold text-[32px]">${state.quoteName}</div><div style="color: ${sec};" class="text-[28px]">${state.quoteHandle}</div></div><div class="mt-4 text-[30px] leading-tight">${state.quoteText}</div></div>`;
            }

            return `<div class="tweet-card"><div class="flex items-start justify-between"><div class="flex items-center gap-6"><img src="${state.avatar}" class="w-24 h-24 rounded-full object-cover"><div><div class="font-bold text-[36px] flex items-center gap-2 leading-tight">${state.name} ${vIcon}</div><div style="color: ${sec};" class="text-[30px] leading-tight">${state.handle}</div></div></div><div style="color: ${sec};" class="flex gap-4"><i class="ri-more-line text-[44px]"></i></div></div><div data-type="main" contenteditable="true" placeholder="内容..." class="mt-8 break-words leading-tight flex-1" style="font-size: ${state.fontSize}px; white-space: pre-wrap;">${txt}</div>${media}<div class="timestamp-views">${fmtD(state.datetime)} · <span style="font-weight: 700; color: ${state.theme === 'dark' ? 'var(--x-dark-text)' : 'var(--x-light-text)'}">${state.views}</span> Views</div><div class="engagement-row"><div class="engagement-item"><i class="ri-chat-3-line"></i>${state.comments}</div><div class="engagement-item"><i class="ri-repeat-2-line"></i>${fmtN(state.retweets)}</div><div class="engagement-item"><i class="ri-heart-3-line"></i>${fmtN(state.likes)}</div><div class="engagement-item"><i class="ri-bookmark-line"></i>${state.bookmarks}</div><div class="engagement-item"><i class="ri-share-2-line"></i></div></div></div>`;
        }

        async function exp(i) {
            const n = document.getElementById(`export-target-${i}`); const t = n.style.transform; n.style.transform = 'none';
            const d = await htmlToImage.toPng(n, { pixelRatio: 1, width: 1284, height: 1712 }); n.style.transform = t;
            const l = document.createElement('a'); l.download = `x-${i + 1}.png`; l.href = d; l.click();
        }
        window.exportCurrent = async () => { showToast('Drawing...', 'loading'); try { await exp(state.currentPage); showToast('Done'); } catch (e) { showToast('Error'); } };
        window.exportAll = async () => { showToast('Batching...', 'loading'); try { for (let i = 0; i < state.pages.length; i++) { await exp(i); await new Promise(r => setTimeout(r, 600)); } showToast('Finished'); } catch (e) { showToast('Error'); } };

        elements.dateIn.value = state.datetime;
         renderAll();
    </script>
</body>

</html>
