<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本对比工具 - Web Tools</title>
    <meta name="description" content="实时文本对比工具，支持侧边对比与差异高亮，快速找出两个文本片段之间的不同点。">
    <meta name="tool-icon" content="ri-file-transfer-line">
    <meta name="tool-tags" content="Diff, 对比, 文本, 开发者工具, 实时">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsdiff/7.0.0/diff.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        .diff-added { background-color: rgba(16, 185, 129, 0.2); }
        .dark .diff-added { background-color: rgba(16, 185, 129, 0.15); }
        .diff-removed { background-color: rgba(244, 63, 94, 0.2); text-decoration: line-through; opacity: 0.7; }
        .dark .diff-removed { background-color: rgba(244, 63, 94, 0.15); }

        .editor-layer {
            scrollbar-gutter: stable;
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-file-transfer-line text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">文本对比工具</span>
            </h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="clearAll()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="清空内容">
                <i class="ri-delete-bin-line text-xl opacity-70"></i>
            </button>
            <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
                <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden border-b border-slate-200 dark:border-slate-800">
        <!-- Left: Original -->
        <div class="flex-1 flex flex-col border-r border-slate-200 dark:border-slate-800">
            <div class="h-10 bg-white dark:bg-slate-900 px-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Original Original</span>
                <span id="origStats" class="text-[9px] font-bold text-slate-400 font-mono">0 Lines</span>
            </div>
            <div class="flex-1 relative overflow-hidden bg-white dark:bg-slate-950">
                <textarea id="origInput" class="editor-layer absolute inset-0 w-full h-full p-8 font-mono text-sm leading-relaxed bg-transparent border-none outline-none resize-none focus:ring-0 text-slate-900 dark:text-slate-300" placeholder="在此粘贴原始文本..."></textarea>
            </div>
        </div>

        <!-- Right: Modified with Highlights -->
        <div class="flex-1 flex flex-col">
            <div class="h-10 bg-white dark:bg-slate-900 px-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Modified Version</span>
                <span id="modStats" class="text-[9px] font-bold text-slate-400 font-mono">0 Lines</span>
            </div>
            <div class="flex-1 relative overflow-hidden bg-white dark:bg-slate-950">
                 <!-- Highlight Layer -->
                <div id="modHighlight" class="editor-layer absolute inset-0 w-full h-full p-8 font-mono text-sm leading-relaxed whitespace-pre-wrap break-all pointer-events-none opacity-100 text-transparent overflow-y-auto"></div>
                <!-- Interactive Layer -->
                <textarea id="modInput" class="editor-layer absolute inset-0 w-full h-full p-8 font-mono text-sm leading-relaxed bg-transparent border-none outline-none resize-none focus:ring-0 text-slate-900 dark:text-slate-300" placeholder="在此粘贴修改后的文本进行对比..."></textarea>
            </div>
        </div>
    </main>

    <!-- Footer / Toolbar -->
    <div class="h-14 bg-white dark:bg-slate-900 px-6 flex items-center justify-between text-[10px] font-bold uppercase tracking-widest text-slate-400 shrink-0">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500/20 border border-emerald-500/30"></span> 新增
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-rose-500/20 border border-rose-500/30"></span> 修改/删除
            </div>
        </div>
        <div class="hidden sm:block">
            文本差异会实时高亮显示
        </div>
        <button onclick="loadSample()" class="px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors flex items-center gap-2">
            <i class="ri-magic-line"></i> 载入示例
        </button>
    </div>

    <script>
        const origInput = document.getElementById('origInput');
        const modInput = document.getElementById('modInput');
        const modHighlight = document.getElementById('modHighlight');
        const origStats = document.getElementById('origStats');
        const modStats = document.getElementById('modStats');

        function updateStats() {
            const oLines = origInput.value ? origInput.value.split('\n').length : 0;
            const mLines = modInput.value ? modInput.value.split('\n').length : 0;
            origStats.textContent = `${oLines} Line${oLines !== 1 ? 's' : ''}`;
            modStats.textContent = `${mLines} Line${mLines !== 1 ? 's' : ''}`;
        }

        function runDiff() {
            const orig = origInput.value;
            const mod = modInput.value;

            // Simple char-level diff for better visual results in a highlights layer
            const diff = Diff.diffChars(orig, mod);
            
            let html = '';
            diff.forEach(part => {
                const value = escapeHtml(part.value);
                if (part.added) {
                    html += `<span class="diff-added text-emerald-900 dark:text-emerald-400">${value}</span>`;
                } else if (part.removed) {
                    // Since this is the "Modified" pane, we don't show removed items in the text flow, 
                    // but we can show a placeholder if we want to align. 
                    // To keep them perfectly aligned with the textarea, we MUST NOT show removed chars here.
                } else {
                    html += `<span class="text-transparent">${value}</span>`;
                }
            });

            modHighlight.innerHTML = html;
            updateStats();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Synchronize scroll
        modInput.addEventListener('scroll', () => {
            modHighlight.scrollTop = modInput.scrollTop;
            modHighlight.scrollLeft = modInput.scrollLeft;
        });

        // Toggle sync scroll between panes (optional but good)
        origInput.addEventListener('scroll', () => {
            modInput.scrollTop = origInput.scrollTop;
            modHighlight.scrollTop = origInput.scrollTop;
        });

        // Input listeners
        origInput.addEventListener('input', runDiff);
        modInput.addEventListener('input', runDiff);

        function clearAll() {
            origInput.value = '';
            modInput.value = '';
            runDiff();
        }

        function loadSample() {
            origInput.value = "Antigravity is a powerful agentic AI coding assistant.\nDesigned for modern developers.\nFast and reliable.";
            modInput.value = "Antigravity is an extremely powerful agentic AI coding assistant.\nBuilt for modern developers.\nFast, safe and reliable.";
            runDiff();
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.className = document.documentElement.classList.contains('dark') ? 'ri-sun-line text-xl opacity-70' : 'ri-moon-line text-xl opacity-70';
            }
        }

        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcon();

        // Initial
        loadSample();
    </script>
</body>
</html>
