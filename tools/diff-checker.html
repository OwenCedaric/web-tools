<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文本对比工具 - {{siteName}}</title>
    <meta name="description" content="实时文本对比工具，支持侧边对比与差异高亮，快速找出两个文本片段之间的不同点。">
    <meta name="tool-icon" content="ri-file-transfer-line">
    <meta name="tool-tags" content="Diff, 对比, 文本, 开发者工具, 实时">
    <link rel="stylesheet" href="/src/style.css">
    <style>
        /* Specific styles for the diff overlay to ensure pixel-perfect alignment */
        .editor-container {
            position: relative;
            flex: 1;
            overflow: hidden;
            background: white;
        }
        .dark .editor-container {
            background: #020617; /* slate-950 */
        }
        .editor-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            padding: 2rem;
            font-family: var(--font-mono);
            font-size: 0.875rem; /* text-sm */
            line-height: 1.625; /* leading-relaxed */
            white-space: pre-wrap;
            word-break: break-all;
            margin: 0;
            border: none;
            outline: none;
            resize: none;
        }
        .highlight-layer {
            pointer-events: none;
            color: transparent;
            overflow-y: auto;
            z-index: 1;
        }
        .input-layer {
            background: transparent;
            z-index: 2;
            overflow-y: auto;
        }
        .diff-added {
            background-color: rgba(16, 185, 129, 0.2); /* emerald-500/20 */
            color: #064e3b; /* emerald-950 */
            border-bottom: 1px solid rgba(16, 185, 129, 0.4);
        }
        .dark .diff-added {
            background-color: rgba(16, 185, 129, 0.25);
            color: #34d399; /* emerald-400 */
        }
        .diff-removed {
            background-color: rgba(244, 63, 94, 0.2); /* rose-500/20 */
            color: #4c0519; /* rose-950 */
            text-decoration: line-through;
            border-bottom: 1px solid rgba(244, 63, 94, 0.4);
        }
        .dark .diff-removed {
            background-color: rgba(244, 63, 94, 0.25);
            color: #fb7185; /* rose-400 */
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen flex flex-col transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-file-transfer-line text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">文本对比工具</span>
            </h1>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="clearAll()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="清空内容">
                <i class="ri-delete-bin-line text-xl opacity-70"></i>
            </button>
            <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
                <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden border-b border-slate-200 dark:border-slate-800">
        <!-- Left: Original -->
        <div class="flex-1 flex flex-col border-r border-slate-200 dark:border-slate-800">
            <div class="h-10 bg-white dark:bg-slate-900 px-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Original Version</span>
                <span id="origStats" class="text-[9px] font-bold text-slate-400 font-mono">0 Lines</span>
            </div>
            <div class="editor-container">
                <!-- Highlight Layer Original -->
                <div id="origHighlight" class="editor-layer highlight-layer"></div>
                <!-- Interactive Layer Original -->
                <textarea id="origInput" class="editor-layer input-layer text-slate-900 dark:text-slate-300" placeholder="在此粘贴原始文本..."></textarea>
            </div>
        </div>

        <!-- Right: Modified -->
        <div class="flex-1 flex flex-col">
            <div class="h-10 bg-white dark:bg-slate-900 px-6 border-b border-slate-200 dark:border-slate-800 flex items-center justify-between">
                <span class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Modified Version</span>
                <span id="modStats" class="text-[9px] font-bold text-slate-400 font-mono">0 Lines</span>
            </div>
            <div class="editor-container">
                 <!-- Highlight Layer Modified -->
                <div id="modHighlight" class="editor-layer highlight-layer"></div>
                <!-- Interactive Layer Modified -->
                <textarea id="modInput" class="editor-layer input-layer text-slate-900 dark:text-slate-300" placeholder="在此粘贴修改后的文本进行对比..."></textarea>
            </div>
        </div>
    </main>

    <!-- Footer / Toolbar -->
    <div class="h-14 bg-white dark:bg-slate-900 px-6 flex items-center justify-between text-[10px] font-bold uppercase tracking-widest text-slate-400 shrink-0">
        <div class="flex items-center gap-6">
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-emerald-500/20 border border-emerald-500/30"></span> 新增
            </div>
            <div class="flex items-center gap-2">
                <span class="w-2.5 h-2.5 rounded-full bg-rose-500/20 border border-rose-500/30"></span> 删除/修改
            </div>
        </div>
        <div class="hidden sm:block">
            文本差异会实时高亮显示 • 滚动已自动同步
        </div>
        <button onclick="loadSample()" class="px-4 py-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors flex items-center gap-2">
            <i class="ri-magic-line"></i> 载入示例
        </button>
    </div>

    <script type="module">
        import { initTheme, toggleTheme, showToast } from '/src/common.js';
        import { diffChars } from 'diff';
        window.toggleTheme = toggleTheme;
        window.showToast = showToast;

        const origInput = document.getElementById('origInput');
        const modInput = document.getElementById('modInput');
        const origHighlight = document.getElementById('origHighlight');
        const modHighlight = document.getElementById('modHighlight');
        const origStats = document.getElementById('origStats');
        const modStats = document.getElementById('modStats');

        function updateStats() {
            const oLines = origInput.value ? origInput.value.split('\n').length : 0;
            const mLines = modInput.value ? modInput.value.split('\n').length : 0;
            origStats.textContent = `${oLines} Line${oLines !== 1 ? 's' : ''}`;
            modStats.textContent = `${mLines} Line${mLines !== 1 ? 's' : ''}`;
        }

        function runDiff() {
            const orig = origInput.value;
            const mod = modInput.value;

            const diff = diffChars(orig, mod);
            
            let origHtml = '';
            let modHtml = '';

            diff.forEach(part => {
                const value = escapeHtml(part.value);
                if (part.added) {
                    modHtml += `<span class="diff-added">${value}</span>`;
                } else if (part.removed) {
                    origHtml += `<span class="diff-removed">${value}</span>`;
                } else {
                    origHtml += `<span>${value}</span>`;
                    modHtml += `<span>${value}</span>`;
                }
            });

            origHighlight.innerHTML = origHtml;
            modHighlight.innerHTML = modHtml;
            updateStats();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Synchronized Scrolling Logic
        function syncScroll(e) {
            const source = e.target;
            const targets = [];
            
            if (source === origInput) {
                targets.push(origHighlight, modInput, modHighlight);
            } else if (source === modInput) {
                targets.push(modHighlight, origInput, origHighlight);
            }

            targets.forEach(target => {
                target.scrollTop = source.scrollTop;
                target.scrollLeft = source.scrollLeft;
            });
        }

        origInput.addEventListener('scroll', syncScroll);
        modInput.addEventListener('scroll', syncScroll);

        // Input listeners
        origInput.addEventListener('input', runDiff);
        modInput.addEventListener('input', runDiff);

        window.clearAll = () => {
            origInput.value = '';
            modInput.value = '';
            runDiff();
        }

        window.loadSample = () => {
            origInput.value = "Antigravity is a powerful agentic AI coding assistant.\nDesigned for modern developers.\nFast and reliable.";
            modInput.value = "Antigravity is an extremely powerful agentic AI coding assistant.\nBuilt for modern developers.\nFast, safe and reliable.";
            runDiff();
        }

        // Initial
        loadSample();
    </script>
</body>
</html>
