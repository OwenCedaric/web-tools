<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 编解码 - {{siteName}}</title>
    <meta name="description" content="在线 Base64 编解码工具，支持文本与 Base64 互转，支持中文。">
    <meta name="tool-icon" content="ri-lock-unlock-line">
    <meta name="tool-tags" content="Base64, 编解码, 开发工具, 安全">
    <link rel="stylesheet" href="/src/style.css">
    
    
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-lock-unlock-line text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">Base64 编解码</span>
            </h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
            <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
        </button>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8 lg:py-12">
        <div class="grid lg:grid-cols-2 gap-6 lg:gap-8">
            <!-- Plain Text Panel -->
            <div class="flex flex-col gap-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="ri-text-snippet"></i> 明文
                    </h2>
                    <div class="flex gap-3">
                        <button onclick="clearText('plain')" class="text-[10px] font-bold text-slate-400 hover:text-rose-500 transition-colors uppercase">清空</button>
                        <button onclick="copyText('plain')" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors uppercase">复制</button>
                    </div>
                </div>
                <div class="relative group">
                    <textarea id="plain" 
                        class="w-full h-64 lg:h-[400px] p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-sm focus:ring-2 focus:ring-slate-900 dark:focus:ring-white focus:border-transparent outline-none transition-all font-mono text-sm leading-relaxed"
                        placeholder="在此处输入或粘贴文本..."></textarea>
                    <div class="absolute bottom-6 right-6 text-[10px] font-bold text-slate-300 dark:text-slate-600 uppercase tracking-tighter" id="plainStats">0 字符</div>
                </div>
                <button onclick="encodeBase64()" class="w-full py-4 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-2xl shadow-xl shadow-slate-900/10 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                    编码为 Base64 <i class="ri-arrow-right-line"></i>
                </button>
            </div>

            <!-- Base64 Panel -->
            <div class="flex flex-col gap-4">
                <div class="flex items-center justify-between px-2">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="ri-code-line"></i> Base64
                    </h2>
                    <div class="flex gap-3">
                        <button onclick="clearText('base64')" class="text-[10px] font-bold text-slate-400 hover:text-rose-500 transition-colors uppercase">清空</button>
                        <button onclick="copyText('base64')" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors uppercase">复制</button>
                    </div>
                </div>
                <div class="relative group">
                    <textarea id="base64" 
                        class="w-full h-64 lg:h-[400px] p-6 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl shadow-sm focus:ring-2 focus:ring-slate-900 dark:focus:ring-white focus:border-transparent outline-none transition-all font-mono text-sm leading-relaxed"
                        placeholder="在此处输入或粘贴 Base64 代码..."></textarea>
                    <div class="absolute bottom-6 right-6 text-[10px] font-bold text-slate-300 dark:text-slate-600 uppercase tracking-tighter" id="base64Stats">0 字符</div>
                </div>
                <button onclick="decodeBase64()" class="w-full py-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-slate-100 font-bold rounded-2xl shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                    <i class="ri-arrow-left-line"></i> 解码为文本
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <!-- INJECT_FOOTER -->

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script type="module">
        import { initTheme, toggleTheme, showToast } from '/src/common.js';
        window.toggleTheme = toggleTheme;
        window.showToast = showToast;
        const plainEl = document.getElementById('plain');
        const base64El = document.getElementById('base64');
        const plainStatsEl = document.getElementById('plainStats');
        const base64StatsEl = document.getElementById('base64Stats');

        function updateStats() {
            plainStatsEl.textContent = `${plainEl.value.length} 字符`;
            base64StatsEl.textContent = `${base64El.value.length} 字符`;
        }

        function encodeBase64() {
            try {
                const text = plainEl.value;
                if (!text) return;
                const encoded = btoa(unescape(encodeURIComponent(text)));
                base64El.value = encoded;
                updateStats();
                showToast("编码成功");
            } catch (e) {
                console.error("Encoding error:", e);
                showToast("编码失败，请检查输入内容", "error");
            }
        }

        function decodeBase64() {
            try {
                const text = base64El.value.trim();
                if (!text) return;
                const decoded = decodeURIComponent(escape(atob(text)));
                plainEl.value = decoded;
                updateStats();
                showToast("解码成功");
            } catch (e) {
                console.error("Decoding error:", e);
                showToast("格式错误", "error");
            }
        }

        function clearText(type) {
            if (type === 'plain') {
                plainEl.value = '';
                base64El.value = '';
            } else {
                base64El.value = '';
                plainEl.value = '';
            }
            updateStats();
        }

        async function copyText(type) {
            const el = type === 'plain' ? plainEl : base64El;
            if (!el.value) return;
            try {
                await navigator.clipboard.writeText(el.value);
                showToast('已复制到剪贴板');
            } catch (err) {
                showToast('复制失败', 'error');
            }
        }

                
        plainEl.addEventListener('input', updateStats);
        base64El.addEventListener('input', updateStats);
        // Expose functions to window for onclick handlers
        window.clearText = clearText;
        window.copyText = copyText;
        window.decodeBase64 = decodeBase64;
        window.encodeBase64 = encodeBase64;

    </script>
</body>
</html>
