<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片蒙版编辑器 - {{siteName}}</title>
    <meta name="description" content="在线图片堆叠与蒙版处理工具，支持自定义覆盖层、透明度调节及实时合成预览。">
    <meta name="tool-icon" content="ri-stack-line">
    <meta name="tool-tags" content="图片处理, 蒙版, 覆盖层, 设计工具">
    <link rel="stylesheet" href="/src/style.css">

</head>
<body class="bg-slate-50  text-slate-900  min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80  backdrop-blur-md border-b border-slate-200  flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100  rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-stack-line text-slate-900 "></i>
                <span class="tracking-tight">图片蒙版编辑器</span>
            </h1>
        </div>
        
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 lg:py-12">
        <div class="grid lg:grid-cols-[400px_1fr] gap-8">
            <!-- Left: Controls -->
            <aside class="space-y-6">
                <!-- Layer: Base -->
                <div class="bg-white  border border-slate-200  rounded-3xl p-6 shadow-sm space-y-4">
                    <div class="flex items-center justify-between">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">底层图片 (Base)</label>
                        <button onclick="clearLayer('base')" class="text-[10px] font-bold text-slate-400 hover:text-rose-500 transition-colors uppercase">重置</button>
                    </div>
                    <div onclick="document.getElementById('base-input').click()" class="w-full aspect-video border-2 border-dashed border-slate-100  rounded-2xl flex flex-col items-center justify-center gap-2 cursor-pointer hover:bg-slate-50  transition-all group overflow-hidden relative">
                        <img id="base-thumb" class="absolute inset-0 w-full h-full object-cover hidden opacity-20 grayscale scale-110">
                        <i class="ri-image-add-line text-2xl text-slate-300  group-hover:scale-110 transition-transform"></i>
                        <span class="text-[10px] font-bold text-slate-400  uppercase tracking-widest">选择背景图</span>
                    </div>
                    <input type="file" id="base-input" class="hidden" accept="image/*">
                </div>

                <!-- Layer: Overlay -->
                <div class="bg-white  border border-slate-200  rounded-3xl p-6 shadow-sm space-y-6">
                    <div class="flex items-center justify-between">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest uppercase">覆盖图片 (Overlay)</label>
                        <button onclick="clearLayer('overlay')" class="text-[10px] font-bold text-slate-400 hover:text-rose-500 transition-colors uppercase">重置</button>
                    </div>
                    <div onclick="document.getElementById('overlay-input').click()" class="w-full h-24 border-2 border-dashed border-slate-100  rounded-2xl flex flex-col items-center justify-center gap-2 cursor-pointer hover:bg-slate-50  transition-all group overflow-hidden relative">
                        <img id="overlay-thumb" class="absolute inset-0 w-full h-full object-cover hidden opacity-20 grayscale scale-110">
                        <i class="ri-image-add-line text-2xl text-slate-300  group-hover:scale-110 transition-transform"></i>
                        <span class="text-[10px] font-bold text-slate-400  uppercase tracking-widest">选择蒙版图</span>
                    </div>
                    <input type="file" id="overlay-input" class="hidden" accept="image/*">

                    <!-- Overlay Opacity -->
                    <div class="space-y-4 pt-2">
                        <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase tracking-widest font-bold">
                            <span>透明度 (Opacity)</span>
                            <span id="opacity-val" class="text-slate-900  font-mono text-xs">50%</span>
                        </div>
                        <input type="range" id="opacity-input" min="0" max="100" value="50" class="w-full h-1.5 bg-slate-100  rounded-lg appearance-none cursor-pointer accent-slate-900 ">
                    </div>
                </div>

                <!-- Info -->
                <div class="bg-slate-900  rounded-3xl p-6 text-white space-y-2.5">
                    <h4 class="text-[10px] font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                        <i class="ri-lightbulb-flash-line"></i> 提示
                    </h4>
                    <p class="text-xs text-slate-300 leading-relaxed">
                        支持 PNG/JPG 叠加，蒙版图片支持 Alpha 通道。合成后的图片将按底层图片的比例导出为 JPEG。
                    </p>
                </div>
            </aside>

            <!-- Right: Preview & Save -->
            <div class="space-y-6">
                <div class="bg-white  border border-slate-200  rounded-[2.5rem] p-6 shadow-sm overflow-hidden flex flex-col gap-6">
                    <!-- Preview Header -->
                    <div class="flex items-center justify-between px-2">
                        <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest uppercase">实时预览面板</h2>
                        <div id="render-status" class="hidden text-[10px] font-bold text-emerald-500 flex items-center gap-1">
                            <i class="ri-checkbox-circle-line"></i> 已合成
                        </div>
                    </div>
                    
                    <!-- Canvas Area -->
                    <div class="preview-checkerboard rounded-[2rem] flex items-center justify-center p-8 overflow-hidden">
                        <div id="canvas-wrapper" class="canvas-container hidden">
                            <canvas id="main-canvas"></canvas>
                        </div>
                        <div id="no-content" class="text-slate-300  text-center py-20">
                            <i class="ri-brush-4-line text-6xl"></i>
                            <p class="text-[10px] font-bold uppercase tracking-widest mt-4">请先上传图片</p>
                        </div>
                    </div>

                    <!-- Footer Info -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-4 bg-slate-50  rounded-2xl border border-slate-100 ">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">背景宽</p>
                            <span id="canvas-w" class="text-xs font-mono font-bold">—</span>
                        </div>
                        <div class="p-4 bg-slate-50  rounded-2xl border border-slate-100 ">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">背景高</p>
                            <span id="canvas-h" class="text-xs font-mono font-bold">—</span>
                        </div>
                    </div>
                </div>

                <!-- Save Action -->
                <button onclick="downloadResult()" id="download-btn" disabled class="w-full h-16 bg-slate-900  text-white  font-bold rounded-2xl shadow-2xl active:scale-95 transition-all flex items-center justify-center gap-3 disabled:opacity-30 disabled:grayscale">
                    <i class="ri-download-cloud-line text-xl"></i>
                    <span class="uppercase tracking-widest">导出合成图片 (JPG)</span>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <!-- INJECT_FOOTER -->

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script type="module">
        import { showToast  } from '/src/common.js';
        
        window.showToast = showToast;
        let baseImg = null;
        let overlayImg = null;
        let opacity = 0.5;

        const canvas = document.getElementById('main-canvas');
        const ctx = canvas.getContext('2d');
        const wrapper = document.getElementById('canvas-wrapper');
        const noContent = document.getElementById('no-content');

        function handleFile(input, callback) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => callback(img);
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('base-input').addEventListener('change', (e) => {
            handleFile(e.target, (img) => {
                baseImg = img;
                document.getElementById('base-thumb').src = img.src;
                document.getElementById('base-thumb').classList.remove('hidden');
                document.getElementById('canvas-w').textContent = `${img.width} px`;
                document.getElementById('canvas-h').textContent = `${img.height} px`;
                render();
            });
        });

        document.getElementById('overlay-input').addEventListener('change', (e) => {
            handleFile(e.target, (img) => {
                overlayImg = img;
                document.getElementById('overlay-thumb').src = img.src;
                document.getElementById('overlay-thumb').classList.remove('hidden');
                render();
            });
        });

        document.getElementById('opacity-input').addEventListener('input', (e) => {
            opacity = e.target.value / 100;
            document.getElementById('opacity-val').textContent = `${e.target.value}%`;
            render();
        });

        function render() {
            if (!baseImg) return;
            
            noContent.classList.add('hidden');
            wrapper.classList.remove('hidden');
            document.getElementById('download-btn').disabled = false;
            document.getElementById('render-status').classList.remove('hidden');

            canvas.width = baseImg.width;
            canvas.height = baseImg.height;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(baseImg, 0, 0);

            if (overlayImg) {
                ctx.globalAlpha = opacity;
                ctx.drawImage(overlayImg, 0, 0, baseImg.width, baseImg.height);
                ctx.globalAlpha = 1.0;
            }
        }

        function clearLayer(type) {
            if (type === 'base') {
                baseImg = null;
                document.getElementById('base-thumb').classList.add('hidden');
                document.getElementById('canvas-w').textContent = '—';
                document.getElementById('canvas-h').textContent = '—';
                wrapper.classList.add('hidden');
                noContent.classList.remove('hidden');
                document.getElementById('download-btn').disabled = true;
            } else {
                overlayImg = null;
                document.getElementById('overlay-thumb').classList.add('hidden');
                render();
            }
        }

        function downloadResult() {
            if (!baseImg) return;
            const link = document.createElement('a');
            link.download = `overlay-${Date.now()}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.9);
            link.click();
            showToast('合成图片已导出');
        }
        // Expose functions to window for onclick handlers
        window.clearLayer = clearLayer;
        window.downloadResult = downloadResult;

    </script>
</body>
</html>
