<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简计算器 - Web Tools</title>
    <meta name="description" content="一个干净、极简的在线计算器，支持基础算术运算与键盘快捷键。">
    <meta name="tool-icon" content="ri-calculator-line">
    <meta name="tool-tags" content="计算器, 数学, 常用工具, 极简">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        .calc-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .calc-btn:active { transform: scale(0.92); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-calculator-line text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">极简计算器</span>
            </h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
            <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
        </button>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 lg:py-24 flex justify-center items-center">
        <!-- Calculator Card -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[3rem] p-8 shadow-2xl w-full max-w-[400px] space-y-8">
            <!-- Display Area -->
            <div class="bg-slate-50 dark:bg-slate-950 border border-slate-100 dark:border-slate-800/50 rounded-[2rem] p-8 flex flex-col items-end justify-center min-h-[160px] shadow-inner overflow-hidden">
                <div id="history" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest h-6 overflow-hidden whitespace-nowrap opacity-60"></div>
                <div id="current" class="text-5xl font-bold tracking-tighter text-slate-900 dark:text-white overflow-hidden whitespace-nowrap">0</div>
            </div>

            <!-- Keypad -->
            <div class="grid grid-cols-4 gap-4">
                <!-- Row 1 -->
                <button onclick="clearAll()" class="calc-btn h-16 rounded-2xl bg-rose-50 dark:bg-rose-900/20 text-rose-500 font-bold text-xs uppercase tracking-widest hover:bg-rose-100 dark:hover:bg-rose-900/30">AC</button>
                <button onclick="del()" class="calc-btn h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-400 font-bold text-xs uppercase tracking-widest hover:bg-slate-200 dark:hover:bg-slate-700"><i class="ri-delete-back-2-line text-lg"></i></button>
                <button onclick="appendOp('%')" class="calc-btn h-16 rounded-2xl bg-slate-100 dark:bg-slate-800 text-slate-900 dark:text-white font-bold text-lg hover:bg-slate-200 dark:hover:bg-slate-700">%</button>
                <button onclick="appendOp('/')" class="calc-btn h-16 rounded-2xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold text-xl hover:opacity-90">÷</button>

                <!-- Row 2 -->
                <button onclick="appendNum('7')" class="calc-btn h-16 rounded-2xl bg-slate-50 dark:bg-slate-800/40 text-slate-900 dark:text-white font-bold text-lg hover:bg-slate-100 dark:hover:bg-slate-800">7</button>
                <button onclick="appendNum('8')" class="calc-btn h-16 rounded-2xl bg-slate-50 dark:bg-slate-800/40 text-slate-900 dark:text-white font-bold text-lg hover:bg-slate-100 dark:hover:bg-slate-800">8</button>
                <button onclick="appendNum('9')" class="calc-btn h-16 rounded-2xl bg-slate-50 dark:bg-slate-800/40 text-slate-900 dark:text-white font-bold text-lg hover:bg-slate-100 dark:hover:bg-slate-800">9</button>
                <button onclick="appendOp('*')" class="calc-btn h-16 rounded-2xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold text-xl hover:opacity-90">×</button>

                <!-- Row 3 -->
                <button onclick="appendNum('4')" class="calc-btn h-16 rounded-2xl bg-slate-50 dark:bg-slate-800/40 text-slate-900 dark:text-white font-bold text-lg hover:bg-slate-100 dark:hover:bg-slate-800">4</button>
                <button onclick="appendNum('5')" class="calc-btn h-16 rounded-2xl bg-slate-50 dark:bg-slate-800/40 text-slate-900 dark:text-white font-bold text-lg hover:bg-slate-100 dark:hover:bg-slate-800">5</button>
                <button onclick="appendNum('6')" class="calc-btn h-16 rounded-2xl bg-slate-50 dark:bg-slate-800/40 text-slate-900 dark:text-white font-bold text-lg hover:bg-slate-100 dark:hover:bg-slate-800">6</button>
                <button onclick="appendOp('-')" class="calc-btn h-16 rounded-2xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold text-xl hover:opacity-90">−</button>

                <!-- Row 4 -->
                <button onclick="appendNum('1')" class="calc-btn h-16 rounded-2xl bg-slate-50 dark:bg-slate-800/40 text-slate-900 dark:text-white font-bold text-lg hover:bg-slate-100 dark:hover:bg-slate-800">1</button>
                <button onclick="appendNum('2')" class="calc-btn h-16 rounded-2xl bg-slate-50 dark:bg-slate-800/40 text-slate-900 dark:text-white font-bold text-lg hover:bg-slate-100 dark:hover:bg-slate-800">2</button>
                <button onclick="appendNum('3')" class="calc-btn h-16 rounded-2xl bg-slate-50 dark:bg-slate-800/40 text-slate-900 dark:text-white font-bold text-lg hover:bg-slate-100 dark:hover:bg-slate-800">3</button>
                <button onclick="appendOp('+')" class="calc-btn h-16 rounded-2xl bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold text-xl hover:opacity-90">+</button>

                <!-- Row 5 -->
                <button onclick="appendNum('0')" class="calc-btn h-16 rounded-2xl bg-slate-50 dark:bg-slate-800/40 text-slate-900 dark:text-white font-bold text-lg hover:bg-slate-100 dark:hover:bg-slate-800 col-span-2">0</button>
                <button onclick="appendNum('.')" class="calc-btn h-16 rounded-2xl bg-slate-50 dark:bg-slate-800/40 text-slate-900 dark:text-white font-bold text-lg hover:bg-slate-100 dark:hover:bg-slate-800">.</button>
                <button onclick="calculate()" class="calc-btn h-16 rounded-2xl bg-emerald-500 text-white font-bold text-xl hover:bg-emerald-600 shadow-lg shadow-emerald-500/20">=</button>
            </div>

            <!-- Hint -->
            <div class="px-6 py-4 bg-slate-50 dark:bg-slate-950 rounded-2xl text-[10px] text-slate-400 font-bold uppercase tracking-widest text-center flex items-center justify-center gap-2">
                <i class="ri-keyboard-line text-sm opacity-50"></i> 支持键盘快捷键输入
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-12 border-t border-slate-200 dark:border-slate-800 text-center text-slate-400 dark:text-slate-600 text-[10px] font-bold uppercase tracking-widest">
        <p>&copy; 2025 Web Tools Collection • Made with ❤️ • <a href="https://ceda.is/" class="hover:text-slate-900 dark:hover:text-white transition-colors">Cedar</a></p>
    </footer>

    <script>
        const histEl = document.getElementById('history');
        const currEl = document.getElementById('current');

        let currentStr = '0';
        let historyStr = '';
        let evaluated = false;

        function updateDisplay() {
            currEl.textContent = currentStr;
            histEl.textContent = historyStr;
            // Progressive font resizing for long numbers
            if (currentStr.length > 8) currEl.classList.replace('text-5xl', 'text-3xl');
            else currEl.classList.replace('text-3xl', 'text-5xl');
        }

        function clearAll() {
            currentStr = '0'; historyStr = ''; evaluated = false;
            updateDisplay();
        }

        function del() {
            if (evaluated) { clearAll(); return; }
            currentStr = currentStr.slice(0, -1);
            if (currentStr === '' || currentStr === '-') currentStr = '0';
            updateDisplay();
        }

        function appendNum(num) {
            if (evaluated) { currentStr = num; historyStr = ''; evaluated = false; }
            else {
                if (currentStr === '0' && num !== '.') currentStr = num;
                else {
                    if (num === '.' && currentStr.includes('.')) return;
                    currentStr += num;
                }
            }
            if (currentStr.length > 15) currentStr = currentStr.slice(0, 15);
            updateDisplay();
        }

        function appendOp(op) {
            if (currentStr === 'Error') currentStr = '0';
            if (evaluated) evaluated = false;

            if (currentStr === '' && historyStr.match(/[+\-*/%]\s$/)) {
                historyStr = historyStr.slice(0, -3) + ' ' + op + ' ';
                updateDisplay();
                return;
            }

            if (historyStr !== '' && currentStr !== '' && !evaluated) calculate(false);

            historyStr = currentStr + ' ' + op + ' ';
            currentStr = '';
            updateDisplay();
        }

        function calculate(final = true) {
            if (!historyStr || (currentStr === '' && final)) return;
            const expr = historyStr.replace('÷', '/').replace('×', '*').replace('−', '-') + (currentStr || '0');
            try {
                let result = Function('"use strict";return (' + expr + ')')();
                result = Math.round(result * 1000000) / 1000000;
                if (!isFinite(result)) throw new Error();
                if (final) {
                    historyStr = expr + ' =';
                    currentStr = result.toString();
                    evaluated = true;
                } else {
                    currentStr = result.toString();
                }
            } catch (e) {
                currentStr = 'Error'; historyStr = ''; evaluated = true;
            }
            updateDisplay();
        }

        window.addEventListener('keydown', (e) => {
            if (/[0-9.]/.test(e.key)) appendNum(e.key);
            if (['+', '-', '*', '/', '%'].includes(e.key)) appendOp(e.key);
            if (e.key === 'Enter') calculate();
            if (e.key === 'Backspace') del();
            if (e.key === 'Escape') clearAll();
        });

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.className = document.documentElement.classList.contains('dark') ? 'ri-sun-line text-xl opacity-70' : 'ri-moon-line text-xl opacity-70';
            }
        }

        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcon();
    </script>
</body>
</html>
