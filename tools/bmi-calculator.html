<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI 计算器 - {{siteName}}</title>
    <meta name="description" content="快速计算您的身体质量指数 (BMI)，了解您的身体健康状况。">
    <meta name="tool-icon" content="ri-heart-pulse-line">
    <meta name="tool-tags" content="BMI, 健康, 计算器, 医疗">
    <link rel="stylesheet" href="/src/style.css">

</head>
<body class="bg-slate-50  text-slate-900  min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80  backdrop-blur-md border-b border-slate-200  flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100  rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-heart-pulse-line text-slate-900 "></i>
                <span class="tracking-tight">BMI 计算器</span>
            </h1>
        </div>
        
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 lg:py-12">
        <div class="grid lg:grid-cols-2 gap-8 items-start">
            <!-- Input Card -->
            <div class="bg-white  border border-slate-200  rounded-[2.5rem] p-8 shadow-sm space-y-8">
                <div class="flex bg-slate-100  p-1.5 rounded-2xl">
                    <button onclick="setSystem('metric')" id="tab-metric" class="flex-1 py-2 text-xs font-bold uppercase tracking-widest rounded-xl transition-all bg-white  text-slate-900  shadow-sm ring-1 ring-slate-900/5">公制</button>
                    <button onclick="setSystem('imperial')" id="tab-imperial" class="flex-1 py-2 text-xs font-bold uppercase tracking-widest rounded-xl transition-all text-slate-400">英制</button>
                </div>

                <div class="space-y-6">
                    <!-- Metric Inputs -->
                    <div id="metric-inputs" class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">身高 (Height)</label>
                            <div class="relative group">
                                <input type="number" id="mHeight" class="w-full bg-slate-50  border-none rounded-2xl px-6 py-4 font-mono text-xl focus:ring-2 focus:ring-slate-900  outline-none transition-all" placeholder="175">
                                <span class="absolute right-6 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400 uppercase">cm</span>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">体重 (Weight)</label>
                            <div class="relative group">
                                <input type="number" id="mWeight" class="w-full bg-slate-50  border-none rounded-2xl px-6 py-4 font-mono text-xl focus:ring-2 focus:ring-slate-900  outline-none transition-all" placeholder="70">
                                <span class="absolute right-6 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400 uppercase">kg</span>
                            </div>
                        </div>
                    </div>

                    <!-- Imperial Inputs -->
                    <div id="imperial-inputs" class="space-y-6 hidden">
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">身高 (Height)</label>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="relative group">
                                    <input type="number" id="iHeightFt" class="w-full bg-slate-50  border-none rounded-2xl px-6 py-4 font-mono text-xl focus:ring-2 focus:ring-slate-900  outline-none transition-all" placeholder="5">
                                    <span class="absolute right-6 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400 uppercase">ft</span>
                                </div>
                                <div class="relative group">
                                    <input type="number" id="iHeightIn" class="w-full bg-slate-50  border-none rounded-2xl px-6 py-4 font-mono text-xl focus:ring-2 focus:ring-slate-900  outline-none transition-all" placeholder="9">
                                    <span class="absolute right-6 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400 uppercase">in</span>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">体重 (Weight)</label>
                            <div class="relative group">
                                <input type="number" id="iWeight" class="w-full bg-slate-50  border-none rounded-2xl px-6 py-4 font-mono text-xl focus:ring-2 focus:ring-slate-900  outline-none transition-all" placeholder="150">
                                <span class="absolute right-6 top-1/2 -translate-y-1/2 text-xs font-bold text-slate-400 uppercase">lbs</span>
                            </div>
                        </div>
                    </div>

                    <button onclick="calculate()" class="w-full py-5 bg-slate-900  text-white  font-bold rounded-[1.5rem] shadow-xl shadow-slate-900/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        开始计算 <i class="ri-arrow-right-line"></i>
                    </button>
                    <button onclick="reset()" class="w-full py-4 text-[10px] font-bold text-slate-400 hover:text-rose-500 transition-colors uppercase tracking-widest">重置所有数据</button>
                </div>
            </div>

            <!-- Result Card -->
            <div id="result-card" class="bg-white  border border-slate-200  rounded-[2.5rem] p-10 shadow-sm flex flex-col items-center justify-center text-center space-y-6 opacity-50 transition-all">
                <div class="space-y-1">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">您的计算结果</p>
                    <div id="bmi-val" class="text-[5rem] font-bold leading-none tracking-tighter text-slate-900 ">0.0</div>
                </div>
                
                <div id="status-badge" class="px-6 py-2 rounded-full text-xs font-bold uppercase tracking-widest border border-slate-100  bg-slate-50  text-slate-400">
                    等待输入...
                </div>

                <div class="w-full h-2 bg-slate-100  rounded-full overflow-hidden flex">
                    <div class="h-full bg-sky-400 w-[18.5%]"></div>
                    <div class="h-full bg-emerald-500 w-[6.5%]"></div>
                    <div class="h-full bg-amber-500 w-[5%]"></div>
                    <div class="h-full bg-rose-500 flex-1"></div>
                </div>

                <p id="advice-text" class="text-sm text-slate-400 leading-relaxed px-4">
                    请输入您的身高和体重，我们将为您分析健康状况。
                </p>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <!-- INJECT_FOOTER -->

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script type="module">
        import { showToast  } from '/src/common.js';
        
        window.showToast = showToast;
        let isMetric = true;

        function setSystem(sys) {
            isMetric = sys === 'metric';
            const mTab = document.getElementById('tab-metric');
            const iTab = document.getElementById('tab-imperial');
            const mIn = document.getElementById('metric-inputs');
            const iIn = document.getElementById('imperial-inputs');

            if (isMetric) {
                mTab.className = "flex-1 py-2 text-xs font-bold uppercase tracking-widest rounded-xl transition-all bg-white  text-slate-900  shadow-sm ring-1 ring-slate-900/5";
                iTab.className = "flex-1 py-2 text-xs font-bold uppercase tracking-widest rounded-xl transition-all text-slate-400";
                mIn.classList.remove('hidden');
                iIn.classList.add('hidden');
            } else {
                iTab.className = "flex-1 py-2 text-xs font-bold uppercase tracking-widest rounded-xl transition-all bg-white  text-slate-900  shadow-sm ring-1 ring-slate-900/5";
                mTab.className = "flex-1 py-2 text-xs font-bold uppercase tracking-widest rounded-xl transition-all text-slate-400";
                iIn.classList.remove('hidden');
                mIn.classList.add('hidden');
            }
            reset();
        }

        function calculate() {
            let bmi = 0;
            if (isMetric) {
                const h = parseFloat(document.getElementById('mHeight').value);
                const w = parseFloat(document.getElementById('mWeight').value);
                if (!h || !w || h <= 0 || w <= 0) return showToast("请输入有效的身高体重", "error");
                bmi = w / Math.pow(h / 100, 2);
            } else {
                const f = parseFloat(document.getElementById('iHeightFt').value) || 0;
                const i = parseFloat(document.getElementById('iHeightIn').value) || 0;
                const w = parseFloat(document.getElementById('iWeight').value);
                const totalInches = (f * 12) + i;
                if (!totalInches || !w || totalInches <= 0 || w <= 0) return showToast("请输入有效的身高体重", "error");
                bmi = 703 * (w / Math.pow(totalInches, 2));
            }

            bmi = Math.round(bmi * 10) / 10;
            const resCard = document.getElementById('result-card');
            const bmiDisp = document.getElementById('bmi-val');
            const statusBadge = document.getElementById('status-badge');
            const advice = document.getElementById('advice-text');

            resCard.classList.remove('opacity-50');
            bmiDisp.textContent = bmi;

            let statusStr = '';
            let statusStyle = '';
            let adviceStr = '';

            if (bmi < 18.5) {
                statusStr = "体重过轻";
                statusStyle = "border-sky-500 text-sky-500 bg-sky-50 ";
                adviceStr = "您的体重低于正常范围，建议加强营养并保持均衡饮食。";
            } else if (bmi < 24.9) {
                statusStr = "体重正常";
                statusStyle = "border-emerald-500 text-emerald-500 bg-emerald-50 ";
                adviceStr = "太棒了！您的体重处于非常健康的范围，请继续保持良好的生活习惯。";
            } else if (bmi < 29.9) {
                statusStr = "超重";
                statusStyle = "border-amber-500 text-amber-500 bg-amber-50 ";
                adviceStr = "您的体重略高于理想范围，建议增加日常运动并控制热量摄入。";
            } else {
                statusStr = "肥胖";
                statusStyle = "border-rose-500 text-rose-500 bg-rose-50 ";
                adviceStr = "您的体重已属于肥胖范畴，为了长期健康，建议咨询医生或营养师。";
            }

            statusBadge.className = "px-6 py-2 rounded-full text-xs font-bold uppercase tracking-widest border transition-all " + statusStyle;
            statusBadge.textContent = statusStr;
            advice.textContent = adviceStr;
            
            showToast("计算完成");
        }

        function reset() {
            document.querySelectorAll('input').forEach(i => i.value = '');
            document.getElementById('result-card').classList.add('opacity-50');
            document.getElementById('bmi-val').textContent = "0.0";
            document.getElementById('status-badge').className = "px-6 py-2 rounded-full text-xs font-bold uppercase tracking-widest border border-slate-100  bg-slate-50  text-slate-400";
            document.getElementById('status-badge').textContent = "等待输入...";
            document.getElementById('advice-text').textContent = "请输入您的身高和体重，我们将为您分析健康状况。";
        }
        // Expose functions to window for onclick handlers
        window.calculate = calculate;
        window.reset = reset;
        window.setSystem = setSystem;

    </script>
</body>
</html>
