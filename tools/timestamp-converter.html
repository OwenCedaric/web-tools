<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时间戳转换 - {{siteName}}</title>
    <meta name="description" content="易用的 Unix 时间戳在线转换工具，支持毫秒识别、实时时钟及多种日期格式互转。">
    <meta name="tool-icon" content="ri-time-line">
    <meta name="tool-tags" content="时间戳, Unix, Timestamp, 日期转换, 开发者工具">
    <link rel="stylesheet" href="/src/style.css">
    
    
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-time-line text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">时间戳转换</span>
            </h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
            <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
        </button>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 lg:py-12 space-y-8">
        <!-- Live Clock Section -->
        <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[3rem] p-8 lg:p-12 shadow-sm relative overflow-hidden group">
            <div class="absolute top-0 right-0 p-8">
                <div class="flex items-center gap-2 text-[10px] font-bold text-emerald-500 uppercase tracking-widest">
                    <span class="relative flex h-2 w-2">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                    </span>
                    Live Now
                </div>
            </div>
            
            <div class="flex flex-col items-center justify-center text-center space-y-4">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.4em]">Current Unix Timestamp</p>
                <div id="currentTs" onclick="copyValue(this.innerText)" class="text-6xl sm:text-7xl font-bold font-mono tracking-tighter text-slate-900 dark:text-white cursor-pointer hover:opacity-70 transition-opacity active:scale-95">0000000000</div>
                <p id="currentDateStr" class="text-xs font-bold text-slate-400 uppercase tracking-widest">—</p>
            </div>
        </div>

        <div class="grid lg:grid-cols-2 gap-8">
            <!-- Timestamp to Date -->
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2.5rem] p-8 shadow-sm space-y-6">
                <div class="flex items-center justify-between">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="ri-login-circle-line"></i> 时间戳 → 日期
                    </h2>
                    <button onclick="useCurrentTs()" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors uppercase">使用当前时间</button>
                </div>

                <div class="space-y-4">
                    <div class="relative group">
                        <input type="number" id="tsInput" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-6 py-4 font-mono text-xl focus:ring-2 focus:ring-slate-900 dark:focus:ring-white outline-none transition-all placeholder:text-slate-300 dark:placeholder:text-slate-600" placeholder="1700000000" oninput="tsToDate()">
                        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 uppercase">Input</span>
                    </div>

                    <div id="tsResult" class="bg-slate-50 dark:bg-slate-800/50 rounded-2xl p-6 space-y-4 font-mono text-xs overflow-hidden opacity-50 transition-all duration-300">
                        <div class="flex flex-col gap-1">
                            <span class="text-[9px] text-slate-400 uppercase font-sans font-bold">Local Time</span>
                            <span id="res-local" class="text-slate-900 dark:text-white break-all">—</span>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span class="text-[9px] text-slate-400 uppercase font-sans font-bold">GMT / UTC</span>
                            <span id="res-utc" class="text-slate-900 dark:text-white break-all">—</span>
                        </div>
                        <div class="flex flex-col gap-1">
                            <span class="text-[9px] text-slate-400 uppercase font-sans font-bold">ISO 8601</span>
                            <span id="res-iso" class="text-slate-900 dark:text-white break-all">—</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Date to Timestamp -->
            <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2.5rem] p-8 shadow-sm space-y-6">
                 <div class="flex items-center justify-between">
                    <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <i class="ri-logout-circle-line"></i> 日期 → 时间戳
                    </h2>
                    <button onclick="useNowDate()" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors uppercase">此刻</button>
                </div>

                <div class="space-y-4">
                    <div class="relative group">
                        <input type="datetime-local" id="dateInput" step="1" class="w-full bg-slate-50 dark:bg-slate-800 border-none rounded-2xl px-6 py-4 font-mono text-lg focus:ring-2 focus:ring-slate-900 dark:focus:ring-white outline-none transition-all" onchange="dateToTs()">
                        <span class="absolute right-6 top-1/2 -translate-y-1/2 text-[10px] font-bold text-slate-400 uppercase pointer-events-none">Select</span>
                    </div>

                    <div id="dateResult" class="bg-slate-50 dark:bg-slate-800/50 rounded-2xl p-6 space-y-6 font-mono overflow-hidden opacity-50 transition-all duration-300">
                        <div class="flex items-center justify-between">
                            <div class="flex flex-col gap-1">
                                <span class="text-[9px] text-slate-400 uppercase font-sans font-bold">Seconds</span>
                                <span id="res-sec" class="text-xl font-bold text-slate-900 dark:text-white">—</span>
                            </div>
                            <button onclick="copyElement('res-sec')" class="p-2 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors"><i class="ri-file-copy-line text-slate-400"></i></button>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex flex-col gap-1">
                                <span class="text-[9px] text-slate-400 uppercase font-sans font-bold">Milliseconds</span>
                                <span id="res-ms" class="text-xl font-bold text-slate-900 dark:text-white">—</span>
                            </div>
                             <button onclick="copyElement('res-ms')" class="p-2 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-lg transition-colors"><i class="ri-file-copy-line text-slate-400"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <!-- INJECT_FOOTER -->

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script type="module">
        import { initTheme, toggleTheme, showToast } from '/src/common.js';
        
        window.toggleTheme = toggleTheme;
        window.showToast = showToast;
        
        // Expose tool functions to window for inline event handlers
        window.useCurrentTs = useCurrentTs;
        window.useNowDate = useNowDate;
        window.copyValue = copyValue;
        window.copyElement = copyElement;
        window.tsToDate = tsToDate;
        window.dateToTs = dateToTs;

        // Update Live clock
        function updateClock() {
            const now = new Date();
            const ts = Math.floor(now.getTime() / 1000);
            document.getElementById('currentTs').innerText = ts;
            document.getElementById('currentDateStr').innerText = now.toLocaleString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        function useCurrentTs() {
            const now = Math.floor(Date.now() / 1000);
            document.getElementById('tsInput').value = now;
            tsToDate();
        }

        function useNowDate() {
            const now = new Date();
            // Format to YYYY-MM-DDThh:mm:ss in local time
            const tzOffset = now.getTimezoneOffset() * 60000;
            const localISOTime = (new Date(now - tzOffset)).toISOString().slice(0, 19);
            document.getElementById('dateInput').value = localISOTime;
            dateToTs();
        }

        async function copyValue(val) {
            try {
                await navigator.clipboard.writeText(val);
                showToast("已复制到剪贴板");
            } catch (e) {
                console.error('Copy failed:', e);
            }
        }

        function copyElement(id) {
            const text = document.getElementById(id).innerText;
            if (text && text !== "—") {
                copyValue(text);
            }
        }

        function tsToDate() {
            const tsInput = document.getElementById('tsInput');
            let val = tsInput.value.trim();
            const resBox = document.getElementById('tsResult');
            
            if (!val) {
                resBox.classList.add('opacity-50');
                return;
            }

            resBox.classList.remove('opacity-50');
            
            let v = parseFloat(val);
            
            if (isNaN(v)) {
                setTsResult("无效的输入");
                return;
            }

            // Auto detect millis vs seconds
            // Anything less than 1e11 (year 5138) is highly likely seconds.
            if (v < 1e11) {
                v *= 1000;
            }

            const date = new Date(v);
            if (isNaN(date.getTime())) {
                setTsResult("无效的时间戳");
            } else {
                document.getElementById('res-local').innerText = date.toLocaleString();
                document.getElementById('res-utc').innerText = date.toUTCString();
                document.getElementById('res-iso').innerText = date.toISOString();
            }
        }

        function setTsResult(msg) {
            document.getElementById('res-local').innerText = msg;
            document.getElementById('res-utc').innerText = "—";
            document.getElementById('res-iso').innerText = "—";
        }

        function dateToTs() {
            const val = document.getElementById('dateInput').value;
            const resBox = document.getElementById('dateResult');
            
            if (!val) {
                resBox.classList.add('opacity-50');
                return;
            }

            resBox.classList.remove('opacity-50');
            const date = new Date(val);
            
            if (isNaN(date.getTime())) {
                document.getElementById('res-sec').innerText = "无效的日期";
                document.getElementById('res-ms').innerText = "—";
            } else {
                document.getElementById('res-sec').innerText = Math.floor(date.getTime() / 1000);
                document.getElementById('res-ms').innerText = date.getTime();
            }
        }
    </script>
</body>
</html>
