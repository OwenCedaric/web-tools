<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TraceIt - 矢量轮廓提取 - Web Tools</title>
    <meta name="description" content="智能矢量化工具，将位图图片（JPG/PNG）实时转换为 SVG 路径，支持精细化参数调节与即时预览。">
    <meta name="tool-icon" content="ri-pentool-line">
    <meta name="tool-tags" content="矢量化, Trace, SVG, 图片转换, 设计工具">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        #preview-container svg { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.1)); }
        .preview-checkerboard { background-image: radial-gradient(#e2e8f0 1px, transparent 1px); background-size: 20px 20px; }
        .dark .preview-checkerboard { background-image: radial-gradient(#334155 1px, transparent 1px); }
        
        .knob-input { accent-color: #0f172a; }
        .dark .knob-input { accent-color: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">
    <!-- Header -->
    <header class="h-16 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 flex items-center justify-between px-4 lg:px-6 sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <a href="../index.html" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="返回首页">
                <i class="ri-arrow-left-line text-xl opacity-70"></i>
            </a>
            <h1 class="text-lg font-semibold flex items-center gap-2">
                <i class="ri-pentool-line text-slate-900 dark:text-white"></i>
                <span class="tracking-tight">TraceIt 矢量提取</span>
            </h1>
        </div>
        <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg transition-colors" title="切换主题">
            <i id="theme-icon" class="ri-moon-line text-xl opacity-70"></i>
        </button>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-8 lg:py-12">
        <div class="grid lg:grid-cols-[400px,1fr] gap-8">
            <!-- Left Column: Controls -->
            <aside class="space-y-6">
                <!-- Upload Area -->
                <div id="drop-zone" class="bg-white dark:bg-slate-900 border-2 border-dashed border-slate-200 dark:border-slate-800 rounded-[2.5rem] p-8 flex flex-col items-center justify-center gap-4 cursor-pointer hover:border-slate-900 dark:hover:border-white hover:bg-slate-50 dark:hover:bg-slate-800 transition-all select-none group">
                    <div class="w-16 h-16 bg-slate-50 dark:bg-slate-800 rounded-3xl flex items-center justify-center text-slate-400 group-hover:bg-slate-900 dark:group-hover:bg-white group-hover:text-white dark:group-hover:text-slate-900 transition-all">
                        <i class="ri-image-add-line text-3xl"></i>
                    </div>
                    <div class="text-center">
                        <p class="text-sm font-bold uppercase tracking-widest text-slate-900 dark:text-white">选择位图</p>
                        <p class="text-[10px] text-slate-400 mt-1 uppercase tracking-widest">DRAG OR CLICK</p>
                    </div>
                </div>
                <input type="file" id="file-input" class="hidden" accept="image/*">

                <!-- Parameters -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[2.5rem] p-8 shadow-sm space-y-8 overflow-hidden">
                    <div class="flex items-center justify-between mb-2">
                        <h2 class="text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                            <i class="ri-list-settings-line"></i> 提取参数
                        </h2>
                        <button onclick="resetParams()" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors uppercase">重置</button>
                    </div>

                    <div class="space-y-8">
                        <!-- Threshold -->
                        <div class="space-y-4">
                            <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                <span>两级阈值 (ltres)</span>
                                <span id="ltres-val" class="text-slate-900 dark:text-white font-mono bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded text-[11px]">1</span>
                            </div>
                            <input type="range" id="ltres" min="0" max="100" value="1" class="w-full h-1.5 bg-slate-100 dark:bg-slate-800 rounded-lg appearance-none cursor-pointer knob-input">
                        </div>

                        <!-- Blur -->
                        <div class="space-y-4">
                            <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                                <span>高斯模糊 (blur)</span>
                                <span id="blur-val" class="text-slate-900 dark:text-white font-mono bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded text-[11px]">0.5</span>
                            </div>
                            <input type="range" id="blur" min="0" max="5" step="0.1" value="0.5" class="w-full h-1.5 bg-slate-100 dark:bg-slate-800 rounded-lg appearance-none cursor-pointer knob-input">
                        </div>

                        <!-- Palette/Scale -->
                        <div class="space-y-4">
                             <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">输出比例 (Scale)</label>
                             <div class="flex gap-3">
                                <button onclick="setScale(1)" class="scale-btn flex-1 py-3 px-4 rounded-xl border border-slate-100 dark:border-slate-800 text-xs font-bold uppercase active:scale-95 transition-all bg-slate-900 text-white" data-scale="1">1:1</button>
                                <button onclick="setScale(2)" class="scale-btn flex-1 py-3 px-4 rounded-xl border border-slate-100 dark:border-slate-800 text-xs font-bold uppercase active:scale-95 transition-all text-slate-400" data-scale="2">2:1</button>
                                <button onclick="setScale(4)" class="scale-btn flex-1 py-3 px-4 rounded-xl border border-slate-100 dark:border-slate-800 text-xs font-bold uppercase active:scale-95 transition-all text-slate-400" data-scale="4">4:1</button>
                             </div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Right Column: Preview & Output -->
            <div class="space-y-6">
                <!-- Preview Card -->
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-[3rem] p-6 shadow-sm flex flex-col items-center">
                    <div class="w-full flex items-center justify-between mb-6 px-2">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">SVG 实时提取预览</span>
                        <div id="loader" class="hidden flex items-center gap-2 text-[10px] font-bold text-slate-400 uppercase">
                            <i class="ri-loader-4-line animate-spin text-lg"></i>
                            处理中...
                        </div>
                    </div>

                    <div id="preview-wrapper" class="preview-checkerboard w-full aspect-video rounded-[2rem] flex items-center justify-center p-8 border border-slate-50 dark:border-slate-800/50 shadow-inner overflow-hidden">
                        <div id="preview-container" class="w-full h-full flex items-center justify-center transition-all duration-300">
                             <div id="no-image" class="text-slate-300 dark:text-slate-700 text-center">
                                <i class="ri-quill-pen-line text-7xl"></i>
                                <p class="text-[10px] font-bold uppercase tracking-widest mt-4">尚未转换任何图片</p>
                             </div>
                        </div>
                    </div>

                    <!-- Result Info -->
                    <div id="result-info" class="w-full mt-6 scale-95 opacity-0 transition-all grid grid-cols-2 sm:grid-cols-4 gap-4">
                        <div class="p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl text-center border border-slate-100 dark:border-slate-800">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">路径数</p>
                            <span id="path-count" class="text-xs font-mono font-bold">—</span>
                        </div>
                         <div class="p-4 bg-slate-50 dark:bg-slate-800/50 rounded-2xl text-center border border-slate-100 dark:border-slate-800 text-center">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">节点</p>
                            <span id="node-count" class="text-xs font-mono font-bold">—</span>
                        </div>
                        <div class="p-4 bg-slate-100 dark:bg-slate-800 rounded-2xl text-center col-span-2 flex items-center justify-between px-6">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">提取完成</span>
                            <span class="text-emerald-500"><i class="ri-checkbox-circle-fill text-xl"></i></span>
                        </div>
                    </div>
                </div>

                <!-- Export -->
                <div class="grid sm:grid-cols-2 gap-4">
                    <button onclick="downloadSVG()" id="download-btn" disabled class="w-full h-16 bg-slate-900 dark:bg-white text-white dark:text-slate-900 font-bold rounded-2xl shadow-xl active:scale-95 transition-all flex items-center justify-center gap-3 disabled:opacity-30 disabled:grayscale">
                        <i class="ri-file-code-line text-xl"></i>
                        <span class="uppercase tracking-widest">导出 SVG 文件</span>
                    </button>
                    <button onclick="copySVG()" id="copy-btn" disabled class="w-full h-16 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-900 dark:text-white font-bold rounded-2xl shadow-sm hover:bg-slate-50 dark:hover:bg-slate-700 active:scale-95 transition-all flex items-center justify-center gap-3 disabled:opacity-30 disabled:grayscale">
                        <i class="ri-file-copy-2-line text-xl"></i>
                        <span class="uppercase tracking-widest">复制代码</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-12 border-t border-slate-200 dark:border-slate-800 text-center text-slate-400 dark:text-slate-600 text-[10px] font-bold uppercase tracking-widest">
        <p>&copy; 2025 Web Tools Collection • Made with ❤️ • <a href="https://ceda.is/" class="hover:text-slate-900 dark:hover:text-white transition-colors">Cedar</a></p>
    </footer>

    <div id="toastContainer" class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[3000] pointer-events-none space-y-2"></div>

    <script>
        let currentImage = null;
        let scale = 1;
        let svgContent = '';

        const els = {
            dropZone: document.getElementById('drop-zone'),
            fileInput: document.getElementById('file-input'),
            container: document.getElementById('preview-container'),
            noImg: document.getElementById('no-image'),
            loader: document.getElementById('loader'),
            downloadBtn: document.getElementById('download-btn'),
            copyBtn: document.getElementById('copy-btn'),
            info: document.getElementById('result-info'),
            ltres: document.getElementById('ltres'),
            blur: document.getElementById('blur'),
            ltresVal: document.getElementById('ltres-val'),
            blurVal: document.getElementById('blur-val')
        };

        // Basic Listeners
        els.dropZone.addEventListener('click', () => els.fileInput.click());
        els.fileInput.addEventListener('change', (e) => handleFile(e.target.files[0]));
        els.dropZone.addEventListener('dragover', (e) => { e.preventDefault(); e.currentTarget.classList.add('border-slate-900', 'dark:border-white'); });
        els.dropZone.addEventListener('dragleave', (e) => { e.currentTarget.classList.remove('border-slate-900', 'dark:border-white'); });
        els.dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            e.currentTarget.classList.remove('border-slate-900', 'dark:border-white');
            handleFile(e.dataTransfer.files[0]);
        });

        function handleFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                currentImage = e.target.result;
                trace();
                showToast("位图载入中...");
            };
            reader.readAsDataURL(file);
        }

        function trace() {
            if (!currentImage) return;
            
            els.loader.classList.remove('hidden');
            els.ltresVal.textContent = els.ltres.value;
            els.blurVal.textContent = els.blur.value;

            // Use requestAnimationFrame to not block UI
            setTimeout(() => {
                try {
                    const options = {
                        ltres: parseFloat(els.ltres.value),
                        qtres: 1,
                        pathomit: 8,
                        rightangleenhance: true,
                        strokewidth: 1,
                        linefilter: true,
                        desc: false,
                        blurradius: parseFloat(els.blur.value),
                        blurdelta: 20,
                        scale: scale
                    };
                    
                    svgContent = ImageTracer.imageToSVG(currentImage, options);
                    
                    els.container.innerHTML = svgContent;
                    els.noImg.classList.add('hidden');
                    els.downloadBtn.disabled = false;
                    els.copyBtn.disabled = false;
                    els.info.classList.remove('opacity-0', 'scale-95');
                    
                    // Simple Stats (mocked for demo as ImageTracer doesn't return them directly in simple mode)
                    document.getElementById('path-count').textContent = (svgContent.match(/<path/g) || []).length;
                    document.getElementById('node-count').textContent = Math.round(svgContent.length / 50);

                } catch (e) {
                    console.error(e);
                    showToast("矢量化失败", "error");
                } finally {
                    els.loader.classList.add('hidden');
                }
            }, 10);
        }

        function setScale(s) {
            scale = s;
            document.querySelectorAll('.scale-btn').forEach(btn => {
                btn.classList.toggle('bg-slate-900', btn.getAttribute('data-scale') == s);
                btn.classList.toggle('text-white', btn.getAttribute('data-scale') == s);
                btn.classList.toggle('text-slate-400', btn.getAttribute('data-scale') != s);
            });
            trace();
        }

        function resetParams() {
            els.ltres.value = 1;
            els.blur.value = 0.5;
            trace();
        }

        function downloadSVG() {
            if (!svgContent) return;
            const blob = new Blob([svgContent], {type: 'image/svg+xml'});
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `traced-${Date.now()}.svg`;
            link.click();
            URL.revokeObjectURL(url);
            showToast('SVG 已导出');
        }

        async function copySVG() {
            if (!svgContent) return;
            try {
                await navigator.clipboard.writeText(svgContent);
                showToast('代码已复制');
            } catch (err) { showToast('复制失败', 'error'); }
        }

        function showToast(title, type = 'success') {
            const container = document.getElementById('toastContainer');
            if (container.children.length > 2) container.children[0].remove();
            const toast = document.createElement('div');
            const bgClass = type === 'success' ? 'bg-slate-900 border border-slate-800' : 'bg-rose-600';
            const icon = type === 'success' ? 'ri-checkbox-circle-fill' : 'ri-error-warning-fill';
            
            toast.className = `flex items-center gap-3 px-5 py-3 rounded-2xl shadow-2xl backdrop-blur-xl text-white transform transition-all duration-300 translate-y-10 opacity-0 ${bgClass}`;
            toast.innerHTML = `
                <i class="${icon} text-lg opacity-80"></i>
                <span class="font-bold text-[12px] truncate tracking-tight uppercase">${title}</span>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.classList.remove('translate-y-10', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon();
        }

        function updateThemeIcon() {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.className = document.documentElement.classList.contains('dark') ? 'ri-sun-line text-xl opacity-70' : 'ri-moon-line text-xl opacity-70';
            }
        }

        if (localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        updateThemeIcon();

        [els.ltres, els.blur].forEach(el => el.addEventListener('input', trace));
    </script>
</body>
</html>
