<footer id="global-footer" class="h-10 border-t border-slate-100 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm px-6 flex items-center justify-between shrink-0">
    <div class="flex items-center gap-3">
        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">{{siteName}}</span>
    </div>
    <div class="flex items-center gap-4 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
        <span>{{footerText}}</span>
        <a href="{{githubUrl}}" target="_blank" class="hover:text-slate-900 dark:hover:text-white transition-colors">
            <i class="ri-github-fill text-xs"></i>
        </a>
    </div>
</footer>
