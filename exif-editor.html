<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXIF Editor Pro</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root {
            --primary: #18181b;
            --primary-light: #27272a;
            --success: #22c55e;
            --warning: #eab308;
            --error: #ef4444;
            --bg-primary: #ffffff;
            --bg-secondary: #fafafa;
            --bg-tertiary: #f5f5f5;
            --text-primary: #09090b;
            --text-secondary: #71717a;
            --text-tertiary: #a1a1aa;
            --text-inverse: #ffffff;
            --border-light: #f4f4f5;
            --border: #e4e4e7;
            --border-dark: #d4d4d8;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;
            --header-height: 64px;
            --footer-height: 84px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            height: var(--header-height);
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-inverse);
            font-size: 22px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 20px;
            transition: all 0.2s;
        }

        .icon-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: calc(var(--footer-height) + 20px);
        }

        .upload-section {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 500px;
        }

        .upload-area {
            width: 100%;
            max-width: 540px;
            padding: 80px 40px;
            background: var(--bg-primary);
            border: 2px dashed var(--border);
            border-radius: var(--radius-xl);
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: var(--bg-secondary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .upload-area.dragover {
            border-color: var(--success);
            background: #f0fdf4;
            border-style: solid;
        }

        .upload-icon {
            width: 96px;
            height: 96px;
            margin: 0 auto 24px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .upload-area:hover .upload-icon {
            background: var(--primary);
            color: var(--text-inverse);
            transform: scale(1.05);
        }

        .upload-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .upload-desc {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .upload-input {
            display: none;
        }

        .workspace {
            display: none;
        }

        .workspace.active {
            display: flex;
            flex-direction: column;
        }

        .images-section {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
        }

        .images-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .images-title {
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .images-count {
            background: var(--bg-tertiary);
            padding: 4px 14px;
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .images-actions {
            display: flex;
            gap: 8px;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
        }

        .image-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .image-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .image-item.selected {
            border-color: var(--primary);
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-checkbox {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 24px;
            height: 24px;
            z-index: 10;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .editor-section {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--border-light);
        }

        .editor-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .editor-icon {
            width: 48px;
            height: 48px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .editor-title h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .editor-title p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .form-section {
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            font-family: inherit;
            background: var(--bg-primary);
            transition: all 0.2s;
        }

        .form-control:hover {
            border-color: var(--border-dark);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(24, 24, 27, 0.05);
        }

        .form-control:disabled {
            background: var(--bg-secondary);
            color: var(--text-tertiary);
            cursor: not-allowed;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .map-container {
            height: 280px;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            margin-top: 12px;
            position: relative;
        }

        .map-search {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            z-index: 1000;
            display: flex;
            gap: 8px;
        }

        .map-search-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            box-shadow: var(--shadow-lg);
        }

        .map-search-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            font-size: 20px;
            transition: all 0.2s;
        }

        .map-search-btn:hover {
            background: var(--primary-light);
        }

        .map-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--footer-height);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-top: 1px solid var(--border-light);
            padding: 20px;
            box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.05);
            z-index: 100;
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .btn {
            width: 100%;
            height: 52px;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--text-inverse);
            box-shadow: var(--shadow);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-light);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
        }

        .progress-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .progress-overlay.active {
            display: flex;
        }

        .progress-card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 36px;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--shadow-xl);
        }

        .progress-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
        }

        .progress-bar {
            height: 10px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
            border-radius: var(--radius-full);
        }

        .progress-text {
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .toast-container {
            position: fixed;
            bottom: calc(var(--footer-height) + 24px);
            left: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-primary);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: 14px;
            animation: slideUp 0.3s;
            pointer-events: auto;
            border: 1px solid var(--border);
        }

        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--error); }
        .toast.warning { border-left: 4px solid var(--warning); }

        .toast-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { color: var(--success); }
        .toast.error .toast-icon { color: var(--error); }
        .toast.warning .toast-icon { color: var(--warning); }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 2px;
        }

        .toast-message {
            font-size: 13px;
            color: var(--text-secondary);
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden { display: none !important; }

        @media (min-width: 768px) {
            .images-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 16px;
            }
            .map-container { height: 380px; }
            .toast-container {
                left: auto;
                right: 28px;
                max-width: 420px;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="ri-image-edit-fill"></i>
                    </div>
                    <span>EXIF Editor Pro</span>
                </div>
                <button class="icon-btn hidden" id="resetBtn" title="重新开始">
                    <i class="ri-refresh-line"></i>
                </button>
            </div>
        </header>

        <main class="main">
            <div class="upload-section" id="uploadSection">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">
                        <i class="ri-upload-cloud-2-line"></i>
                    </div>
                    <h2 class="upload-title">上传图片</h2>
                    <p class="upload-desc">点击或拖拽图片到这里<br>支持 JPG、PNG 格式（PNG 将自动转换为 JPG）</p>
                    <input type="file" class="upload-input" id="fileInput" accept="image/jpeg,image/jpg,image/png" multiple>
                </div>
            </div>

            <div class="workspace" id="workspace">
                <div class="images-section">
                    <div class="images-header">
                        <div class="images-title">
                            <span>图片列表</span>
                            <span class="images-count"><span id="selectedCount">0</span>/<span id="totalCount">0</span></span>
                        </div>
                        <div class="images-actions">
                            <button class="icon-btn" id="selectAllBtn" title="全选">
                                <i class="ri-checkbox-multiple-line"></i>
                            </button>
                            <button class="icon-btn" id="addMoreBtn" title="添加更多">
                                <i class="ri-add-line"></i>
                            </button>
                        </div>
                    </div>
                    <div class="images-grid" id="imagesGrid"></div>
                </div>

                <div class="editor-section">
                    <div class="editor-header">
                        <div class="editor-icon">
                            <i class="ri-edit-2-fill"></i>
                        </div>
                        <div class="editor-title">
                            <h3>批量编辑</h3>
                            <p>设置将应用到所有选中的图片</p>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-title">
                            <i class="ri-camera-fill"></i>
                            相机信息
                        </div>
                        <div class="form-group">
                            <label class="form-label">相机品牌</label>
                            <select class="form-control" id="cameraBrand">
                                <option value="">选择品牌</option>
                                <option value="Canon">Canon</option>
                                <option value="Nikon">Nikon</option>
                                <option value="Sony">Sony</option>
                                <option value="Fujifilm">Fujifilm</option>
                                <option value="Leica">Leica</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label class="form-label">相机型号</label>
                            <select class="form-control" id="cameraModel" disabled>
                                <option value="">先选择品牌</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-title">
                            <i class="ri-settings-3-fill"></i>
                            拍摄参数
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">ISO</label>
                                <select class="form-control" id="iso">
                                    <option value="">选择 ISO</option>
                                    <option value="100">100</option>
                                    <option value="200">200</option>
                                    <option value="400">400</option>
                                    <option value="800">800</option>
                                    <option value="1600">1600</option>
                                    <option value="3200">3200</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">光圈</label>
                                <select class="form-control" id="aperture">
                                    <option value="">选择光圈</option>
                                    <option value="1.4">f/1.4</option>
                                    <option value="1.8">f/1.8</option>
                                    <option value="2.8">f/2.8</option>
                                    <option value="4.0">f/4.0</option>
                                    <option value="5.6">f/5.6</option>
                                    <option value="8.0">f/8.0</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">快门</label>
                                <select class="form-control" id="shutter">
                                    <option value="">选择快门</option>
                                    <option value="1/8000">1/8000s</option>
                                    <option value="1/4000">1/4000s</option>
                                    <option value="1/2000">1/2000s</option>
                                    <option value="1/1000">1/1000s</option>
                                    <option value="1/500">1/500s</option>
                                    <option value="1/250">1/250s</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">焦距</label>
                                <select class="form-control" id="focal">
                                    <option value="">选择焦距</option>
                                    <option value="14">14mm</option>
                                    <option value="24">24mm</option>
                                    <option value="35">35mm</option>
                                    <option value="50">50mm</option>
                                    <option value="85">85mm</option>
                                    <option value="200">200mm</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <div class="section-title">
                            <i class="ri-map-pin-fill"></i>
                            位置信息
                        </div>
                        <div class="form-group">
                            <label class="form-label">常用地点</label>
                            <select class="form-control" id="locationPreset">
                                <option value="">选择预设地点</option>
                                <option value="39.9042,116.4074">北京</option>
                                <option value="31.2304,121.4737">上海</option>
                                <option value="22.5431,114.0579">深圳</option>
                                <option value="23.1291,113.2644">广州</option>
                            </select>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">纬度</label>
                                <input type="number" class="form-control" id="latitude" step="0.000001" placeholder="39.904200">
                            </div>
                            <div class="form-group">
                                <label class="form-label">经度</label>
                                <input type="number" class="form-control" id="longitude" step="0.000001" placeholder="116.407400">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">地图选择</label>
                            <div class="map-container">
                                <div class="map-search">
                                    <input type="text" class="map-search-input" id="mapSearch" placeholder="搜索地点...">
                                    <button class="map-search-btn" id="mapSearchBtn">
                                        <i class="ri-search-line"></i>
                                    </button>
                                </div>
                                <div id="map" style="width: 100%; height: 100%;"></div>
                            </div>
                            <div class="map-controls">
                                <button class="btn btn-secondary" id="currentLocationBtn">
                                    <i class="ri-crosshair-line"></i>
                                    当前位置
                                </button>
                                <button class="btn btn-secondary" id="clearLocationBtn">
                                    <i class="ri-close-line"></i>
                                    清除位置
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer hidden" id="footer">
            <div class="footer-content">
                <button class="btn btn-primary" id="applyBtn">
                    <i class="ri-save-fill"></i>
                    <span>应用并下载</span>
                </button>
            </div>
        </footer>

        <div class="progress-overlay" id="progressOverlay">
            <div class="progress-card">
                <h3 class="progress-title" id="progressTitle">处理中...</h3>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
                <p class="progress-text" id="progressText">0 / 0</p>
            </div>
        </div>

        <div class="toast-container" id="toastContainer"></div>
    </div>

    <script>
        const CAMERAS = {
            'Canon': ['EOS R5', 'EOS R6', 'EOS 5D Mark IV'],
            'Nikon': ['Z9', 'Z7 II', 'D850'],
            'Sony': ['A1', 'A7R V', 'A7 IV'],
            'Fujifilm': ['X-H2S', 'X-T5', 'X-T4'],
            'Leica': ['M11', 'Q2', 'SL2']
        };

        const state = {
            images: [],
            selectedIds: new Set(),
            map: null,
            marker: null
        };

        const DOM = {
            uploadSection: document.getElementById('uploadSection'),
            uploadArea: document.getElementById('uploadArea'),
            fileInput: document.getElementById('fileInput'),
            workspace: document.getElementById('workspace'),
            imagesGrid: document.getElementById('imagesGrid'),
            totalCount: document.getElementById('totalCount'),
            selectedCount: document.getElementById('selectedCount'),
            selectAllBtn: document.getElementById('selectAllBtn'),
            addMoreBtn: document.getElementById('addMoreBtn'),
            resetBtn: document.getElementById('resetBtn'),
            footer: document.getElementById('footer'),
            applyBtn: document.getElementById('applyBtn'),
            progressOverlay: document.getElementById('progressOverlay'),
            progressTitle: document.getElementById('progressTitle'),
            progressFill: document.getElementById('progressFill'),
            progressText: document.getElementById('progressText'),
            toastContainer: document.getElementById('toastContainer'),
            cameraBrand: document.getElementById('cameraBrand'),
            cameraModel: document.getElementById('cameraModel'),
            iso: document.getElementById('iso'),
            aperture: document.getElementById('aperture'),
            shutter: document.getElementById('shutter'),
            focal: document.getElementById('focal'),
            locationPreset: document.getElementById('locationPreset'),
            latitude: document.getElementById('latitude'),
            longitude: document.getElementById('longitude'),
            mapSearch: document.getElementById('mapSearch'),
            mapSearchBtn: document.getElementById('mapSearchBtn'),
            currentLocationBtn: document.getElementById('currentLocationBtn'),
            clearLocationBtn: document.getElementById('clearLocationBtn')
        };

        function toast(title, message, type = 'success') {
            const icons = {
                success: 'ri-checkbox-circle-fill',
                error: 'ri-error-warning-fill',
                warning: 'ri-alert-fill'
            };
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="toast-icon ${icons[type]}"></i>
                <div class="toast-content">
                    <div class="toast-title">${title}</div>
                    ${message ? `<div class="toast-message">${message}</div>` : ''}
                </div>
            `;
            
            DOM.toastContainer.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        function updateUI() {
            DOM.totalCount.textContent = state.images.length;
            DOM.selectedCount.textContent = state.selectedIds.size;
        }

        function handleFiles(files) {
            Array.from(files).forEach(file => {
                if (!file.type.match('image/(jpeg|jpg|png)')) {
                    toast('格式错误', `${file.name} 不支持`, 'error');
                    return;
                }

                const reader = new FileReader();
                const id = Date.now() + Math.random();

                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const data = {
                            id,
                            file,
                            name: file.name,
                            dataUrl: e.target.result,
                            isPng: file.type === 'image/png'
                        };

                        state.images.push(data);
                        state.selectedIds.add(id);

                        const div = document.createElement('div');
                        div.className = 'image-item selected';
                        div.dataset.id = id;
                        div.innerHTML = `
                            <input type="checkbox" class="image-checkbox" checked data-id="${id}">
                            <img src="${data.dataUrl}" alt="${data.name}">
                        `;
                        DOM.imagesGrid.appendChild(div);

                        updateUI();
                    };
                    img.src = e.target.result;
                };

                reader.readAsDataURL(file);
            });

            DOM.uploadSection.classList.add('hidden');
            DOM.workspace.classList.add('active');
            DOM.footer.classList.remove('hidden');
            DOM.resetBtn.classList.remove('hidden');

            if (!state.map) {
                setTimeout(() => initMap(), 100);
            }

            toast('上传成功', `已加载 ${files.length} 张图片`);
        }

        function initMap() {
            state.map = L.map('map').setView([35.8617, 104.1954], 4);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(state.map);

            state.map.on('click', (e) => {
                setLocation(e.latlng.lat, e.latlng.lng);
            });
        }

        function setLocation(lat, lng) {
            DOM.latitude.value = lat.toFixed(6);
            DOM.longitude.value = lng.toFixed(6);

            if (state.marker) {
                state.map.removeLayer(state.marker);
            }

            state.marker = L.marker([lat, lng], { draggable: true }).addTo(state.map);
            state.marker.on('dragend', (e) => {
                const pos = e.target.getLatLng();
                setLocation(pos.lat, pos.lng);
            });

            state.map.setView([lat, lng], 13);
        }

        async function processAndDownload() {
            const selected = state.images.filter(img => state.selectedIds.has(img.id));
            if (selected.length === 0) {
                toast('未选择图片', '请至少选择一张', 'warning');
                return;
            }

            const exifData = {
                make: DOM.cameraBrand.value || '',
                model: DOM.cameraModel.value || '',
                iso: DOM.iso.value || '',
                aperture: DOM.aperture.value || '',
                shutter: DOM.shutter.value || '',
                focal: DOM.focal.value || '',
                latitude: DOM.latitude.value || '',
                longitude: DOM.longitude.value || ''
            };

            DOM.applyBtn.disabled = true;
            DOM.progressOverlay.classList.add('active');

            const processedBlobs = [];
            const baseTime = Date.now();

            try {
                for (let i = 0; i < selected.length; i++) {
                    const imageData = selected[i];
                    const timestamp = baseTime + (i * 1000);
                    
                    // 🔥 关键：先转换为 JPEG，再写入 EXIF
                    const jpegDataUrl = await convertToJpeg(imageData.dataUrl);
                    const blob = await processImageWithExif(jpegDataUrl, exifData, timestamp);
                    const filename = generateFilename(exifData.make, timestamp, i);
                    
                    processedBlobs.push({ name: filename, blob });
                    
                    const progress = ((i + 1) / selected.length) * 100;
                    DOM.progressFill.style.width = `${progress}%`;
                    DOM.progressText.textContent = `${i + 1} / ${selected.length}`;
                }

                await downloadFiles(processedBlobs);
                toast('处理完成', `成功处理 ${selected.length} 张图片`);
                
            } catch (error) {
                console.error('处理失败:', error);
                toast('处理失败', error.message, 'error');
            } finally {
                DOM.applyBtn.disabled = false;
                DOM.progressOverlay.classList.remove('active');
                DOM.progressFill.style.width = '0%';
            }
        }

        // 🔥 新增：将任何图片转换为 JPEG
        function convertToJpeg(dataUrl) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    
                    const ctx = canvas.getContext('2d');
                    // 白色背景（PNG 透明部分会变成白色）
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                    
                    // 转换为 JPEG
                    const jpegDataUrl = canvas.toDataURL('image/jpeg', 0.95);
                    resolve(jpegDataUrl);
                };
                img.onerror = () => reject(new Error('图片加载失败'));
                img.src = dataUrl;
            });
        }

        // 🔥 处理 JPEG 图片并写入 EXIF
        function processImageWithExif(jpegDataUrl, exifData, timestamp) {
            return new Promise((resolve, reject) => {
                try {
                    const exif = buildExif(exifData, timestamp);
                    const exifBytes = piexif.dump(exif);
                    const newDataUrl = piexif.insert(exifBytes, jpegDataUrl);
                    
                    fetch(newDataUrl)
                        .then(res => res.blob())
                        .then(blob => resolve(blob))
                        .catch(err => reject(err));
                        
                } catch (error) {
                    reject(error);
                }
            });
        }

        function buildExif(data, timestamp) {
            const exif = {
                "0th": {},
                "Exif": {},
                "GPS": {}
            };

            if (data.make) exif["0th"][piexif.ImageIFD.Make] = String(data.make);
            if (data.model) exif["0th"][piexif.ImageIFD.Model] = String(data.model);
            exif["0th"][piexif.ImageIFD.Software] = "EXIF Editor Pro";

            if (data.iso) exif["Exif"][piexif.ExifIFD.ISOSpeedRatings] = parseInt(data.iso);
            
            if (data.aperture) {
                const f = parseFloat(data.aperture);
                exif["Exif"][piexif.ExifIFD.FNumber] = [Math.round(f * 10), 10];
            }
            
            if (data.shutter) {
                const parts = data.shutter.split('/');
                if (parts.length === 2) {
                    exif["Exif"][piexif.ExifIFD.ExposureTime] = [parseInt(parts[0]), parseInt(parts[1])];
                }
            }
            
            if (data.focal) {
                exif["Exif"][piexif.ExifIFD.FocalLength] = [parseInt(data.focal), 1];
            }

            const date = new Date(timestamp);
            const dateStr = `${date.getFullYear()}:${String(date.getMonth() + 1).padStart(2, '0')}:${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}:${String(date.getSeconds()).padStart(2, '0')}`;
            
            exif["0th"][piexif.ImageIFD.DateTime] = dateStr;
            exif["Exif"][piexif.ExifIFD.DateTimeOriginal] = dateStr;
            exif["Exif"][piexif.ExifIFD.DateTimeDigitized] = dateStr;

            if (data.latitude && data.longitude) {
                const lat = parseFloat(data.latitude);
                const lon = parseFloat(data.longitude);
                
                exif["GPS"][piexif.GPSIFD.GPSLatitudeRef] = lat >= 0 ? "N" : "S";
                exif["GPS"][piexif.GPSIFD.GPSLatitude] = degToDms(Math.abs(lat));
                exif["GPS"][piexif.GPSIFD.GPSLongitudeRef] = lon >= 0 ? "E" : "W";
                exif["GPS"][piexif.GPSIFD.GPSLongitude] = degToDms(Math.abs(lon));
            }

            return exif;
        }

        function degToDms(deg) {
            const d = Math.floor(deg);
            const m = Math.floor((deg - d) * 60);
            const s = Math.round(((deg - d - m / 60) * 3600) * 100);
            return [[d, 1], [m, 1], [s, 100]];
        }

        function generateFilename(brand, timestamp, index) {
            const seq = String(1000 + index).padStart(4, '0');
            const prefix = brand === 'Canon' ? 'IMG' : brand === 'Nikon' ? 'DSC' : brand === 'Sony' ? 'DSC' : 'IMG';
            return `${prefix}_${seq}.jpg`;
        }

        async function downloadFiles(files) {
            if (files.length === 1) {
                const url = URL.createObjectURL(files[0].blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = files[0].name;
                a.click();
                URL.revokeObjectURL(url);
            } else {
                const zip = new JSZip();
                const folder = zip.folder('exif_edited');
                files.forEach(f => folder.file(f.name, f.blob));
                const content = await zip.generateAsync({ type: 'blob' });
                const url = URL.createObjectURL(content);
                const a = document.createElement('a');
                a.href = url;
                a.download = `exif_edited_${Date.now()}.zip`;
                a.click();
                URL.revokeObjectURL(url);
            }
        }

        // 事件绑定
        DOM.uploadArea.addEventListener('click', () => DOM.fileInput.click());
        DOM.fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) handleFiles(e.target.files);
        });

        DOM.uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            DOM.uploadArea.classList.add('dragover');
        });
        DOM.uploadArea.addEventListener('dragleave', () => {
            DOM.uploadArea.classList.remove('dragover');
        });
        DOM.uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            DOM.uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
        });

        DOM.imagesGrid.addEventListener('change', (e) => {
            if (e.target.classList.contains('image-checkbox')) {
                const id = parseFloat(e.target.dataset.id);
                const item = e.target.closest('.image-item');
                if (e.target.checked) {
                    state.selectedIds.add(id);
                    item.classList.add('selected');
                } else {
                    state.selectedIds.delete(id);
                    item.classList.remove('selected');
                }
                updateUI();
            }
        });

        DOM.selectAllBtn.addEventListener('click', () => {
            state.images.forEach(img => state.selectedIds.add(img.id));
            document.querySelectorAll('.image-item').forEach(item => {
                item.classList.add('selected');
                item.querySelector('.image-checkbox').checked = true;
            });
            updateUI();
        });

        DOM.addMoreBtn.addEventListener('click', () => DOM.fileInput.click());

        DOM.cameraBrand.addEventListener('change', (e) => {
            const brand = e.target.value;
            DOM.cameraModel.innerHTML = '<option value="">选择型号</option>';
            if (brand && CAMERAS[brand]) {
                CAMERAS[brand].forEach(model => {
                    const opt = document.createElement('option');
                    opt.value = model;
                    opt.textContent = model;
                    DOM.cameraModel.appendChild(opt);
                });
                DOM.cameraModel.disabled = false;
            } else {
                DOM.cameraModel.disabled = true;
            }
        });

        DOM.locationPreset.addEventListener('change', (e) => {
            const coords = e.target.value.split(',');
            if (coords.length === 2) {
                setLocation(parseFloat(coords[0]), parseFloat(coords[1]));
            }
        });

        DOM.mapSearchBtn.addEventListener('click', async () => {
            const query = DOM.mapSearch.value.trim();
            if (!query) return;

            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
                const data = await res.json();
                if (data && data.length > 0) {
                    setLocation(parseFloat(data[0].lat), parseFloat(data[0].lon));
                    toast('搜索成功', data[0].display_name);
                } else {
                    toast('未找到', '请尝试其他关键词', 'warning');
                }
            } catch (error) {
                toast('搜索失败', '网络错误', 'error');
            }
        });

        DOM.currentLocationBtn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                toast('不支持定位', '浏览器不支持', 'error');
                return;
            }
            navigator.geolocation.getCurrentPosition(
                (pos) => setLocation(pos.coords.latitude, pos.coords.longitude),
                () => toast('定位失败', '无法获取位置', 'error')
            );
        });

        DOM.clearLocationBtn.addEventListener('click', () => {
            DOM.latitude.value = '';
            DOM.longitude.value = '';
            if (state.marker) {
                state.map.removeLayer(state.marker);
                state.marker = null;
            }
        });

        DOM.applyBtn.addEventListener('click', processAndDownload);

        DOM.resetBtn.addEventListener('click', () => {
            if (confirm('确定要重新开始吗？')) location.reload();
        });
    </script>
</body>
</html>
