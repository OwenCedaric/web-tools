<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXIF Editor Pro - 图片元数据编辑器</title>
    
    <!-- 外部依赖 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.8.0/fonts/remixicon.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/piexifjs@1.0.6/piexif.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        /* ==================== 现代配色系统 ==================== */
        :root {
            /* 主色调 - 深邃黑 */
            --primary: #18181b;
            --primary-light: #27272a;
            --primary-hover: #3f3f46;
            
            /* 强调色 - 活力橙 */
            --accent: #f97316;
            --accent-light: #fb923c;
            --accent-dark: #ea580c;
            
            /* 功能色 */
            --success: #22c55e;
            --warning: #eab308;
            --error: #ef4444;
            
            /* 中性色 */
            --bg-primary: #ffffff;
            --bg-secondary: #fafafa;
            --bg-tertiary: #f5f5f5;
            --bg-hover: #f0f0f0;
            --bg-active: #e5e5e5;
            
            --text-primary: #09090b;
            --text-secondary: #71717a;
            --text-tertiary: #a1a1aa;
            --text-inverse: #ffffff;
            
            --border-light: #f4f4f5;
            --border: #e4e4e7;
            --border-dark: #d4d4d8;
            
            /* 阴影 */
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --shadow-xl: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            
            /* 圆角 */
            --radius-sm: 8px;
            --radius: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;
            
            /* 尺寸 */
            --header-height: 64px;
            --footer-height: 84px;
        }

        /* ==================== 基础重置 ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ==================== 应用布局 ==================== */
        .app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 顶部导航 */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            height: var(--header-height);
            background: var(--bg-primary);
            border-bottom: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            padding: 0 20px;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.8);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--primary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-inverse);
            font-size: 22px;
        }

        .header-actions {
            display: flex;
            gap: 8px;
        }

        /* 主内容区 */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: calc(var(--footer-height) + 20px);
        }

        /* ==================== 上传区域 ==================== */
        .upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 500px;
            padding: 40px 20px;
        }

        .upload-area {
            width: 100%;
            max-width: 540px;
            padding: 80px 40px;
            background: var(--bg-primary);
            border: 2px dashed var(--border);
            border-radius: var(--radius-xl);
            text-align: center;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: var(--bg-secondary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .upload-area:active {
            transform: translateY(0);
        }

        .upload-area.dragover {
            border-color: var(--accent);
            background: #fff7ed;
            border-style: solid;
        }

        .upload-icon {
            width: 96px;
            height: 96px;
            margin: 0 auto 24px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: var(--text-secondary);
            transition: all 0.3s;
        }

        .upload-area:hover .upload-icon {
            background: var(--primary);
            color: var(--text-inverse);
            transform: scale(1.05);
        }

        .upload-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--text-primary);
        }

        .upload-desc {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.6;
        }

        .upload-input {
            display: none;
        }

        /* ==================== 工作区 ==================== */
        .workspace {
            display: none;
            flex: 1;
        }

        .workspace.active {
            display: flex;
            flex-direction: column;
        }

        /* 图片列表 */
        .images-section {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--border-light);
        }

        .images-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .images-title {
            font-size: 17px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .images-count {
            background: var(--bg-tertiary);
            padding: 4px 14px;
            border-radius: var(--radius-full);
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .images-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 20px;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .icon-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--border);
        }

        .icon-btn:active {
            transform: scale(0.95);
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
        }

        .image-item {
            position: relative;
            aspect-ratio: 1;
            border-radius: var(--radius);
            overflow: hidden;
            background: var(--bg-secondary);
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .image-item:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .image-item:active {
            transform: scale(0.98);
        }

        .image-item.selected {
            border-color: var(--primary);
            box-shadow: 0 0 0 1px var(--primary);
        }

        .image-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-checkbox {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 24px;
            height: 24px;
            z-index: 10;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .image-status {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 24px;
            height: 24px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: var(--shadow);
        }

        .image-status.pending {
            color: var(--warning);
        }

        .image-status.processed {
            color: var(--success);
        }

        /* 编辑区域 */
        .editor-section {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--border-light);
            flex: 1;
            overflow-y: auto;
        }

        .editor-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 28px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .editor-icon {
            width: 48px;
            height: 48px;
            background: var(--bg-secondary);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            font-size: 24px;
        }

        .editor-title {
            flex: 1;
        }

        .editor-title h3 {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            color: var(--text-primary);
        }

        .editor-title p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* 表单 */
        .form-section {
            margin-bottom: 32px;
        }

        .form-section:last-child {
            margin-bottom: 0;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title i {
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 15px;
            font-family: inherit;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.2s;
        }

        .form-control:hover {
            border-color: var(--border-dark);
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(24, 24, 27, 0.05);
        }

        .form-control:disabled {
            background: var(--bg-secondary);
            color: var(--text-tertiary);
            cursor: not-allowed;
        }

        select.form-control {
            cursor: pointer;
        }

        textarea.form-control {
            min-height: 100px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        /* 地图 */
        .map-container {
            height: 280px;
            border-radius: var(--radius);
            overflow: hidden;
            border: 1px solid var(--border);
            margin-top: 12px;
            position: relative;
        }

        .map-search {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            z-index: 1000;
            display: flex;
            gap: 8px;
        }

        .map-search-input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            box-shadow: var(--shadow-lg);
            background: white;
        }

        .map-search-input:focus {
            outline: none;
            box-shadow: var(--shadow-xl);
        }

        .map-search-btn {
            width: 44px;
            height: 44px;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            font-size: 20px;
            transition: all 0.2s;
        }

        .map-search-btn:hover {
            background: var(--primary-light);
        }

        .map-search-btn:active {
            transform: scale(0.95);
        }

        .map-controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 12px;
        }

        /* 底部操作栏 */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: var(--footer-height);
            background: var(--bg-primary);
            border-top: 1px solid var(--border-light);
            padding: 20px;
            box-shadow: 0 -4px 6px -1px rgb(0 0 0 / 0.05);
            z-index: 100;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.9);
        }

        .footer-content {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            height: 52px;
            border: none;
            border-radius: var(--radius);
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            letter-spacing: 0.3px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn i {
            font-size: 22px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--text-inverse);
            box-shadow: var(--shadow);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-light);
            box-shadow: var(--shadow-md);
        }

        .btn-accent {
            background: var(--accent);
            color: var(--text-inverse);
            box-shadow: var(--shadow);
        }

        .btn-accent:hover:not(:disabled) {
            background: var(--accent-light);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-tertiary);
            border-color: var(--border-dark);
        }

        /* 进度条 */
        .progress-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .progress-overlay.active {
            display: flex;
        }

        .progress-card {
            background: var(--bg-primary);
            border-radius: var(--radius-lg);
            padding: 36px;
            width: 90%;
            max-width: 420px;
            box-shadow: var(--shadow-xl);
        }

        .progress-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 20px;
            text-align: center;
            color: var(--text-primary);
        }

        .progress-bar {
            height: 10px;
            background: var(--bg-tertiary);
            border-radius: var(--radius-full);
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: var(--radius-full);
        }

        .progress-text {
            text-align: center;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: calc(var(--footer-height) + 24px);
            left: 20px;
            right: 20px;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-primary);
            border-radius: var(--radius);
            padding: 16px 20px;
            box-shadow: var(--shadow-xl);
            display: flex;
            align-items: center;
            gap: 14px;
            animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            pointer-events: auto;
            border: 1px solid var(--border);
        }

        .toast.success { border-left: 4px solid var(--success); }
        .toast.error { border-left: 4px solid var(--error); }
        .toast.warning { border-left: 4px solid var(--warning); }

        .toast-icon {
            font-size: 24px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon { color: var(--success); }
        .toast.error .toast-icon { color: var(--error); }
        .toast.warning .toast-icon { color: var(--warning); }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 2px;
            color: var(--text-primary);
        }

        .toast-message {
            font-size: 13px;
            color: var(--text-secondary);
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* 加载动画 */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ==================== 响应式 ==================== */
        @media (min-width: 768px) {
            .main {
                padding: 28px;
            }

            .images-section {
                padding: 24px;
            }

            .images-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 16px;
            }

            .editor-section {
                padding: 28px;
            }

            .map-container {
                height: 380px;
            }

            .footer {
                padding: 24px 28px;
            }

            .footer-content {
                max-width: 800px;
            }

            .btn {
                height: 56px;
                font-size: 16px;
            }

            .toast-container {
                left: auto;
                right: 28px;
                max-width: 420px;
                bottom: 28px;
            }
        }

        /* ==================== 工具类 ==================== */
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="app">
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="ri-image-edit-fill"></i>
                    </div>
                    <span>EXIF Editor</span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn hidden" id="resetBtn" title="重新开始">
                        <i class="ri-refresh-line"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main">
            <!-- 上传区域 -->
            <div class="upload-section" id="uploadSection">
                <div class="upload-area" id="uploadArea">
                    <div class="upload-icon">
                        <i class="ri-upload-cloud-2-line"></i>
                    </div>
                    <h2 class="upload-title">上传图片</h2>
                    <p class="upload-desc">点击或拖拽图片到这里<br>支持 JPG、PNG 格式，最大 50MB</p>
                    <input type="file" class="upload-input" id="fileInput" accept="image/jpeg,image/jpg,image/png" multiple>
                </div>
            </div>

            <!-- 工作区 -->
            <div class="workspace" id="workspace">
                <!-- 图片列表 -->
                <div class="images-section">
                    <div class="images-header">
                        <div class="images-title">
                            <span>图片列表</span>
                            <span class="images-count"><span id="selectedCount">0</span>/<span id="totalCount">0</span></span>
                        </div>
                        <div class="images-actions">
                            <button class="icon-btn" id="selectAllBtn" title="全选">
                                <i class="ri-checkbox-multiple-line"></i>
                            </button>
                            <button class="icon-btn" id="addMoreBtn" title="添加更多">
                                <i class="ri-add-line"></i>
                            </button>
                        </div>
                    </div>
                    <div class="images-grid" id="imagesGrid"></div>
                </div>

                <!-- 编辑区域 -->
                <div class="editor-section">
                    <div class="editor-header">
                        <div class="editor-icon">
                            <i class="ri-edit-2-fill"></i>
                        </div>
                        <div class="editor-title">
                            <h3>批量编辑</h3>
                            <p>设置将应用到所有选中的图片</p>
                        </div>
                    </div>

                    <!-- 相机信息 -->
                    <div class="form-section">
                        <div class="section-title">
                            <i class="ri-camera-fill"></i>
                            相机信息
                        </div>
                        <div class="form-group">
                            <label class="form-label">相机品牌</label>
                            <select class="form-control" id="cameraBrand">
                                <option value="">选择品牌</option>
                                <option value="Canon">Canon 佳能</option>
                                <option value="Nikon">Nikon 尼康</option>
                                <option value="Sony">Sony 索尼</option>
                                <option value="Fujifilm">Fujifilm 富士</option>
                                <option value="Leica">Leica 徕卡</option>
                                <option value="Panasonic">Panasonic 松下</option>
                                <option value="Olympus">Olympus 奥林巴斯</option>

        <!-- 进度遮罩 -->

                <h3 class="progress-title">处理中...</h3>

        <!-- Toast 容器 -->
        <div class="toast-container" id="toastContainer"></div>

    <script>
        // ==================== 应用状态 ====================
        class AppState {
            constructor() {
                this.images = [];
                this.selectedIds = new Set();
                this.processedIds = new Set();
                this.map = null;
                this.marker = null;
            }

            addImage(data) {
                this.images.push(data);
                this.selectedIds.add(data.id);
                this.updateUI();
            }

            toggleSelection(id) {
                if (this.selectedIds.has(id)) {
                    this.selectedIds.delete(id);
                } else {
                    this.selectedIds.add(id);
                }
                this.updateUI();
            }

            selectAll() {
                this.images.forEach(img => this.selectedIds.add(img.id));
                this.updateUI();
            }

            markProcessed(id) {
                this.processedIds.add(id);
                this.updateUI();
            }

            getSelected() {
                return this.images.filter(img => this.selectedIds.has(img.id));
            }

            getProcessed() {
                return this.images.filter(img => this.processedIds.has(img.id) && img.blob);
            }

            updateUI() {
                DOM.totalCount.textContent = this.images.length;
                DOM.selectedCount.textContent = this.selectedIds.size;
                
                if (this.processedIds.size > 0) {
                    DOM.downloadBtn.classList.remove('hidden');
                }
            }
        }

        const state = new AppState();

        // ==================== 相机数据 ====================
        const CAMERAS = {
            'Canon': ['EOS R5', 'EOS R6', 'EOS R3', 'EOS 5D Mark IV', 'EOS 90D'],
            'Nikon': ['Z9', 'Z7 II', 'Z6 II', 'D850', 'D780'],
            'Sony': ['α1', 'α7R V', 'α7 IV', 'α7 III', 'α6600'],
            'Fujifilm': ['X-H2S', 'X-T5', 'X-T4', 'X-S10', 'X100V'],
            'Leica': ['M11', 'M10-R', 'Q2', 'SL2', 'CL'],
            'Panasonic': ['Lumix S5', 'Lumix S1R', 'Lumix GH6'],
            'Olympus': ['OM-D E-M1 Mark III', 'OM-D E-M5 Mark III'],
            'Pentax': ['K-1 Mark II', 'K-3 III', 'KP']
        };

        // ==================== DOM 元素 ====================
        const DOM = {
            uploadSection: document.getElementById('uploadSection'),
            uploadArea: document.getElementById('uploadArea'),
            fileInput: document.getElementById('fileInput'),
            workspace: document.getElementById('workspace'),
            imagesGrid: document.getElementById('imagesGrid'),
            totalCount: document.getElementById('totalCount'),
            selectedCount: document.getElementById('selectedCount'),
            selectAllBtn: document.getElementById('selectAllBtn'),
            addMoreBtn: document.getElementById('addMoreBtn'),
            resetBtn: document.getElementById('resetBtn'),
            footer: document.getElementById('footer'),
            applyBtn: document.getElementById('applyBtn'),
            downloadBtn: document.getElementById('downloadBtn'),
            progressOverlay: document.getElementById('progressOverlay'),
            progressFill: document.getElementById('progressFill'),
            progressText: document.getElementById('progressText'),
            toastContainer: document.getElementById('toastContainer'),
            
            cameraBrand: document.getElementById('cameraBrand'),
            cameraModel: document.getElementById('cameraModel'),
            customCamera: document.getElementById('customCamera'),
            iso: document.getElementById('iso'),
            aperture: document.getElementById('aperture'),
            shutter: document.getElementById('shutter'),
            focal: document.getElementById('focal'),
            locationPreset: document.getElementById('locationPreset'),
            latitude: document.getElementById('latitude'),
            longitude: document.getElementById('longitude'),
            mapSearch: document.getElementById('mapSearch'),
            mapSearchBtn: document.getElementById('mapSearchBtn'),
            currentLocationBtn: document.getElementById('currentLocationBtn'),
            clearLocationBtn: document.getElementById('clearLocationBtn'),
            artist: document.getElementById('artist'),
            description: document.getElementById('description')
        };

        // ==================== 工具函数 ====================
        const Utils = {
            generateId: () => Date.now() + Math.random().toString(36).substr(2, 9),
            
            formatSize: (bytes) => {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
            },
            
            degToDms: (deg) => {
                const d = Math.floor(deg);
                const m = Math.floor((deg - d) * 60);
                const s = Math.round((deg - d - m / 60) * 3600 * 100);
                return [[d, 1], [m, 1], [s, 100]];
            },
            
            toast: (title, message, type = 'success') => {
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                
                const icons = {
                    success: 'ri-checkbox-circle-fill',
                    error: 'ri-error-warning-fill',
                    warning: 'ri-alert-fill'
                };
                
                toast.innerHTML = `
                    <i class="toast-icon ${icons[type]}"></i>
                    <div class="toast-content">
                        <div class="toast-title">${title}</div>
                        ${message ? `<div class="toast-message">${message}</div>` : ''}
                    </div>
                `;
                
                DOM.toastContainer.appendChild(toast);
                
                setTimeout(() => {
                    toast.style.opacity = '0';
                    toast.style.transform = 'translateY(20px)';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
        };

        // ==================== 地图管理 ====================
        const MapManager = {
            init() {
                state.map = L.map('map', {
                    center: [35.8617, 104.1954],
                    zoom: 4,
                    zoomControl: true
                });

                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap',
                    maxZoom: 19
                }).addTo(state.map);

                state.map.on('click', (e) => {
                    this.setLocation(e.latlng.lat, e.latlng.lng);
                });
            },

            setLocation(lat, lng) {
                DOM.latitude.value = lat.toFixed(6);
                DOM.longitude.value = lng.toFixed(6);

                if (state.marker) {
                    state.map.removeLayer(state.marker);
                }

                state.marker = L.marker([lat, lng], { draggable: true }).addTo(state.map);
                state.marker.on('dragend', (e) => {
                    const pos = e.target.getLatLng();
                    this.setLocation(pos.lat, pos.lng);
                });

                state.marker.bindPopup(`${lat.toFixed(6)}, ${lng.toFixed(6)}`).openPopup();
                state.map.setView([lat, lng], 13);
            },

            async search(query) {
                if (!query.trim()) return;

                DOM.mapSearchBtn.disabled = true;
                DOM.mapSearchBtn.innerHTML = '<span class="spinner"></span>';

                try {
                    const res = await fetch(
                        `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1&accept-language=zh-CN`
                    );
                    const data = await res.json();

                    if (data && data.length > 0) {
                        this.setLocation(parseFloat(data[0].lat), parseFloat(data[0].lon));
                        Utils.toast('搜索成功', data[0].display_name);
                    } else {
                        Utils.toast('未找到', '请尝试其他关键词', 'warning');
                    }
                } catch (error) {
                    Utils.toast('搜索失败', '网络错误', 'error');
                } finally {
                    DOM.mapSearchBtn.disabled = false;
                    DOM.mapSearchBtn.innerHTML = '<i class="ri-search-line"></i>';
                }
            },

            getCurrentLocation() {
                if (!navigator.geolocation) {
                    Utils.toast('不支持定位', '浏览器不支持', 'error');
                    return;
                }

                DOM.currentLocationBtn.disabled = true;
                DOM.currentLocationBtn.innerHTML = '<span class="spinner"></span>定位中';

                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        this.setLocation(pos.coords.latitude, pos.coords.longitude);
                        DOM.currentLocationBtn.disabled = false;
                        DOM.currentLocationBtn.innerHTML = '<i class="ri-crosshair-line"></i>当前位置';
                    },
                    () => {
                        Utils.toast('定位失败', '无法获取位置', 'error');
                        DOM.currentLocationBtn.disabled = false;
                        DOM.currentLocationBtn.innerHTML = '<i class="ri-crosshair-line"></i>当前位置';
                    }
                );
            },

            clear() {
                DOM.latitude.value = '';
                DOM.longitude.value = '';
                if (state.marker) {
                    state.map.removeLayer(state.marker);
                    state.marker = null;
                }
                state.map.setView([35.8617, 104.1954], 4);
            }
        };

        // ==================== 文件处理 ====================
        const FileHandler = {
            handle(files) {
                const valid = Array.from(files).filter(file => {
                    if (!file.type.match('image/(jpeg|jpg|png)')) {
                        Utils.toast('格式错误', `${file.name} 格式不支持`, 'error');
                        return false;
                    }
                    if (file.size > 50 * 1024 * 1024) {
                        Utils.toast('文件过大', `${file.name} 超过 50MB`, 'error');
                        return false;
                    }
                    return true;
                });

                if (valid.length === 0) return;

                valid.forEach(file => this.load(file));

                DOM.uploadSection.classList.add('hidden');
                DOM.workspace.classList.add('active');
                DOM.footer.classList.remove('hidden');
                DOM.resetBtn.classList.remove('hidden');

                if (!state.map) {
                    setTimeout(() => MapManager.init(), 100);
                }

                Utils.toast('上传成功', `已加载 ${valid.length} 张图片`);
            },

            load(file) {
                const reader = new FileReader();
                const id = Utils.generateId();

                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const data = {
                            id,
                            file,
                            name: file.name,
                            size: file.size,
                            width: img.width,
                            height: img.height,
                            dataUrl: e.target.result,
                            blob: null
                        };

                        state.addImage(data);
                        this.render(data);
                    };
                    img.src = e.target.result;
                };

                reader.readAsDataURL(file);
            },

            render(data) {
                const div = document.createElement('div');
                div.className = 'image-item selected';
                div.dataset.id = data.id;
                
                div.innerHTML = `
                    <input type="checkbox" class="image-checkbox" checked data-id="${data.id}">
                    <img src="${data.dataUrl}" alt="${data.name}">
                    <div class="image-status pending">
                        <i class="ri-time-line"></i>
                    </div>
                `;

                DOM.imagesGrid.appendChild(div);
            },

            updateStatus(id, processed) {
                const item = document.querySelector(`.image-item[data-id="${id}"]`);
                if (!item) return;

                const status = item.querySelector('.image-status');
                if (processed) {
                    status.className = 'image-status processed';
                    status.innerHTML = '<i class="ri-check-line"></i>';
                } else {
                    status.className = 'image-status pending';
                    status.innerHTML = '<i class="ri-time-line"></i>';
                }
            }
        };

        // ==================== EXIF 处理 ====================
        const ExifHandler = {
            collectData() {
                const custom = DOM.customCamera.value.trim();
                let make = '', model = '';
                
                if (custom) {
                    const parts = custom.split(' ');
                    make = parts[0];
                    model = parts.slice(1).join(' ');
                } else {
                    make = DOM.cameraBrand.value;
                    model = DOM.cameraModel.value;
                }

                return {
                    make,
                    model,
                    iso: DOM.iso.value,
                    aperture: DOM.aperture.value,
                    shutter: DOM.shutter.value,
                    focal: DOM.focal.value,
                    latitude: DOM.latitude.value,
                    longitude: DOM.longitude.value,
                    artist: DOM.artist.value,
                    description: DOM.description.value
                };
            },

            buildExif(data) {
                const exif = {
                    "0th": {},
                    "Exif": {},
                    "GPS": {},
                    "Interop": {},
                    "1st": {}
                };

                if (data.make) exif["0th"][piexif.ImageIFD.Make] = data.make;
                if (data.model) exif["0th"][piexif.ImageIFD.Model] = data.model;
                if (data.artist) exif["0th"][piexif.ImageIFD.Artist] = data.artist;
                if (data.description) exif["0th"][piexif.ImageIFD.ImageDescription] = data.description;
                exif["0th"][piexif.ImageIFD.Software] = "EXIF Editor Pro";

                if (data.iso) exif["Exif"][piexif.ExifIFD.ISOSpeedRatings] = parseInt(data.iso);
                if (data.aperture) {
                    exif["Exif"][piexif.ExifIFD.FNumber] = [Math.round(parseFloat(data.aperture) * 10), 10];
                }
                if (data.shutter) {
                    const parts = data.shutter.split('/');
                    exif["Exif"][piexif.ExifIFD.ExposureTime] = parts.length === 2 
                        ? [parseInt(parts[0]), parseInt(parts[1])]
                        : [parseInt(parts[0]), 1];
                }
                if (data.focal) {
                    exif["Exif"][piexif.ExifIFD.FocalLength] = [parseInt(data.focal), 1];
                }

                const now = new Date().toISOString().slice(0, 19).replace('T', ' ');
                exif["0th"][piexif.ImageIFD.DateTime] = now;
                exif["Exif"][piexif.ExifIFD.DateTimeOriginal] = now;
                exif["Exif"][piexif.ExifIFD.DateTimeDigitized] = now;

                if (data.latitude && data.longitude) {
                    const lat = parseFloat(data.latitude);
                    const lon = parseFloat(data.longitude);
                    
                    exif["GPS"][piexif.GPSIFD.GPSLatitudeRef] = lat >= 0 ? "N" : "S";
                    exif["GPS"][piexif.GPSIFD.GPSLatitude] = Utils.degToDms(Math.abs(lat));
                    exif["GPS"][piexif.GPSIFD.GPSLongitudeRef] = lon >= 0 ? "E" : "W";
                    exif["GPS"][piexif.GPSIFD.GPSLongitude] = Utils.degToDms(Math.abs(lon));
                }

                return exif;
            },

            process(imageData, exifData) {
                return new Promise((resolve, reject) => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const img = new Image();

                    img.onload = () => {
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);

                        const exif = this.buildExif(exifData);
                        const exifBytes = piexif.dump(exif);

                        canvas.toBlob((blob) => {
                            const reader = new FileReader();
                            reader.onload = (e) => {
                                try {
                                    const inserted = piexif.insert(exifBytes, e.target.result);
                                    const binary = atob(inserted.split(',')[1]);
                                    const array = new Uint8Array(binary.length);
                                    for (let i = 0; i < binary.length; i++) {
                                        array[i] = binary.charCodeAt(i);
                                    }
                                    imageData.blob = new Blob([array], { type: 'image/jpeg' });
                                    resolve(imageData);
                                } catch (error) {
                                    reject(error);
                                }
                            };
                            reader.readAsDataURL(blob);
                        }, 'image/jpeg', 1.0);
                    };

                    img.onerror = () => reject(new Error('加载失败'));
                    img.src = imageData.dataUrl;
                });
            },

            async batchProcess() {
                const selected = state.getSelected();
                
                if (selected.length === 0) {
                    Utils.toast('未选择图片', '请至少选择一张', 'warning');
                    return;
                }

                const exifData = this.collectData();
                
                DOM.applyBtn.disabled = true;
                DOM.progressOverlay.classList.add('active');
                
                let processed = 0;
                const total = selected.length;

                for (const img of selected) {
                    try {
                        await this.process(img, exifData);
                        state.markProcessed(img.id);
                        FileHandler.updateStatus(img.id, true);
                        
                        processed++;
                        const progress = (processed / total) * 100;
                        DOM.progressFill.style.width = `${progress}%`;
                        DOM.progressText.textContent = `${processed} / ${total}`;
                    } catch (error) {
                        console.error('处理失败:', error);
                    }
                }

                DOM.applyBtn.disabled = false;
                DOM.progressOverlay.classList.remove('active');
                
                Utils.toast('处理完成', `成功处理 ${processed} 张图片`);
            },

            async downloadAll() {
                const processed = state.getProcessed();
                
                if (processed.length === 0) {
                    Utils.toast('无可下载图片', '请先处理图片', 'warning');
                    return;
                }

                DOM.downloadBtn.disabled = true;
                DOM.downloadBtn.innerHTML = '<span class="spinner"></span>打包中';

                try {
                    const zip = new JSZip();
                    const folder = zip.folder('exif_edited');

                    processed.forEach((img) => {
                        const name = img.name.replace(/\.[^/.]+$/, '') + '_edited.jpg';
                        folder.file(name, img.blob);
                    });

                    const content = await zip.generateAsync({ 
                        type: 'blob',
                        compression: 'DEFLATE',
                        compressionOptions: { level: 9 }
                    });
                    
                    const url = URL.createObjectURL(content);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `exif_edited_${Date.now()}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    Utils.toast('下载成功', `已打包 ${processed.length} 张图片`);
                } catch (error) {
                    Utils.toast('打包失败', '请重试', 'error');
                } finally {
                    DOM.downloadBtn.disabled = false;
                    DOM.downloadBtn.innerHTML = '<i class="ri-download-2-fill"></i><span>打包下载</span>';
                }
            }
        };

        // ==================== 事件绑定 ====================
        function initEvents() {
            // 上传
            DOM.uploadArea.addEventListener('click', () => DOM.fileInput.click());
            DOM.fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    FileHandler.handle(e.target.files);
                }
            });

            // 拖拽
            DOM.uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                DOM.uploadArea.classList.add('dragover');
            });
            DOM.uploadArea.addEventListener('dragleave', () => {
                DOM.uploadArea.classList.remove('dragover');
            });
            DOM.uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                DOM.uploadArea.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) {
                    FileHandler.handle(e.dataTransfer.files);
                }
            });

            // 图片选择
            DOM.imagesGrid.addEventListener('change', (e) => {
                if (e.target.classList.contains('image-checkbox')) {
                    const id = e.target.dataset.id;
                    const item = e.target.closest('.image-item');
                    
                    state.toggleSelection(id);
                    item.classList.toggle('selected', e.target.checked);
                }
            });

            // 全选
            DOM.selectAllBtn.addEventListener('click', () => {
                state.selectAll();
                document.querySelectorAll('.image-item').forEach(item => {
                    item.classList.add('selected');
                    item.querySelector('.image-checkbox').checked = true;
                });
            });

            // 添加更多
            DOM.addMoreBtn.addEventListener('click', () => {
                DOM.fileInput.click();
            });

            // 相机品牌
            DOM.cameraBrand.addEventListener('change', (e) => {
                const brand = e.target.value;
                DOM.cameraModel.innerHTML = '<option value="">选择型号</option>';
                
                if (brand && CAMERAS[brand]) {
                    CAMERAS[brand].forEach(model => {
                        const opt = document.createElement('option');
                        opt.value = model;
                        opt.textContent = model;
                        DOM.cameraModel.appendChild(opt);
                    });
                    DOM.cameraModel.disabled = false;
                } else {
                    DOM.cameraModel.disabled = true;
                }
            });

            // 地点预设
            DOM.locationPreset.addEventListener('change', (e) => {
                const coords = e.target.value.split(',');
                if (coords.length === 2) {
                    MapManager.setLocation(parseFloat(coords[0]), parseFloat(coords[1]));
                }
            });

            // 地图搜索
            DOM.mapSearchBtn.addEventListener('click', () => {
                MapManager.search(DOM.mapSearch.value);
            });
            DOM.mapSearch.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    MapManager.search(DOM.mapSearch.value);
                }
            });

            // 地图控制
            DOM.currentLocationBtn.addEventListener('click', () => {
                MapManager.getCurrentLocation();
            });
            DOM.clearLocationBtn.addEventListener('click', () => {
                MapManager.clear();
            });

            // 应用和下载
            DOM.applyBtn.addEventListener('click', () => {
                ExifHandler.batchProcess();
            });
            DOM.downloadBtn.addEventListener('click', () => {
                ExifHandler.downloadAll();
            });

            // 重置
            DOM.resetBtn.addEventListener('click', () => {
                if (confirm('确定要重新开始吗？所有数据将丢失。')) {
                    location.reload();
                }
            });
        }

        // ==================== 初始化 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initEvents();
            console.log('EXIF Editor Pro 已启动');
        });
    </script>
</body>
</html>
